<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SESMT B&M - Controle de Documentação</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- evita que o navegador guarde HTML em cache "para sempre" -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<!-- VERSÃO DO APP — atualize a cada deploy (formato: AAAA.MM.DD.N) -->
<meta name="app-version" content="2026.06.17.10">
<meta name="theme-color" content="#1a3d7c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SESMT">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){})})}</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --bm-blue:#1a3d7c; --bm-orange:#F88800;
    --bg:#f4f6fa; --card:#fff; --text:#1f2937; --muted:#6b7280; --border:#e5e7eb;
    --ok:#16a34a; --warn:#f59e0b; --crit:#dc2626; --info:#2563eb;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
    --radius:10px;
  }
  body{background:linear-gradient(180deg,#eef2f9 0%,var(--bg) 200px) fixed}
  .card{border-radius:var(--radius);border:1px solid rgba(0,0,0,.04)}
  .topbar{box-shadow:0 2px 4px rgba(0,0,0,.04)}
  .sidebar{background:linear-gradient(180deg,#fff 0%,#fafbfd 100%)}
  .stat-card{border-radius:var(--radius);transition:transform .15s}
  .stat-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
  .btn-primary{box-shadow:0 1px 2px rgba(26,61,124,.2)}
  table thead th:first-child{border-radius:6px 0 0 0}
  table thead th:last-child{border-radius:0 6px 0 0}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
  button{font-family:inherit;cursor:pointer;border:none;font-size:14px}
  input,select,textarea{font-family:inherit;font-size:14px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;width:100%;background:#fff}
  textarea{resize:vertical;min-height:60px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--bm-blue);box-shadow:0 0 0 3px rgba(26,61,124,.1)}
  label{display:block;margin-bottom:4px;font-weight:500;color:#374151;font-size:13px}
  .btn{padding:8px 16px;border-radius:6px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .btn-primary{background:var(--bm-blue);color:#fff} .btn-primary:hover{background:#162f5e}
  .btn-secondary{background:#fff;color:var(--bm-blue);border:1px solid var(--bm-blue)} .btn-secondary:hover{background:#f0f4fb}
  .btn-danger{background:#fee2e2;color:var(--crit)} .btn-danger:hover{background:#fecaca}
  .btn-success{background:var(--ok);color:#fff} .btn-success:hover{background:#15803d}
  .btn-warn{background:#fef3c7;color:#92400e}
  .btn-sm{padding:4px 10px;font-size:12px}

  /* LOGIN */
  #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(150deg,#2a57a3 0%,var(--bm-blue) 55%,#15325f 100%);position:relative;overflow:hidden}
  #loginScreen::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(248,136,0,.15) 0%,transparent 70%);top:-200px;right:-200px}
  #loginScreen::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.05) 0%,transparent 70%);bottom:-200px;left:-150px}
  .login-box{background:#fff;padding:44px 40px;border-radius:16px;width:420px;box-shadow:0 30px 70px rgba(0,0,0,.4);position:relative;z-index:1}
  .logo{text-align:center;margin-bottom:28px}
  .logo-name{font-size:32px;font-weight:800;color:var(--bm-blue);letter-spacing:.5px;line-height:1}
  .logo-name span{color:var(--bm-orange)}
  .logo-sub{font-size:11px;color:var(--bm-blue);letter-spacing:3px;margin-top:6px;font-weight:600;opacity:.7}
  .form-group{margin-bottom:16px}
  .login-hint{font-size:12px;color:var(--muted);margin-top:16px;padding:10px;background:#f9fafb;border-radius:6px}
  .filtros-box{background:#fff;border:1px solid var(--border);border-left:3px solid var(--bm-blue);border-radius:8px;padding:12px 14px;margin-bottom:14px}
  .filtros-row{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:0}
  .filtros-row:last-child{margin-bottom:0}
  .filtros-row .label{font-size:12px;font-weight:600;color:var(--muted);min-width:90px;letter-spacing:.3px;text-transform:uppercase}
  .filtro-item{display:flex;flex-direction:column;gap:4px;min-width:170px}
  .filtro-lbl{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.3px;text-transform:uppercase;margin:0}
  .filtro-select{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:#fff;cursor:pointer;min-width:170px;max-width:260px}
  .filtro-select:focus{outline:none;border-color:var(--bm-blue);box-shadow:0 0 0 3px rgba(26,61,124,.1)}
  .filtro-actions{flex-direction:row;align-items:center;gap:8px;margin-left:auto}
  .pill-filter{display:inline-block;padding:5px 12px;border:1px solid var(--border);background:#f9fafb;color:var(--text);border-radius:18px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
  .pill-filter:hover{border-color:var(--bm-blue);background:#eef2f9}
  .pill-filter.active{background:var(--bm-blue);color:#fff;border-color:var(--bm-blue);box-shadow:0 1px 3px rgba(26,61,124,.3)}
  .pill-filter.active-status-ok{background:var(--ok);border-color:var(--ok)}
  .pill-filter.active-status-warn{background:var(--warn);border-color:var(--warn);color:#000}
  .pill-filter.active-status-crit{background:var(--crit);border-color:var(--crit)}
  .pill-filter.active-status-info{background:var(--info);border-color:var(--info)}
  .pill-filter.active-status-pendente{background:#6b7280;border-color:#6b7280}
  .filtros-scroll{display:flex;gap:6px;flex-wrap:wrap;flex:1}
  .filtros-busca{flex:1;min-width:200px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px}
  .filtros-clear{margin-left:auto;background:transparent;border:none;color:var(--crit);font-size:12px;font-weight:600;cursor:pointer;padding:4px 8px}
  .filtros-clear:hover{text-decoration:underline}
  .login-hint b{color:var(--text)}
  .login-box{overflow:hidden}
  .login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--bm-blue),var(--bm-orange))}
  .login-badge{display:flex;justify-content:center;margin-bottom:14px}
  .login-icon{width:92px;height:92px;border-radius:22px;box-shadow:0 12px 26px rgba(15,37,77,.30)}
  .login-tag{text-align:center;color:var(--muted);font-size:13px;line-height:1.5;margin:2px 0 16px}
  .login-tag b{color:var(--bm-blue);font-weight:800;letter-spacing:.5px}
  .login-feats{display:flex;justify-content:center;gap:7px;margin-bottom:22px;flex-wrap:wrap}
  .login-feats span{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--bm-blue);background:#eef2f9;border:1px solid #dbe4f3;padding:5px 10px;border-radius:30px}
  .login-feats svg{width:13px;height:13px;flex:none}
  .login-foot{text-align:center;margin-top:18px;font-size:11px;color:var(--muted)}

  /* APP */
  #appScreen{display:none}
  .topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:50}
  .topbar-left{display:flex;align-items:center;gap:30px}
  .topbar .logo-name{font-size:18px}
  .user-info{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted)}
  .user-info b{color:var(--text)}
  .badge-role{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px}
  .badge-role.sesmt{background:#1a3d7c;color:#fff}
  .badge-role.coordenador,.badge-role.engenheiro{background:#0d9488;color:#fff}
  .badge-role.visualizador{background:#6b7280;color:#fff}
  .badge-role.empresa{background:#F88800;color:#fff}
  .layout{display:flex;min-height:calc(100vh - 60px - 56px)}
  .footer{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#fff;border-top:1px solid var(--border);color:var(--muted);font-size:12px;height:56px}
  .footer img{max-height:30px}
  .sidebar{width:230px;background:#fff;border-right:1px solid var(--border);padding:16px 0}
  .nav-section{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:14px 20px 6px;font-weight:600}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;color:#4b5563;font-weight:500;border-left:3px solid transparent}
  .nav-item:hover{background:#f9fafb;color:var(--text)}
  .nav-item.active{background:#eef2f9;color:var(--bm-blue);border-color:var(--bm-blue)}
  .nav-icon{font-size:15px;width:18px;text-align:center}
  .main{flex:1;padding:24px;overflow:auto}
  .page-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;gap:16px;flex-wrap:wrap}
  .page-title{font-size:22px;font-weight:700;color:var(--text)}
  .page-sub{color:var(--muted);font-size:13px;margin-top:2px}

  /* CARDS */
  .card{background:var(--card);border-radius:8px;box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:20px}
  .stat-card{background:#fff;padding:18px;border-radius:8px;box-shadow:var(--shadow);border-left:4px solid var(--bm-blue)}
  .stat-card.ok{border-color:var(--ok)}
  .stat-card.warn{border-color:var(--warn)}
  .stat-card.crit{border-color:var(--crit)}
  .stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .stat-value{font-size:28px;font-weight:700;color:var(--text)}
  .stat-sub{font-size:12px;color:var(--muted);margin-top:2px}

  /* TABLE */
  table{width:100%;border-collapse:collapse}
  th{background:#f9fafb;text-align:left;padding:10px 12px;font-weight:600;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
  td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
  tr:hover td{background:#fafbfc}
  .status{display:inline-block;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
  .status.ok{background:#dcfce7;color:#166534}
  .status.warn{background:#fef3c7;color:#92400e}
  .status.crit{background:#fee2e2;color:#991b1b}
  .status.pendente{background:#e5e7eb;color:#4b5563}
  .status.info{background:#dbeafe;color:#1e40af}

  /* MODAL */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:20px}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:12px;width:100%;max-width:700px;max-height:92vh;overflow:auto}
  .modal.lg{max-width:900px}
  .modal-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
  .modal-title{font-size:18px;font-weight:600}
  .modal-close{background:none;color:var(--muted);font-size:22px;line-height:1}
  .modal-body{padding:20px 24px}
  .modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:#fff}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

  /* TOOLBAR / FILTROS */
  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;background:#fff;padding:12px;border-radius:8px;box-shadow:var(--shadow);border-left:4px solid var(--bm-blue)}
  .toolbar::before{content:'🔎 Filtros:';font-weight:600;color:var(--bm-blue);font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-right:8px}
  .toolbar input,.toolbar select{max-width:240px}
  .toolbar label{margin:0;font-size:12px;white-space:nowrap}
  .toolbar-spacer{flex:1}
  .empty{text-align:center;padding:40px;color:var(--muted)}
  .empty-icon{font-size:40px;margin-bottom:10px}
  .pill{display:inline-block;background:#eef2f9;color:var(--bm-blue);padding:2px 8px;border-radius:10px;font-size:11px;margin-right:4px;margin-bottom:4px;font-weight:500}

  /* CHECKBOX LIST */
  .checkbox-list{max-height:240px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;padding:6px}
  .checkbox-list label{display:flex;align-items:flex-start;gap:8px;padding:6px 10px;font-weight:400;cursor:pointer;border-radius:4px;font-size:13px}
  .checkbox-list label:hover{background:#f9fafb}
  .checkbox-list input{width:auto;margin-top:3px}
  .checkbox-list .cat{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600;padding:8px 10px 4px;letter-spacing:1px}

  .toast{position:fixed;top:80px;right:24px;background:var(--ok);color:#fff;padding:12px 18px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:200;animation:slideIn .3s;max-width:380px}
  .toast.err{background:var(--crit)} .toast.warn{background:var(--warn);color:#fff}
  @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
  .alert{padding:12px 16px;background:#fef3c7;border-left:4px solid var(--warn);border-radius:6px;margin-bottom:16px;font-size:13px}
  .alert.info{background:#dbeafe;border-color:#3b82f6}
  .alert.success{background:#dcfce7;border-color:var(--ok)}
  details{margin-bottom:8px;border:1px solid var(--border);border-radius:6px}
  summary{padding:10px 14px;cursor:pointer;font-weight:500;background:#f9fafb;border-radius:6px}
  details[open] summary{border-bottom:1px solid var(--border);border-radius:6px 6px 0 0}

  .doc-row{display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid #f3f4f6}
  .doc-row:last-child{border-bottom:none}
  .doc-name{font-weight:500}
  .doc-meta{font-size:11px;color:var(--muted);margin-top:2px}
  .badge-ia{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
  .badge-ia.aprovado{background:#dcfce7;color:#166534}
  .badge-ia.duvida{background:#fef3c7;color:#92400e}
  .badge-ia.recusado{background:#fee2e2;color:#991b1b}
  .badge-ia.pendente{background:#e5e7eb;color:#4b5563}

  .small-actions{display:flex;gap:4px}
  /* banner de atualização */
  #updateBar{display:none;position:fixed;top:0;left:0;right:0;background:linear-gradient(90deg,var(--bm-blue),var(--info));color:#fff;padding:10px 16px;text-align:center;font-size:13px;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  #updateBar button{background:#fff;color:var(--bm-blue);padding:5px 14px;border-radius:6px;font-weight:700;margin-left:12px;border:none;cursor:pointer;font-size:12px}
  #updateBar button:hover{background:#f0f4fb}
  #updateBar .dismiss{background:transparent;color:#fff;opacity:.7;margin-left:6px;padding:5px 10px}
  #updateBar .dismiss:hover{opacity:1;background:rgba(255,255,255,.1)}

  /* ===== MOBILE / CELULAR (nao afeta o desktop) ===== */
  .hamb{display:none;background:none;border:none;font-size:22px;color:var(--bm-blue);padding:2px 6px;line-height:1}
  .sidebar-backdrop{display:none}
  @media (max-width:768px){
    #loginScreen{padding:16px}
    .login-box{width:100%;max-width:420px;padding:32px 22px}
    .topbar{padding:0 12px;gap:6px}
    .topbar-left{gap:8px}
    .hamb{display:inline-block}
    .topbar .logo-name{font-size:16px}
    .user-info{gap:8px;font-size:12px}
    .user-info #topUser{display:none}
    .layout{display:block;min-height:auto}
    .sidebar{position:fixed;top:60px;bottom:0;left:-280px;width:260px;z-index:60;transition:left .25s ease;box-shadow:2px 0 18px rgba(0,0,0,.25);overflow-y:auto}
    body.sb-open .sidebar{left:0}
    body.sb-open .sidebar-backdrop{display:block;position:fixed;top:60px;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:55}
    .nav-item{padding:13px 20px}
    .main{padding:14px 12px}
    .page-header{margin-bottom:14px;gap:10px}
    .page-title{font-size:19px}
    .card{padding:14px;overflow-x:auto}
    .grid-2,.grid-3{grid-template-columns:1fr}
    .stats{grid-template-columns:1fr 1fr}
    th,td{padding:8px 8px;font-size:12px}
    .btn{padding:9px 14px}
    .btn-sm{padding:6px 10px;font-size:12px}
    .modal-bg{padding:8px}
    .modal,.modal.lg{max-width:100%;max-height:95vh}
    .modal-header{padding:14px 16px}
    .modal-body{padding:14px 16px}
    .modal-footer{padding:12px 16px;flex-wrap:wrap}
    .footer{padding:10px 12px;height:auto;font-size:11px;flex-direction:column;gap:4px;text-align:center}
    .toolbar input,.toolbar select{max-width:100%}
    .filtro-select{max-width:100%;width:100%}
    .filtro-item{min-width:140px;flex:1}
  }
</style>
</head>
<body>

<!-- BANNER DE ATUALIZAÇÃO (aparece quando detecta versão nova no GitHub) -->
<div id="updateBar">
  ✨ Uma nova versão do sistema está disponível.
  <button onclick="aplicarAtualizacao()">Atualizar agora</button>
  <button class="dismiss" onclick="document.getElementById('updateBar').style.display='none'">Mais tarde</button>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-badge"><img src="icon-192.png" alt="SESMT" class="login-icon"></div>
    <div class="login-tag">Sistema <b>SESMT</b><br>Segurança e Saúde no Trabalho</div>
    <div class="login-feats">
      <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="2"></rect><path d="M9 7h6M9 11h6M9 15h4"></path></svg>Documentação</span>
      <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8V5a1 1 0 0 1 1-1h3M16 4h3a1 1 0 0 1 1 1v3M20 16v3a1 1 0 0 1-1 1h-3M8 20H5a1 1 0 0 1-1-1v-3"></path><path d="M4 12h16"></path></svg>Portaria QR</span>
      <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.4-3 7.6-7 9-4-1.4-7-4.6-7-9V6z"></path><path d="M9.5 12l1.8 1.8 3.5-3.6"></path></svg>Conformidade</span>
    </div>
    <div class="form-group">
      <label>E-mail</label>
      <input id="loginUser" name="email" autocomplete="username" type="email" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input id="loginPass" name="password" autocomplete="current-password" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px" onclick="doLogin()">Entrar</button>
    <div class="login-foot">© 2026 Brandão &amp; Marmo · Todos os direitos reservados</div>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamb" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
      <div class="logo"><div class="logo-name">B&M <span style="font-size:13px;font-weight:400;color:var(--muted)">| SESMT</span></div></div>

async function syncToSupabase(){
  if(!session) return;
  const c = DB.config;
  await sb.from('config').upsert({id:1, smtp_host:c.smtp?.host||'', smtp_porta:c.smtp?.porta||587, smtp_user:c.smtp?.usuario||'', smtp_pass:c.smtp?.senha||'', smtp_remetente:c.smtp?.remetente||'', dias_aviso_vencimento:c.diasAvisoVencimento||30, ia_habilitada:c.iaHabilitada!==false, gemini_api_key:c.geminiApiKey||'', gemini_model:c.geminiModel||'gemini-2.0-flash', webhook_make:c.webhookMake||'', logo_data:c.logoData||'', nome_empresa:c.nomeEmpresa||'BRANDÃO & MARMO', cor_primaria:c.corPrimaria||'#1a3d7c', cor_secundaria:c.corSecundaria||'#F88800'});

  }
  for(const f of DB.catalogoFuncoes){

      await sb.from('catalogo_funcoes').upsert({id:f.id,nome:f.nome,docs_ids:f.docsIds||[]});
    } else {
      const {data} = await sb.from('catalogo_funcoes').insert({nome:f.nome,docs_ids:f.docsIds||[]}).select().single();
      if(data) f.id = data.id;
    }
  }
  for(const o of DB.obras){

      await sb.from('obras').upsert({id:o.id,...row});
    } else {
      const {data} = await sb.from('obras').insert(row).select().single();

  }
  for(const e of DB.empresas){

      await sb.from('empresas').upsert({id:e.id,...row});
    } else {
      const {data} = await sb.from('empresas').insert(row).select().single();
      if(data) e.id = data.id;
    }
    await sb.from('empresa_obras').delete().eq('empresa_id',e.id);
    if((e.obraIds||[]).length){
      await sb.from('empresa_obras').insert(e.obraIds.map(oid=>({empresa_id:e.id,obra_id:oid})));
    }
  }
  for(const f of DB.funcionarios){
    const row = {empresa_id:f.empresaId,obra_id:f.obraId||null,nome:f.nome,cpf:f.cpf,funcao_id:f.funcaoId||null,ativo:f.ativo!==false};

    } else {
      const {data} = await sb.from('funcionarios').insert(row).select().single();
      if(data){ f.id = data.id; f.qrToken = data.qr_token; }
    }
  }
  for(const m of DB.maquinas){
    const row = {empresa_id:m.empresaId,obra_id:m.obraId||null,descricao:m.descricao,patrimonio:m.patrimonio||''};

      await sb.from('maquinas').upsert({id:m.id,...row});
    } else {
      const {data} = await sb.from('maquinas').insert(row).select().single();
      if(data) m.id = data.id;
    }

  for(const d of DB.documentos){
    const row = {ref_tipo:d.refTipo,ref_id:d.refId,obra_id:d.obraId||null,doc_id:d.docId,arquivo:d.arquivo||'',arquivo_path:d.arquivoPath||'',emitido_em:d.emitidoEm||null,validade:d.validade||null,ia_status:d.iaStatus||'pendente',ia_nota:d.iaNota||'',sesmt_status:d.sesmtStatus||'pendente',sesmt_motivo:d.sesmtMotivo||'',sesmt_por:d.sesmtPor||null};

    } else {
      const {data} = await sb.from('documentos').insert(row).select().single();
      if(data) d.id = data.id;
    }
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
}

// Perfis que EXIGEM 2FA TOTP
const TIPOS_MFA_OBRIGATORIO = ['diretoria','ti','sesmt','coord_sesmt','tst'];

async function doLogin(){
  const e = document.getElementById('loginUser').value.trim().toLowerCase();
  const p = document.getElementById('loginPass').value;
  toast('Entrando...');
  const {data:auth, error} = await sb.auth.signInWithPassword({email:e, password:p});
  if(error){ toast('E-mail ou senha inválidos','err'); return; }
  const {data:perfil, error:errP} = await sb.from('usuarios').select('*').eq('id', auth.user.id).maybeSingle();
  if(errP || !perfil){ toast('Conta sem perfil. Contate o admin.','err'); await sb.auth.signOut(); return; }
  const perfilTmp = {id:perfil.id, email:perfil.email, nome:perfil.nome, tipo:perfil.tipo, empresaId:perfil.empresa_id, obraIds:perfil.obra_ids||[], naoApagar:perfil.nao_apagar};
  // ========== FLUXO 2FA TOTP ==========
  if(TIPOS_MFA_OBRIGATORIO.includes(perfilTmp.tipo)){
    const {data:fatores} = await sb.auth.mfa.listFactors();
    const totpVerificado = (fatores?.totp||[]).find(f=>f.status==='verified');
    const {data:aalData} = await sb.auth.mfa.getAuthenticatorAssuranceLevel();
    if(!totpVerificado){
      // Primeira vez: precisa configurar 2FA
      const ok = await mfaEnrolmentFlow(perfilTmp);
      if(!ok){ await sb.auth.signOut(); return; }
    } else if(aalData?.currentLevel !== 'aal2'){
      // Já configurou antes: pede o código
      const ok = await mfaChallengeFlow(totpVerificado.id);
      if(!ok){ await sb.auth.signOut(); return; }
    }
  }
  // ===================================
  try{ if(TIPOS_MFA_OBRIGATORIO.includes(perfilTmp.tipo)) localStorage.setItem('sesmt_last2fa', String(Date.now())); }catch(e){}
  session = perfilTmp;
  await loadFromSupabase();
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  // logo / nome no topbar
  const logoEl = document.querySelector('.topbar .logo .logo-name');
  if(DB.config.logoData){
    logoEl.innerHTML = `<img src="${DB.config.logoData}" style="max-height:34px;vertical-align:middle"> <span style="font-size:13px;font-weight:400;color:var(--muted);margin-left:8px">| SESMT</span>`;
  } else {
    logoEl.innerHTML = `${DB.config.nomeEmpresa||'B&M'} <span style="font-size:13px;font-weight:400;color:var(--muted)">| SESMT</span>`;
  }
  aplicarTema();
  // logo no rodapé
  const fl = document.getElementById('footerLogo');
  if(DB.config.logoData){
    fl.innerHTML = `<img src="${DB.config.logoData}">`;
  } else {
    fl.innerHTML = `<b style="color:var(--bm-blue)">${DB.config.nomeEmpresa||'B&M'}</b>`;
  }
  document.getElementById('footerYear').textContent = new Date().getFullYear();
  document.getElementById('topUser').textContent = session.nome;
  const role = ROLES[session.tipo];
  const rb = document.getElementById('topRole');
  rb.textContent = role.label;
  rb.className = 'badge-role '+role.badge;
  filtros = {obraId:'',empresaId:'',status:'',busca:''};
  renderSidebar();
  go(session.tipo==='vigia' ? 'portaria' : 'dashboard');
}
async function logout(){
  await sb.auth.signOut();
  session=null;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appScreen').style.display='none';
  document.getElementById('loginUser').value=''; document.getElementById('loginPass').value='';
}
function _mfaExpirado(){
  if(!session) return false;
  if(!TIPOS_MFA_OBRIGATORIO.includes(session.tipo)) return false;
  var t = Number(localStorage.getItem('sesmt_last2fa')||0);
  return (Date.now() - t) > 86400000;
}
function checarMfaDiario(){
  if(_mfaExpirado()){
    toast('Por seguranca, faca login de novo (verificacao a cada 24h).','warn');
    setTimeout(function(){ try{ logout(); }catch(e){} }, 1800);
  }
}

/* ===== 2FA (TOTP) ===== */
// Modal de cadastro do 2FA (primeira vez do usuário). Resolve true se enrolment OK.
function mfaEnrolmentFlow(perfil){
  return new Promise(async (resolve)=>{
    // Limpa fatores pendentes/unverified de tentativas anteriores (evita
    // "factor with friendly name already exists")
    try{
      const {data:atual} = await sb.auth.mfa.listFactors();
      const todos = [...(atual?.totp||[]), ...(atual?.phone||[]), ...(atual?.all||[])];
      const vistos = new Set();
      for(const f of todos){
        if(vistos.has(f.id)) continue; vistos.add(f.id);
        if(f.status !== 'verified'){
          await sb.auth.mfa.unenroll({factorId:f.id}).catch(()=>{});
        }
      }
    }catch(e){ console.warn('limpeza fatores',e); }
    // Friendly name único (timestamp) garante que não colide nem em casos exóticos
    const friendly = `SESMT - ${perfil.email} - ${Date.now()}`;
    const {data, error} = await sb.auth.mfa.enroll({factorType:'totp', friendlyName:friendly, issuer:'SESMT B&M'});
    if(error){ toast('Erro ao iniciar 2FA: '+error.message,'err'); return resolve(false); }
    const factorId = data.id;
    let verificado = false;
    const qrSvg = data.totp.qr_code; // SVG inline
    const secret = data.totp.secret; // pra entrada manual
    showModal('🔐 Ativar Verificação em 2 Etapas', `
      <div class="alert info" style="margin-bottom:14px">
        Seu perfil (<b>${ROLES[perfil.tipo].label}</b>) exige autenticação em 2 etapas. Configure agora — leva 1 minuto.
      </div>
      <div style="display:grid;grid-template-columns:auto 1fr;gap:20px;align-items:center;margin-bottom:14px">
        <div style="background:#fff;padding:10px;border:1px solid var(--border);border-radius:8px">${qrSvg}</div>
        <div style="font-size:13px;line-height:1.6">
          <b>1.</b> Instale um app autenticador:<br>
          • <b>Google Authenticator</b> (Android/iPhone)<br>
          • <b>Microsoft Authenticator</b><br>
          • <b>Authy</b><br><br>
          <b>2.</b> Abra o app, toque "+", escolha "Ler QR Code" e aponte para o código ao lado.<br><br>
          <b>3.</b> Ou cadastre manualmente:<br>
          <code style="display:inline-block;background:#f3f4f6;padding:4px 8px;border-radius:4px;font-size:11px;margin-top:4px;word-break:break-all">${secret}</code>
        </div>
      </div>
      <div class="form-group">
        <label>Digite o código de 6 dígitos gerado pelo app</label>
        <input id="f_totp" type="text" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="one-time-code"
          style="font-size:20px;text-align:center;letter-spacing:6px;font-family:monospace"
          onkeydown="if(event.key==='Enter')modalSave()">
      </div>
      <div class="alert" style="font-size:12px">
        ⚠️ <b>Importante:</b> sem esse app instalado você não conseguirá mais entrar. Se perder o celular, peça pra outro diretor resetar seu 2FA.
      </div>
    `, async ()=>{
      const code = (val('f_totp')||'').replace(/\s/g,'');
      if(!/^\d{6}$/.test(code)){ toast('Digite os 6 dígitos','err'); return false; }
      const {error:vErr} = await sb.auth.mfa.challengeAndVerify({factorId, code});
      if(vErr){
        toast('Código inválido. Tente o próximo (muda a cada 30s).','err');
        return false;
      }
      verificado = true;
      toast('2FA ativada com sucesso ✓');
      resolve(true);
      return true;
    }, [], false, 'lg');
    // Se o usuário fechar/cancelar, desistir do login
    const origClose = window.closeModal;
    window.closeModal = function(){
      origClose();
      window.closeModal = origClose;
      // So remove o fator se NAO foi verificado (cancelou). Se verificou, mantem pro proximo login.
      if(!verificado){ sb.auth.mfa.unenroll({factorId}).catch(()=>{}); }
      resolve(false);
    };
  });
}

// Modal pra digitar código (usuários que JÁ configuraram). Resolve true se OK.
function mfaChallengeFlow(factorId){
  return new Promise((resolve)=>{
    showModal('🔐 Verificação em 2 Etapas', `
      <div style="text-align:center;margin-bottom:14px;color:var(--muted);font-size:13px">
        Abra seu app autenticador (Google Authenticator, Authy, etc.) e digite o código de 6 dígitos.
      </div>
      <div class="form-group">
        <label>Código</label>
        <input id="f_totp" type="text" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="one-time-code"
          style="font-size:24px;text-align:center;letter-spacing:8px;font-family:monospace"
          onkeydown="if(event.key==='Enter')modalSave()">
      </div>
    `, async ()=>{
      const code = (val('f_totp')||'').replace(/\s/g,'');
      if(!/^\d{6}$/.test(code)){ toast('Digite os 6 dígitos','err'); return false; }
      const {error} = await sb.auth.mfa.challengeAndVerify({factorId, code});
      if(error){ toast('Código inválido. Tente o próximo.','err'); return false; }
      resolve(true);
      return true;
    });
    const origClose = window.closeModal;
    window.closeModal = function(){
      origClose();
      window.closeModal = origClose;
      resolve(false);
    };
    setTimeout(()=>document.getElementById('f_totp')?.focus(), 150);
  });
}

function pode(acao){

    empresa:['enviar_doc','ver_propria'],
    vigia:['ver_obra','registrar_acesso']
  };
  return (p[t]||[]).includes('*') || (p[t]||[]).includes(acao);

function escopoObras(){
  if(!session) return [];
  if(['diretoria','ti','sesmt','coord_sesmt','visualizador'].includes(session.tipo)) return DB.obras;
  if(session.tipo==='empresa'){
    const emp = DB.empresas.find(e=>e.id===session.empresaId);
    return DB.obras.filter(o=>(emp?.obraIds||[]).includes(o.id));
  }
  return DB.obras.filter(o=>session.obraIds.includes(o.id));
}
function escopoEmpresas(){
  if(!session) return [];
  if(session.tipo==='empresa') return DB.empresas.filter(e=>e.id===session.empresaId);
  if(['diretoria','ti','sesmt','coord_sesmt','visualizador'].includes(session.tipo)) return DB.empresas;
  // coord/eng: empresas que têm gente nas suas obras
  const oids = session.obraIds;
  const eids = new Set();
  DB.funcionarios.filter(f=>oids.includes(f.obraId)).forEach(f=>eids.add(f.empresaId));
  DB.maquinas.filter(m=>oids.includes(m.obraId)).forEach(m=>eids.add(m.empresaId));
  return DB.empresas.filter(e=>eids.has(e.id));
}
function escopoFuncionarios(){
  if(!session) return [];
  if(session.tipo==='empresa') return DB.funcionarios.filter(f=>f.empresaId===session.empresaId);
  if(['diretoria','ti','sesmt','coord_sesmt','visualizador'].includes(session.tipo)) return DB.funcionarios;
  return DB.funcionarios.filter(f=>session.obraIds.includes(f.obraId));
}
function escopoMaquinas(){
  if(!session) return [];
  if(session.tipo==='empresa') return DB.maquinas.filter(m=>m.empresaId===session.empresaId);

const QR_PREFIX = 'BM-';

// Situacao do colaborador na portaria - reusa statusDoc/docsExigidos ja existentes
function situacaoColaborador(func){
  const exigidos = docsExigidosFuncionario(func);
  const probs = [];
  let okCount = 0;
  exigidos.forEach(e=>{
    const st = statusDoc(getDoc('funcionario', func.id, e.id), e);
    if(st.cls==='ok') okCount++;
    else probs.push({nome:e.nome, label:st.label, cls:st.cls});
  });
  const bloqueios = probs.filter(p=>p.cls!=='warn'); // crit/info/pendente = pendencia real; warn = so aviso
  const liberado = bloqueios.length===0 && func.ativo!==false;
  return { liberado, probs, bloqueios, okCount, total:exigidos.length, inativo:func.ativo===false };
}

function toggleScanner(){
  if(_scanner){ pararScanner(); return; }
  if(typeof Html5Qrcode==='undefined'){ toast('A leitura por camera nao carregou. Use "Digitar codigo".','err'); return; }
  _scanner = new Html5Qrcode('leitor');
  _scanner.start({facingMode:'environment'}, {fps:10, qrbox:{width:220,height:220}},
    txt=>onScan(txt), ()=>{})
    .then(()=>{ const b=document.getElementById('btnScan'); if(b) b.textContent='Desligar camera'; })
    .catch(e=>{ toast('Nao consegui abrir a camera: '+(e.message||e),'err'); _scanner=null; });
}
function pararScanner(){
  if(!_scanner) return;
  const sc=_scanner; _scanner=null;
  sc.stop().then(()=>{ try{sc.clear();}catch(e){} }).catch(()=>{});
  const b=document.getElementById('btnScan'); if(b) b.textContent='Ligar camera';
}

function onScan(txt){
  const agora = Date.now();
  if(agora - _ultimaLeitura < 2500) return; // evita ler o mesmo cracha varias vezes seguidas
  _ultimaLeitura = agora;
  processarCodigo(txt);
}
function leituraManual(){
  const c = prompt('Codigo do cracha:');
  if(c) processarCodigo(String(c).trim());
}

function processarCodigo(txt){
  let token = String(txt||'').trim();
  if(token.indexOf(QR_PREFIX)===0) token = token.slice(QR_PREFIX.length);
  const box = document.getElementById('resultadoAcesso');
  const func = DB.funcionarios.find(f=>f.qrToken===token);
  if(!func){

async function registrarAcesso(func, sit){
  const reg = {
    funcionario_id: func.id,
    obra_id: func.obraId || _portaria.obraId || null,
    tipo: _portaria.modo,
    status_no_momento: sit.liberado ? 'liberado' : 'pendencia',
    detalhe: sit.liberado ? '' : sit.bloqueios.map(p=>p.nome+': '+p.label).join(' | '),
    registrado_por: session.id
  };
  const local = {id:'tmp'+Date.now(), funcionarioId:reg.funcionario_id, obraId:reg.obra_id, tipo:reg.tipo, momento:new Date().toISOString(), status:reg.status_no_momento, detalhe:reg.detalhe, registradoPor:session.id};
  if(!DB.acessos) DB.acessos=[];
  DB.acessos.unshift(local);
  try{
    const {data, error} = await sb.from('acessos').insert(reg).select().single();
    if(error) throw error;
    if(data){ local.id=data.id; local.momento=data.momento; }
  }catch(e){ console.error('acesso', e); toast('Registrado no aparelho, mas falhou online: '+(e.message||e),'err'); }
}

function exportarEfetivoCSV(){
  const dia = filtros._dia || hoje();
  const podeTodas = ['diretoria','ti','sesmt','coord_sesmt','visualizador'].includes(session.tipo);
  const obraSel = (filtros._efObra!==undefined) ? filtros._efObra : (podeTodas ? '' : (_portaria.obraId||''));
  let acc = DB.acessos.filter(a=>String(a.momento||'').slice(0,10)===dia);
  if(obraSel) acc = acc.filter(a=>String(a.obraId)===String(obraSel));
  acc.sort((a,b)=>(a.momento<b.momento?-1:1));
  const linhas = [['Data/Hora','Colaborador','CPF','Empresa','Funcao','Obra','Tipo','Situacao','Detalhe']];
  acc.forEach(a=>{
    const f=DB.funcionarios.find(x=>String(x.id)===String(a.funcionarioId));
    const e=f&&DB.empresas.find(x=>x.id===f.empresaId);
    const c=f&&DB.catalogoFuncoes.find(x=>x.id==f.funcaoId);
    const o=DB.obras.find(x=>String(x.id)===String(a.obraId));
    linhas.push([new Date(a.momento).toLocaleString('pt-BR'), (f&&f.nome)||'', (f&&f.cpf)||'', (e&&e.razao)||'', (c&&c.nome)||'', (o&&o.nome)||'', a.tipo, a.status||'', String(a.detalhe||'').replace(/\n/g,' ')]);
  });
  const csv = linhas.map(l=>l.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(';')).join('\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='efetivo_'+dia+'.csv'; a.click();
}

function carregarImg(src){ return new Promise(function(res){ const i=new Image(); i.onload=function(){res(i);}; i.onerror=function(){res(null);}; i.src=src; }); }
async function pdfPrimeiraPaginaDataURI(blob){
  try{
    if(typeof pdfjsLib==='undefined') return null;
    try{ pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; }catch(e){}
    const buf = await blob.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data:buf}).promise;
    const page = await pdf.getPage(1);
    const base = page.getViewport({scale:1});
    const scale = Math.min(2.5, 700/base.width);
    const vp = page.getViewport({scale:scale});
    const cv = document.createElement('canvas'); cv.width=Math.ceil(vp.width); cv.height=Math.ceil(vp.height);
    await page.render({canvasContext:cv.getContext('2d'), viewport:vp}).promise;
    return cv.toDataURL('image/png');
  }catch(e){ console.error('pdf foto', e); return null; }
}
async function fotoCrachaDataURI(func){
  try{
    const _fids = DB.catalogoDocs.filter(c=>c.categoria==='funcionario' && /foto/i.test(c.nome||'')).map(c=>c.id);
    const _docsFunc = DB.documentos.filter(d=>d.refTipo==='funcionario' && String(d.refId)===String(func.id));
    const doc = _docsFunc.find(d=>(d.docId==='foto' || _fids.indexOf(d.docId)>=0) && d.arquivoPath);
    if(!doc){ try{ console.warn('cracha sem foto -> docs do colaborador:', _docsFunc.map(function(x){return x.docId+(x.arquivoPath?' (com arquivo)':' (sem arquivo)');}), '| ids de foto no catalogo:', _fids); }catch(e){} return null; }
    const {data:blob, error} = await sb.storage.from('documentos').download(doc.arquivoPath);
    if(error || !blob) return null;
    const _p=(doc.arquivoPath||doc.arquivo||'').toLowerCase();
    const ehPdf = _p.endsWith('.pdf') || /^application\/pdf/.test(blob.type||'');
    if(ehPdf) return await pdfPrimeiraPaginaDataURI(blob);
    return await new Promise(function(res){ const fr=new FileReader(); fr.onload=function(){res(fr.result);}; fr.onerror=function(){res(null);}; fr.readAsDataURL(blob); });
  }catch(e){ console.error('foto cracha', e); return null; }
}
function qrCanvasDataURI(text, size){
  try{
    const tmp=document.createElement('div');
    new QRCode(tmp, {text:text, width:size, height:size, correctLevel:QRCode.CorrectLevel.M});
    const cv=tmp.querySelector('canvas'); if(cv) return cv.toDataURL('image/png');
    const im=tmp.querySelector('img'); return im?im.src:null;
  }catch(e){ return null; }
}
function fitLinha(ctx, txt, maxW, weight, basePx, minPx){
  txt=String(txt||'-'); let px=basePx; ctx.font=weight+px+'px Arial';
  while(px>minPx && ctx.measureText(txt).width>maxW){ px--; ctx.font=weight+px+'px Arial'; }
  if(ctx.measureText(txt).width>maxW){ let t=txt; while(t.length>1 && ctx.measureText(t+'...').width>maxW){ t=t.slice(0,-1); } txt=t+'...'; }
  return txt;
}
async function gerarCrachaPNG(func){
  const emp = DB.empresas.find(e=>e.id===func.empresaId);
  const funcao = DB.catalogoFuncoes.find(c=>c.id==func.funcaoId);
  const obra = DB.obras.find(o=>o.id===func.obraId);
  const azul = (DB.config && DB.config.corPrimaria) || '#1a3d7c';
  const nomeEmp = (DB.config && DB.config.nomeEmpresa) || 'BRANDAO & MARMO';
  const W=400, H=620, cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle=azul; ctx.fillRect(0,0,W,64);
  ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='bold 19px Arial';
  ctx.fillText(fitLinha(ctx, nomeEmp+' - SESMT', W-40, 'bold ', 19, 12), W/2, 40);
  const fX=(W-150)/2, fY=86, fW=150, fH=180;
  const fotoURI = await fotoCrachaDataURI(func);
  let drew=false;
  if(fotoURI){ const im=await carregarImg(fotoURI); if(im){ ctx.fillStyle='#fff'; ctx.fillRect(fX,fY,fW,fH); const r=Math.min(fW/im.width,fH/im.height); const dw=im.width*r, dh=im.height*r; ctx.drawImage(im, fX+(fW-dw)/2, fY+(fH-dh)/2, dw, dh); drew=true; } }
  if(!drew){ ctx.fillStyle='#eef1f5'; ctx.fillRect(fX,fY,fW,fH); ctx.fillStyle='#94a3b8'; ctx.font='13px Arial'; ctx.fillText('sem foto', W/2, fY+fH/2); }
  ctx.strokeStyle='#ccc'; ctx.lineWidth=1; ctx.strokeRect(fX,fY,fW,fH);
  const maxW=W-44;
  let y=fY+fH+34;
  ctx.fillStyle='#111'; ctx.fillText(fitLinha(ctx, func.nome||'-', maxW, 'bold ', 22, 14), W/2, y);
  ctx.fillStyle='#555';
  y+=24; ctx.fillText(fitLinha(ctx,(funcao&&funcao.nome)||'-', maxW, '', 15, 11), W/2, y);
  y+=22; ctx.fillText(fitLinha(ctx,(emp&&emp.razao)||'-', maxW, '', 15, 10), W/2, y);
  ctx.fillStyle='#888';
  y+=20; ctx.fillText(fitLinha(ctx,'CPF: '+(func.cpf||'-'), maxW, '', 13, 10), W/2, y);
  if(obra){ y+=18; ctx.fillText(fitLinha(ctx,'Obra: '+obra.nome, maxW, '', 13, 10), W/2, y); }
  const qrSize=150, qrURI=qrCanvasDataURI(QR_PREFIX+func.qrToken, qrSize);
  if(qrURI){ const qi=await carregarImg(qrURI); if(qi) ctx.drawImage(qi,(W-qrSize)/2, H-qrSize-22, qrSize, qrSize); }
  return cv.toDataURL('image/png');
}
async function enviarCrachaColaborador(func){
  try{
    const emp = DB.empresas.find(e=>e.id===func.empresaId);
    if(!emp || !emp.email) return;

    }});

}

async function listarGruposWhatsapp(){
  const box = document.getElementById('wgrupoLista');
  if(box) box.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:6px">Buscando grupos...</div>';
  try{
    const {data, error} = await sb.functions.invoke('efetivo-whatsapp', {body:{evento:'listar_grupos'}});
    if(error) throw error;
    const grupos = (data && data.grupos) || [];
    if(!grupos.length){ if(box) box.innerHTML='<div style="color:var(--muted);font-size:12px;padding:6px">Nenhum grupo encontrado. Confira se a funcao efetivo-whatsapp esta publicada e conectada.</div>'; return; }
    if(box){
      box.innerHTML = '<div style="max-height:180px;overflow:auto;border:1px solid var(--border);border-radius:8px;margin-top:6px">'+
        grupos.map(g=>'<div class="grupo-item" data-id="'+escapeHtml(g.id)+'" style="padding:8px 10px;border-bottom:1px solid var(--border);cursor:pointer">'+escapeHtml(g.subject||g.id)+'<div style="font-size:11px;color:var(--muted)">'+escapeHtml(g.id)+'</div></div>').join('')+
        '</div>';
      box.querySelectorAll('.grupo-item').forEach(el=>el.addEventListener('click',function(){ const inp=document.getElementById('f_wgrupo'); if(inp) inp.value=el.getAttribute('data-id'); box.innerHTML=''; }));
    }
  }catch(e){ if(box) box.innerHTML='<div style="color:#dc2626;font-size:12px;padding:6px">Erro ao listar: '+escapeHtml(e.message||String(e))+'. Voce pode colar o ID do grupo manualmente.</div>'; }
}

/* ===== DOCS EXIGIDOS / STATUS ===== */
function docsExigidosEmpresa(empresa, obraId){
  // união de todas as obras onde a empresa atua (ou apenas a obra filtrada)
  const obras = obraId ? DB.obras.filter(o=>o.id===obraId) : DB.obras.filter(o=>{
    return DB.funcionarios.some(f=>f.empresaId===empresa.id && f.obraId===o.id) ||
           DB.maquinas.some(m=>m.empresaId===empresa.id && m.obraId===o.id);
  });
  const ids = new Set();
  obras.forEach(o=>(o.docsEmpresa||[]).forEach(d=>ids.add(d)));
  return [...ids].map(id=>DB.catalogoDocs.find(d=>d.id===id)).filter(Boolean);
}
function docsExigidosFuncionario(func){
  const obra = DB.obras.find(o=>o.id===func.obraId);
  const funcao = DB.catalogoFuncoes.find(f=>f.id==func.funcaoId);
  const ids = new Set([...(obra?.docsFuncionarioBase||[]), ...(funcao?.docsIds||[])]);
  return [...ids].map(id=>DB.catalogoDocs.find(d=>d.id===id)).filter(Boolean);
}
function docsExigidosMaquina(maq){
  const obra = DB.obras.find(o=>o.id===maq.obraId);
  return (obra?.docsMaquina||[]).map(id=>DB.catalogoDocs.find(d=>d.id===id)).filter(Boolean);
}

function getDoc(tipo, refId, docId, obraId){
  return DB.documentos.find(d=>d.refTipo===tipo && d.refId===refId && d.docId===docId && (tipo!=='empresa' || (d.obraId||null)===(obraId||null)));
}

function statusDoc(doc, exigencia){
  if(!doc) return {label:'NÃO ENVIADO', cls:'pendente', dias:null};
  // status sesmt manda
  if(doc.sesmtStatus==='recusado') return {label:'RECUSADO', cls:'crit'};
  if(doc.sesmtStatus==='pendente') return {label:'AGUARDANDO SESMT', cls:'info'};
  // sesmt aprovado: verifica validade
  if(exigencia && exigencia.validadeDias && doc.validade){
    const dias = Math.floor((new Date(doc.validade)-new Date())/86400000);
    if(dias<0) return {label:'VENCIDO', cls:'crit', dias};
    if(dias<=DB.config.diasAvisoVencimento) return {label:`Vence em ${dias}d`, cls:'warn', dias};
  }
  return {label:'EM DIA', cls:'ok'};
}

function calcStatus(tipo, ref){
  let ok=0,warn=0,crit=0,pend=0,aguard=0,total=0;
  function bump(s){ total++; if(s.cls==='ok')ok++; else if(s.cls==='warn')warn++; else if(s.cls==='crit')crit++; else if(s.cls==='info')aguard++; else pend++; }
  if(tipo==='empresa'){
    (ref.obraIds||[]).forEach(oid=>{
      const obra = DB.obras.find(o=>o.id===oid);
      (obra?.docsEmpresa||[]).forEach(did=>{
        const ex = DB.catalogoDocs.find(c=>c.id===did); if(!ex) return;
        bump(statusDoc(getDoc('empresa',ref.id,did,oid), ex));
      });
    });
  } else {
    const exigidos = tipo==='funcionario'?docsExigidosFuncionario(ref) : docsExigidosMaquina(ref);
    exigidos.forEach(e=>bump(statusDoc(getDoc(tipo, ref.id, e.id), e)));
  }
  return {total, ok, warn, crit, pend, aguard};
}

/* ===== IA ===== */
function simularIA(){
  const r = Math.random();
  if(r<0.7) return {iaStatus:'aprovado', iaNota:'(Simulado) Documento parece OK.'};
  if(r<0.9) return {iaStatus:'duvida', iaNota:'(Simulado) Revisão recomendada.'};
  return {iaStatus:'recusado', iaNota:'(Simulado) Ilegível.'};
}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=>res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function analisarComGemini(file, docExigido, contexto){
  const apiKey = DB.config.geminiApiKey;
  if(!apiKey) return simularIA();
  if(!file) return {iaStatus:'pendente', iaNota:'Sem arquivo para analisar.'};

  const checklist = docExigido.checklistIA || docExigido.descricao || '';
  const prompt = `Voce e um analista SENIOR de SESMT (Saude e Seguranca do Trabalho) experiente, JUSTO e EQUILIBRADO, de uma construtora brasileira (Brandao & Marmo). Sua funcao e validar documentos enviados por empresas terceirizadas.

DOCUMENTO ESPERADO: "${docExigido.nome}"

CONTEXTO CADASTRADO NO SISTEMA:
${contexto}

${checklist ? 'CHECKLIST ESPECIFICO DA B&M PARA ESTE DOCUMENTO:\n'+checklist+'\n' : ''}

═══ PRINCIPIO BASICO ═══
NA DUVIDA, MARQUE "duvida" PARA REVISAO HUMANA. NAO "recusado".
SO "recusado" se houver problema CLARO e INSANAVEL.
Voce deve ser JUSTO: documentos validos da vida real tem variacoes — aceite as razoaveis.

═══ VARIACOES QUE VOCE DEVE ACEITAR (NAO sao motivo de recusa) ═══
- Acentuacao: "JOSE" = "JOSÉ", "MARCAO" = "MARÇÃO"
- Abreviacoes: "Jr." = "Junior", "J." = "Jose", "Ma." = "Maria"
- Sobrenome: ordem diferente, sobrenome composto, "de/da/dos" com ou sem
- CPF/CNPJ: "123.456.789-00" = "12345678900", com ou sem formatacao
- Maiusculas/minusculas
- Espacos extras, traços, pontos
- Qualidade de scan razoavel (mesmo um pouco borrado se da pra ler)
- Diferenca de fonte/layout entre documentos
- Carimbos/assinaturas em variacoes de cor/posicao

═══ SO RECUSE ("recusado") QUANDO ═══
1. NOME no PDF for de PESSOA COMPLETAMENTE DIFERENTE da cadastrada (nao apenas variacao)
2. CPF/CNPJ tiver DIGITOS NUMERICOS diferentes (nao apenas formatacao)
3. TIPO de documento for outro completamente (ex: enviaram CNH no lugar de ASO)
4. Documento for FALSIFICADO, RASURADO, ou claramente fraudulento
5. Estiver TAO ilegivel que e impossivel extrair qualquer dado

═══ MARQUE "duvida" QUANDO ═══
- Nao conseguir ler claramente nome ou CPF (mas o documento parece valido)
- Algum item do checklist nao for confirmavel mas tambem nao for negado
- Documento parece OK mas com qualidade ruim
- Voce nao tem certeza absoluta — prefere revisao humana

═══ APROVE QUANDO ═══
- Identidade bate (mesmo com variacoes toleraveis)
- Tipo de documento confere
- Checklist principal atendido
- Documento legivel e completo

OUTPUT: APENAS UM JSON PURO, SEM markdown, SEM backticks. Formato EXATO:
{
  "status": "aprovado",
  "resumo": "uma frase curta resumindo a analise",
  "leitura": {
    "nome": "nome encontrado no PDF ou null",
    "cpf_cnpj": "CPF/CNPJ encontrado no PDF (com formatacao) ou null",
    "funcao": "funcao/cargo encontrado ou null",
    "emissao": "data de emissao encontrada ou null",
    "validade": "data de validade encontrada ou null",
    "outros_dados": "outras informacoes relevantes (CRM, ART, nr horas, etc) ou null"
  },
  "comparacao": {
    "nome_bate": "sim / nao / parcial / nao_visivel",
    "cpf_cnpj_bate": "sim / nao / parcial / nao_visivel",
    "funcao_compativel": "sim / nao / parcial / nao_aplicavel"
  },
  "checklist": [
    {"item": "texto do item verificado", "atendido": true, "observacao": "detalhe opcional"}
  ],
  "divergencias": ["lista de problemas reais encontrados, ou vazia"],
  "recomendacao": "se status != aprovado, o que fazer para corrigir; se aprovado, vazio"
}`;

  try{
    const base64 = await fileToBase64(file);
    const mimeType = file.type || 'application/pdf';
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${DB.config.geminiModel||'gemini-2.0-flash'}:generateContent?key=${encodeURIComponent(apiKey)}`;
    const res = await fetch(url, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        contents:[{parts:[
          {inline_data:{mime_type:mimeType, data:base64}},
          {text:prompt}
        ]}],
        generationConfig:{temperature:0.15, maxOutputTokens:3000, responseMimeType:'application/json'}
      })
    });
    if(!res.ok){
      const err = await res.text();
      return {iaStatus:'pendente', iaNota:`Erro Gemini ${res.status}: ${err.slice(0,200)}`};
    }
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const cleaned = text.replace(/```json|```/g,'').trim();
    let parsed;
    try{ parsed = JSON.parse(cleaned); }
    catch(e){
      const m = cleaned.match(/\{[\s\S]*\}/);
      if(m){ try{ parsed = JSON.parse(m[0]); }catch(e2){ return {iaStatus:'pendente', iaNota:'IA respondeu fora do formato JSON. Texto: '+cleaned.slice(0,300)}; } }
      else return {iaStatus:'pendente', iaNota:'IA respondeu fora do formato JSON. Texto: '+cleaned.slice(0,300)};
    }
    const status = ['aprovado','duvida','recusado'].includes(parsed.status) ? parsed.status : 'duvida';
    return {iaStatus:status, iaNota: formatarNotaIA(parsed)};
  } catch(e){
    return {iaStatus:'pendente', iaNota:'Falha ao chamar Gemini: '+e.message};
  }
}

function formatarNotaIA(p){
  const linhas = [];
  if(p.resumo) linhas.push('📋 RESUMO: '+p.resumo);
  if(p.leitura){
    linhas.push('');
    linhas.push('🔍 DADOS LIDOS NO DOCUMENTO:');
    const L = p.leitura;
    if(L.nome) linhas.push('  • Nome: '+L.nome);
    if(L.cpf_cnpj) linhas.push('  • CPF/CNPJ: '+L.cpf_cnpj);
    if(L.funcao) linhas.push('  • Função/Cargo: '+L.funcao);
    if(L.emissao) linhas.push('  • Emissão: '+L.emissao);
    if(L.validade) linhas.push('  • Validade: '+L.validade);
    if(L.outros_dados) linhas.push('  • Outros: '+L.outros_dados);
  }
  if(p.comparacao){
    linhas.push('');
    linhas.push('✓ COMPARAÇÃO COM CADASTRO:');
    const C = p.comparacao;
    const map = (v)=>({sim:'✅ confere',nao:'❌ DIVERGENTE',parcial:'⚠️ parcial',nao_visivel:'❓ não visível',nao_aplicavel:'— n/a'})[v]||v;
    if(C.nome_bate) linhas.push('  • Nome: '+map(C.nome_bate));
    if(C.cpf_cnpj_bate) linhas.push('  • CPF/CNPJ: '+map(C.cpf_cnpj_bate));
    if(C.funcao_compativel) linhas.push('  • Função: '+map(C.funcao_compativel));
  }
  if(Array.isArray(p.checklist) && p.checklist.length){
    linhas.push('');
    linhas.push('📝 CHECKLIST DE VALIDAÇÃO:');
    p.checklist.forEach(c=>{
      const mark = c.atendido?'✅':'❌';
      linhas.push('  '+mark+' '+c.item+(c.observacao?' — '+c.observacao:''));
    });
  }
  if(Array.isArray(p.divergencias) && p.divergencias.length){
    linhas.push('');
    linhas.push('⚠️ DIVERGÊNCIAS / PROBLEMAS:');
    p.divergencias.forEach(d=>linhas.push('  • '+d));
  }
  if(p.recomendacao){
    linhas.push('');
    linhas.push('💡 RECOMENDAÇÃO: '+p.recomendacao);
  }
  return linhas.join('\n');
}

/* ===== DASHBOARD ===== */
function renderDashboard(){
  let emps = escopoEmpresas(), funcs = escopoFuncionarios(), maqs = escopoMaquinas();
  if(filtros.obraId){
    const oid = parseInt(filtros.obraId);
    funcs = funcs.filter(f=>f.obraId===oid);
    maqs = maqs.filter(m=>m.obraId===oid);
    const eids = new Set([...funcs.map(f=>f.empresaId),...maqs.map(m=>m.empresaId)]);
    emps = emps.filter(e=>eids.has(e.id));
  }
  if(filtros.empresaId){
    const eid = parseInt(filtros.empresaId);
    emps = emps.filter(e=>e.id===eid);
    funcs = funcs.filter(f=>f.empresaId===eid);
    maqs = maqs.filter(m=>m.empresaId===eid);
  }
  let totalDocs=0,vencidos=0,vencendo=0,pendentes=0,conformes=0,aguardando=0;
  emps.forEach(e=>{const s=calcStatus('empresa',e); totalDocs+=s.total;vencidos+=s.crit;vencendo+=s.warn;pendentes+=s.pend;conformes+=s.ok;aguardando+=s.aguard;});
  funcs.forEach(f=>{const s=calcStatus('funcionario',f); totalDocs+=s.total;vencidos+=s.crit;vencendo+=s.warn;pendentes+=s.pend;conformes+=s.ok;aguardando+=s.aguard;});
  maqs.forEach(m=>{const s=calcStatus('maquina',m); totalDocs+=s.total;vencidos+=s.crit;vencendo+=s.warn;pendentes+=s.pend;conformes+=s.ok;aguardando+=s.aguard;});

  // lista de pendências
  const lista = [];
  emps.forEach(e=>{
    (e.obraIds||[]).forEach(oid=>{
      const obra = DB.obras.find(o=>o.id===oid); if(!obra) return;
      (obra.docsEmpresa||[]).forEach(did=>{
        const ex = DB.catalogoDocs.find(c=>c.id===did); if(!ex) return;
        const doc = getDoc('empresa',e.id,did,oid);
        const s = statusDoc(doc,ex);
        if(s.cls!=='ok') lista.push({tipo:'empresa', ref:e, nomeRef:e.razao, ctx:`${e.cnpj} • ${obra.nome}`, doc:ex, status:s, docObj:doc});
      });
    });
  });
  funcs.forEach(f=>{
    const emp = DB.empresas.find(x=>x.id===f.empresaId);
    const obra = DB.obras.find(x=>x.id===f.obraId);
    docsExigidosFuncionario(f).forEach(ex=>{
      const doc = getDoc('funcionario',f.id,ex.id);
      const s = statusDoc(doc,ex);
      if(s.cls!=='ok') lista.push({tipo:'funcionario', ref:f, nomeRef:f.nome, ctx:`${emp?.razao||''} • ${obra?.nome||''}`, doc:ex, status:s, docObj:doc});
    });
  });
  maqs.forEach(m=>{
    const emp = DB.empresas.find(x=>x.id===m.empresaId);
    docsExigidosMaquina(m).forEach(ex=>{
      const doc = getDoc('maquina',m.id,ex.id);
      const s = statusDoc(doc,ex);
      if(s.cls!=='ok') lista.push({tipo:'maquina', ref:m, nomeRef:m.descricao, ctx:emp?.razao||'', doc:ex, status:s, docObj:doc});
    });
  });
  const ord = {crit:0, warn:1, info:2, pendente:3, ok:4};
  lista.sort((a,b)=>ord[a.status.cls]-ord[b.status.cls]);

  document.getElementById('main').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Dashboard</div><div class="page-sub">Visão geral da conformidade documental</div></div>
      ${pode('notificar')?`<button class="btn btn-primary" onclick="enviarNotificacoesEmLote()">✉️ Notificar todas as empresas com pendência</button>`:''}
    </div>
    ${toolbarFiltros({busca:false,obra:true,empresa:true})}
    <div class="stats">
      <div class="stat-card ok"><div class="stat-label">Em dia</div><div class="stat-value">${conformes}</div><div class="stat-sub">de ${totalDocs} documentos exigidos</div></div>
      <div class="stat-card warn"><div class="stat-label">Vencendo</div><div class="stat-value">${vencendo}</div><div class="stat-sub">próximos ${DB.config.diasAvisoVencimento} dias</div></div>
      <div class="stat-card crit"><div class="stat-label">Vencidos/Recusados</div><div class="stat-value">${vencidos}</div><div class="stat-sub">ação imediata</div></div>
      <div class="stat-card"><div class="stat-label">Não enviados</div><div class="stat-value">${pendentes}</div></div>
      <div class="stat-card" style="border-color:var(--info)"><div class="stat-label">Aguardando SESMT</div><div class="stat-value">${aguardando}</div><div class="stat-sub">análise pendente</div></div>
    </div>
    <div class="card">
      <h3 style="margin-bottom:12px">⚠️ Pendências (${lista.length})</h3>
      ${lista.length===0?'<div class="empty"><div class="empty-icon">✅</div>Tudo em dia!</div>':`
      <table>
        <thead><tr><th>Tipo</th><th>Item</th><th>Documento</th><th>Vínculo</th><th>IA</th><th>Status</th></tr></thead>
        <tbody>${lista.slice(0,25).map(c=>`
          <tr>
            <td>${c.tipo==='empresa'?'🏢':c.tipo==='funcionario'?'👷':'🚜'}</td>
            <td><b>${c.nomeRef}</b></td>
            <td>${c.doc.nome}</td>
            <td style="color:var(--muted);font-size:12px">${c.ctx||'-'}</td>
            <td>${c.docObj?`<span class="badge-ia ${c.docObj.iaStatus}">${c.docObj.iaStatus}</span>`:'-'}</td>
            <td><span class="status ${c.status.cls}">${c.status.label}</span></td>
          </tr>`).join('')}</tbody>
      </table>
      ${lista.length>25?`<div style="text-align:center;margin-top:12px;color:var(--muted)">+ ${lista.length-25} pendências (ver Relatórios)</div>`:''}
      `}
    </div>
  `;
}

/* ===== TOOLBAR DE FILTROS (dropdowns) ===== */
function toolbarFiltros(opts={}){
  const obras = escopoObras();
  const emps = escopoEmpresas();
  const isEmpresa = session.tipo==='empresa';
  const temFiltro = filtros.obraId||filtros.empresaId||filtros.status||filtros.busca;
  let html = `<div class="filtros-box">`;
  html += `<div class="filtros-row">`;
  // OBRA
  if(opts.obra && obras.length>=1){
    html += `<div class="filtro-item"><label class="filtro-lbl">📍 Obra</label>
      <select class="filtro-select" onchange="filtros.obraId=this.value;go('${currentPage}')">
        <option value="">Todas as obras</option>
        ${obras.map(o=>`<option value="${o.id}" ${filtros.obraId==o.id?'selected':''}>${escapeHtml(o.nome)}</option>`).join('')}
      </select></div>`;
  }
  // EMPRESA
  if(opts.empresa && !isEmpresa && emps.length>=1){
    html += `<div class="filtro-item"><label class="filtro-lbl">🏢 Empresa</label>
      <select class="filtro-select" onchange="filtros.empresaId=this.value;go('${currentPage}')">
        <option value="">Todas as empresas</option>
        ${emps.map(e=>`<option value="${e.id}" ${filtros.empresaId==e.id?'selected':''}>${escapeHtml(e.razao)}</option>`).join('')}
      </select></div>`;
  }
  // STATUS
  if(opts.status){
    const sts = [['','Todos os status'],['ok','Em dia'],['warn','Vencendo'],['crit','Vencidos/Recusados'],['info','Aguardando SESMT'],['pendente','Não enviados']];
    html += `<div class="filtro-item"><label class="filtro-lbl">📊 Status</label>
      <select class="filtro-select" onchange="filtros.status=this.value;go('${currentPage}')">
        ${sts.map(([v,l])=>`<option value="${v}" ${filtros.status===v?'selected':''}>${l}</option>`).join('')}
      </select></div>`;
  }
  // BUSCA
  if(opts.busca!==false){
    html += `<div class="filtro-item" style="flex:1;min-width:180px"><label class="filtro-lbl">🔎 Buscar</label>
      <input class="filtro-select" id="ftBusca" placeholder="Digite para buscar..." value="${escapeHtml(filtros.busca||'')}" oninput="filtros.busca=this.value;clearTimeout(window._fb);window._fb=setTimeout(()=>go('${currentPage}'),300)"></div>`;
  }
  // AÇÕES + LIMPAR
  if(opts.actions || temFiltro){
    html += `<div class="filtro-item filtro-actions">`;
    if(opts.actions) html += opts.actions;
    if(temFiltro) html += `<button class="filtros-clear" onclick="filtros={obraId:'',empresaId:'',status:'',busca:''};go('${currentPage}')">✕ Limpar</button>`;
    html += `</div>`;
  }
  html += `</div></div>`;
  return html;
}

function checkboxesDocs(categoria, selecionados, name){
  const docs = DB.catalogoDocs.filter(d=>d.categoria===categoria);
  if(docs.length===0) return '<div class="empty">Nenhum documento no catálogo. Cadastre em Catálogo de Documentos.</div>';
  return docs.map(d=>`<label><input type="checkbox" name="${name}" value="${d.id}" ${selecionados.includes(d.id)?'checked':''}><span><b>${d.nome}</b>${d.validadeDias?` <span style="color:var(--muted);font-size:11px">(${d.validadeDias}d)</span>`:''}${d.descricao?`<div style="font-size:11px;color:var(--muted)">${d.descricao}</div>`:''}</span></label>`).join('');
}
function getChecked(name){ return [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(i=>i.value); }

function editEmpresa(id){
  const e = id ? DB.empresas.find(x=>x.id===id) : {cnpj:'',razao:'',email:'',responsavel:'',telefone:'',obraIds:[]};
  const userExistente = id ? DB.usuarios.find(u=>u.tipo==='empresa'&&u.empresaId===id) : null;
  const obrasAtivas = DB.obras.filter(o=>o.ativa);
  showModal(id?'Editar Empresa':'Nova Empresa', `
    <div class="grid-2">
      <div class="form-group"><label>CNPJ</label><input id="f_cnpj" value="${e.cnpj}" placeholder="00.000.000/0001-00"></div>
      <div class="form-group"><label>Razão Social</label><input id="f_razao" value="${e.razao}"></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Responsável</label><input id="f_resp" value="${e.responsavel||''}"></div>
      <div class="form-group"><label>Telefone</label><input id="f_tel" value="${e.telefone||''}"></div>
    </div>
    <div class="form-group"><label>E-mail (login da empresa)</label><input id="f_email" type="email" value="${e.email}"></div>
    <div class="form-group"><label>Senha de acesso ${id?'(deixe em branco para manter)':''}</label><input id="f_senha" type="password" placeholder="${id?'••••':'Senha inicial'}"></div>
    <div class="form-group">
      <label>🏗️ Obras onde esta empresa está atuando</label>
      <div class="checkbox-list">
        ${obrasAtivas.length===0?'<div class="empty" style="padding:14px">Cadastre obras primeiro</div>':obrasAtivas.map(o=>`<label><input type="checkbox" name="f_obras_emp" value="${o.id}" ${(e.obraIds||[]).includes(o.id)?'checked':''}><span><b>${o.nome}</b><div style="font-size:11px;color:var(--muted)">${o.endereco||''}</div></span></label>`).join('')}
      </div>
    </div>
    <div class="alert info">A empresa fará login com o e-mail acima. Ela só poderá <b>enviar</b> documentos — quem define o que é exigido é o SESMT.</div>
  `, async ()=>{
    const data = {cnpj:val('f_cnpj'),razao:val('f_razao'),responsavel:val('f_resp'),telefone:val('f_tel'),email:val('f_email').toLowerCase(),obraIds:getChecked('f_obras_emp').map(x=>parseInt(x))};
    const senha = val('f_senha');
    if(!data.cnpj||!data.razao||!data.email){ toast('CNPJ, razão e e-mail obrigatórios','err'); return false; }
    if(id){
      // atualizar empresa direto no Supabase
      const {error:errE} = await sb.from('empresas').update({cnpj:data.cnpj, razao:data.razao, responsavel:data.responsavel, email:data.email, telefone:data.telefone}).eq('id', id);
      if(errE){ toast('Erro: '+errE.message,'err'); return false; }
      // atualizar empresa_obras
      await sb.from('empresa_obras').delete().eq('empresa_id', id);
      if(data.obraIds.length){
        await sb.from('empresa_obras').insert(data.obraIds.map(oid=>({empresa_id:id, obra_id:oid})));
      }
      Object.assign(e, data);
      if(userExistente && senha){ toast('Senha de usuário só pode ser alterada via "Esqueci minha senha"','warn'); }
    } else {
      if(!senha || senha.length<6){ toast('Senha obrigatória (mín. 6)','err'); return false; }
      toast('Cadastrando empresa...');
      // criar empresa
      const {data:novaEmp, error:errIns} = await sb.from('empresas').insert({cnpj:data.cnpj,razao:data.razao,responsavel:data.responsavel,email:data.email,telefone:data.telefone}).select().single();
      if(errIns){ toast('Erro ao criar empresa: '+errIns.message,'err'); return false; }
      const newId = novaEmp.id;
      // vincular obras
      if(data.obraIds.length){
        await sb.from('empresa_obras').insert(data.obraIds.map(oid=>({empresa_id:newId, obra_id:oid})));
      }
      // criar usuario tipo empresa via Edge Function
      const {data:resp, error} = await sb.functions.invoke('criar-usuario', {
        body:{email:data.email, password:senha, nome:data.razao, tipo:'empresa', empresaId:newId, obraIds:[]}
      });
      if(error||resp?.error){
        // rollback empresa
        await sb.from('empresas').delete().eq('id', newId);
        toast('Erro ao criar login: '+(resp?.error||error.message),'err');
        return false;
      }
      DB.empresas.push({id:newId,...data});
      DB.usuarios.push({id:resp.id,email:data.email,nome:data.razao,tipo:'empresa',empresaId:newId,obraIds:[],naoApagar:false});
    }
    save(); go('empresas'); toast('Empresa salva com sucesso');
    return true;
  }, id?[{label:'Excluir',cls:'btn-danger',fn:async ()=>{
    if(!confirm('Excluir esta empresa? Todos os colaboradores, máquinas e documentos vinculados também serão removidos. Esta ação não pode ser desfeita.')) return;
    // remove docs no storage
    const docs = DB.documentos.filter(d=>{
      if(d.refTipo==='empresa' && d.refId===id) return true;
      const f = DB.funcionarios.find(ff=>ff.id===d.refId && d.refTipo==='funcionario');
      const m = DB.maquinas.find(mm=>mm.id===d.refId && d.refTipo==='maquina');
      return (f&&f.empresaId===id) || (m&&m.empresaId===id);
    });
    const paths = docs.map(d=>d.arquivoPath).filter(Boolean);
    if(paths.length) sb.storage.from('documentos').remove(paths).catch(()=>{});
    // apaga usuario tipo empresa
    if(userExistente) await sb.from('usuarios').delete().eq('id', userExistente.id);
    // CASCADE no banco apaga empresa_obras/funcionarios/maquinas (FK ON DELETE CASCADE)
    await sb.from('documentos').delete().eq('ref_tipo','empresa').eq('ref_id', id);
    const {error} = await sb.from('empresas').delete().eq('id', id);
    if(error){ toast('Erro: '+error.message,'err'); return; }
    DB.empresas = DB.empresas.filter(x=>x.id!==id);
    DB.funcionarios = DB.funcionarios.filter(f=>f.empresaId!==id);
    DB.maquinas = DB.maquinas.filter(m=>m.empresaId!==id);
    DB.documentos = DB.documentos.filter(d=>!docs.includes(d));
    if(userExistente) DB.usuarios = DB.usuarios.filter(u=>u.id!==userExistente.id);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
    toast('Empresa excluída'); go('empresas'); closeModal();
  }}]:[]);
}
