<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --brand-orange: #EE7E22;
    --brand-orange-dark: #C8631A;
    --brand-orange-light: #fde6d2;
    --brand-navy: #1B2A5E;
    --brand-navy-dark: #0F1A40;
    --brand-navy-light: #e3e7f3;
    --success: #16a34a;
    --warning: #ea580c;
    --danger: #dc2626;
    --bg: #f4f4f5;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b7280;
    --border: #e5e7eb;
  }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    overscroll-behavior-y: contain;
  }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 84px; background: var(--bg); position: relative; }

  /* ===== TOP BAR ===== */
  header.topbar {
    background: var(--brand-navy);
    color: white;
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.18);
    border-bottom: 3px solid var(--brand-orange);
  }
  header.topbar .brand { display: flex; flex-direction: column; line-height: 1.1; }
  header.topbar .brand .name { font-size: 15px; font-weight: 800; letter-spacing: 1px; }
  header.topbar .brand .name .amp { color: var(--brand-orange); }
  header.topbar .brand .tag { font-size: 10px; color: var(--brand-orange); font-weight: 600; letter-spacing: 0.5px; margin-top: 2px; }
  header.topbar .right { display: flex; gap: 6px; align-items: center; }
  header.topbar .icon-btn {
    background: rgba(255,255,255,.1); border: 0; color: white; width: 36px; height: 36px;
    border-radius: 8px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  header.topbar .icon-btn:active { background: rgba(255,255,255,.22); }
  header.topbar .icon-btn .badge-dot {
    position: absolute; top: 4px; right: 4px;
    background: var(--brand-orange); color: var(--brand-navy);
    min-width: 16px; height: 16px; border-radius: 8px;
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4px;
  }

  /* botão de refresh com animação */
  @keyframes bm-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  header.topbar .icon-btn.spinning svg,
  header.topbar .icon-btn.spinning .ic { animation: bm-spin 0.6s linear; }

  main.content { padding: 16px; }
  .page-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; color: var(--brand-navy); }
  .page-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .card h2 { font-size: 15px; margin-bottom: 10px; color: var(--brand-navy); font-weight: 700; }
  .card .card-hint { font-size: 12px; color: var(--muted); margin-top: -4px; margin-bottom: 10px; }

  /* ===== STATS ===== */
  .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
  .stat {
    background: var(--card); border-radius: 12px; padding: 14px;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
    border-left: 4px solid var(--brand-orange);
  }
  .stat .label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat .value { font-size: 22px; font-weight: 800; color: var(--brand-navy); margin-top: 4px; }
  .stat.alert { border-left-color: var(--brand-orange); }
  .stat.alert .value { color: var(--warning); }

  /* ===== BUTTONS ===== */
  .btn {
    background: var(--brand-orange); color: white; border: 0; padding: 12px 16px;
    border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer;
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background .15s;
  }
  .btn:active { background: var(--brand-orange-dark); }
  .btn.secondary { background: white; color: var(--brand-navy); border: 1px solid var(--border); }
  .btn.secondary:active { background: #f3f4f6; }
  .btn.outline-red { background: white; color: var(--brand-orange); border: 1px solid var(--brand-orange); }
  .btn.dark { background: var(--brand-navy); color: white; }
  .btn.danger { background: var(--danger); }
  .btn.warning { background: var(--warning); }
  .btn.success { background: var(--success); }
  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ===== FORMS ===== */
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 12px; font-size: 15px;
    border: 1px solid var(--border); border-radius: 8px; background: white;
    font-family: inherit;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: 2px solid var(--brand-orange); outline-offset: -1px; border-color: var(--brand-orange);
  }
  .form-group input:read-only, .form-group input:disabled,
  .form-group textarea:read-only, .form-group textarea:disabled,
  .form-group select:disabled {
    background: #f3f4f6; color: #6b7280; cursor: not-allowed;
  }
  .form-help { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .lock-hint { background: #fef9c3; border: 1px solid #fde68a; color: #854d0e; padding: 8px 10px; border-radius: 8px; font-size: 12px; display: flex; gap: 6px; align-items: flex-start; margin-bottom: 12px; }

  /* ===== ITEM LIST ===== */
  .item-list { display: flex; flex-direction: column; gap: 8px; }
  .item {
    background: var(--card); border-radius: 10px; padding: 12px;
    box-shadow: 0 1px 2px rgba(0,0,0,.05);
    display: flex; align-items: center; gap: 12px; cursor: pointer;
    border-left: 3px solid transparent;
  }
  .item:active { background: #f8fafc; }
  .item.cat-ti { border-left-color: var(--brand-navy); }
  .item.cat-obra { border-left-color: var(--brand-orange); }
  .item.pending-accept { border-left-color: var(--warning); background: #fff7ed; }
  .item .item-icon {
    width: 42px; height: 42px; border-radius: 10px; background: var(--brand-orange-light);
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    flex-shrink: 0;
  }
  .item.cat-ti .item-icon { background: var(--brand-navy-light); }
  .item.cat-obra .item-icon { background: var(--brand-orange-light); }
  .item .item-info { flex: 1; min-width: 0; }
  .item .item-info .title { font-weight: 700; font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item .item-info .subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item .item-info .codigo { font-family: 'SF Mono', Consolas, monospace; font-size: 11px; color: var(--brand-orange); font-weight: 600; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
  .badge.ativo { background: #dcfce7; color: #166534; }
  .badge.aguardando_aceite { background: #fed7aa; color: #9a3412; }
  .badge.manutencao { background: #fef3c7; color: #854d0e; }
  .badge.emprestado { background: #ddd6fe; color: #5b21b6; }
  .badge.baixado { background: #fee2e2; color: #991b1b; }
  .badge.extraviado { background: #fecaca; color: #7f1d1d; }
  .badge.aguardando_aprovacao_cadastro     { background: #e0e7ff; color: #3730a3; }
  .badge.aguardando_aprovacao_movimentacao { background: #ffedd5; color: #9a3412; }
  .badge.aguardando_aprovacao_baixa        { background: #fde68a; color: #92400e; }
  .badge.aguardando_aprovacao_extravio { background: #fde68a; color: #92400e; }
  .badge.cat-ti { background: var(--brand-navy-light); color: var(--brand-navy); }
  .badge.cat-obra { background: var(--brand-orange-light); color: var(--brand-orange-dark); }

  /* ===== BOTTOM NAV ===== */
  nav.bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px; background: white;
    border-top: 1px solid var(--border);
    display: grid;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 100;
    box-shadow: 0 -2px 8px rgba(0,0,0,.04);
  }
  nav.bottom-nav button {
    background: none; border: 0; padding: 10px 4px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    color: var(--muted); font-size: 10px; font-weight: 600;
    position: relative;
  }
  nav.bottom-nav button.active { color: var(--brand-orange); }
  nav.bottom-nav button .nav-icon { font-size: 20px; }
  nav.bottom-nav button .nav-pill {
    position: absolute; top: 4px; right: calc(50% - 22px);
    background: var(--brand-orange); color: var(--brand-navy);
    font-size: 9px; font-weight: 800;
    border-radius: 8px; padding: 1px 5px;
    min-width: 16px; text-align: center;
  }

  /* ===== SCANNER ===== */
  .scanner-container {
    background: black; border-radius: 12px; overflow: hidden;
    aspect-ratio: 4/3; position: relative;
  }
  #scanner-video { width: 100%; height: 100%; object-fit: cover; }
  .scanner-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; display: flex; align-items: center; justify-content: center;
  }
  .scanner-overlay::before {
    content: ''; width: 70%; height: 30%; border: 3px solid var(--brand-orange); border-radius: 8px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,.4);
  }
  .scanner-status {
    position: absolute; bottom: 10px; left: 10px; right: 10px;
    background: rgba(0,0,0,.75); color: white; padding: 8px 12px;
    border-radius: 8px; font-size: 13px; text-align: center;
  }

  /* ===== MODAL ===== */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .modal {
    background: white; width: 100%; max-width: 480px; max-height: 92vh;
    border-radius: 16px 16px 0 0; padding: 20px; overflow-y: auto;
  }
  .modal h2 { margin-bottom: 14px; color: var(--brand-navy); }
  .modal .close-btn {
    position: absolute; top: 12px; right: 16px; background: none; border: 0;
    font-size: 24px; color: var(--muted); cursor: pointer;
  }

  .empty-state { text-align: center; color: var(--muted); padding: 40px 20px; }
  .empty-state .emoji { font-size: 48px; margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }

  .filter-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .filter-row select, .filter-row input { flex: 1; padding: 10px 12px; font-size: 14px; border: 1px solid var(--border); border-radius: 8px; background: white; }

  .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 10px; }
  .detail-row:last-child { border-bottom: 0; }
  .detail-row .label { color: var(--muted); font-size: 13px; flex-shrink: 0; }
  .detail-row .value { font-weight: 600; font-size: 14px; text-align: right; word-break: break-word; }

  .timeline { border-left: 2px solid var(--border); padding-left: 16px; margin-left: 8px; margin-top: 8px; }
  .timeline-item { padding-bottom: 14px; position: relative; }
  .timeline-item::before {
    content: ''; position: absolute; left: -22px; top: 4px;
    width: 10px; height: 10px; border-radius: 50%; background: var(--brand-orange);
  }
  .timeline-item.acceptance::before { background: var(--success); }
  .timeline-item .when { font-size: 11px; color: var(--muted); }
  .timeline-item .what { font-size: 14px; font-weight: 600; margin: 2px 0; color: var(--brand-navy); }
  .timeline-item .who { font-size: 12px; color: var(--muted); }
  .timeline-item .meta { font-size: 12px; color: var(--text); margin-top: 2px; }

  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: var(--brand-navy); color: white; padding: 10px 16px;
    border-radius: 8px; z-index: 300; font-size: 14px; font-weight: 500;
    animation: toastIn .25s ease;
    max-width: 90%; text-align: center;
  }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

  /* ===== QUICK ACTIONS ===== */
  .quick-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .quick-action {
    background: white; border: 0; border-radius: 12px; padding: 16px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    box-shadow: 0 1px 3px rgba(0,0,0,.05); cursor: pointer; font-size: 12px; font-weight: 600;
    color: var(--brand-navy); text-align: center;
  }
  .quick-action .qa-icon { font-size: 26px; }
  .quick-action:active { background: #f8fafc; }
  .quick-action.primary { background: var(--brand-orange); color: white; }
  .quick-action.primary:active { background: var(--brand-orange-dark); }
  .quick-action.dark { background: var(--brand-navy); color: white; }

  .seg-control { display: flex; background: var(--border); border-radius: 8px; padding: 3px; margin-bottom: 12px; }
  .seg-control button {
    flex: 1; background: none; border: 0; padding: 8px; font-size: 12px; font-weight: 600;
    border-radius: 6px; cursor: pointer; color: var(--muted);
  }
  .seg-control button.active { background: white; color: var(--brand-orange); box-shadow: 0 1px 2px rgba(0,0,0,.05); }

  /* ===== LOGIN ===== */
  .login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    background:
      radial-gradient(circle at 18% 12%, rgba(238,126,34,0.06), transparent 42%),
      radial-gradient(circle at 88% 92%, rgba(27,42,94,0.06), transparent 45%),
      #eef1f6;
  }

  .login-card {
    width: 100%; max-width: 400px;
    background: white; border-radius: 18px; padding: 30px 26px;
    box-shadow: 0 20px 50px rgba(0,0,0,.12), 0 2px 6px rgba(0,0,0,.06);
    border-top: 4px solid var(--brand-orange);
    text-align: center;
  }

  .login-screen .brand-icon {
    width: 76px; height: 76px; margin: 0 auto 14px;
    border-radius: 18px; overflow: hidden; background: #fff;
    border: 1px solid var(--border);
    box-shadow: 0 6px 16px rgba(0,0,0,0.12);
  }
  .login-screen .brand-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .login-screen .brand-mark {
    font-size: 26px; font-weight: 800; letter-spacing: 1px; margin-bottom: 6px;
  }
  .login-screen .brand-mark .b1 { color: var(--brand-navy); }
  .login-screen .brand-mark .b2 { color: var(--brand-orange); }

  .login-screen .system-name { font-size: 14px; color: var(--brand-navy); margin-bottom: 2px; }
  .login-screen .system-name strong { font-weight: 800; }
  .login-screen .system-desc { font-size: 12px; color: var(--muted); margin-bottom: 22px; }

  .login-card form { text-align: left; }
  .login-card h2 { margin-bottom: 4px; color: var(--brand-navy); font-size: 20px; }
  .login-card .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 18px; }

  .login-screen .footer-mark {
    text-align: center; margin-top: 18px;
    color: var(--muted); font-size: 10px; letter-spacing: 1px;
  }

  hr.separator { border: 0; border-top: 1px solid var(--border); margin: 12px 0; }

  .pill { background: var(--brand-orange-light); color: var(--brand-orange-dark); padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; display: inline-block; }
  .pill.dark { background: var(--brand-navy); color: white; }

  .role-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; }
  .role-chip.diretoria { background: var(--brand-navy); color: var(--brand-orange); }
  .role-chip.admin_ti { background: var(--brand-navy); color: white; }
  .role-chip.admin_obras { background: var(--brand-orange); color: white; }
  .role-chip.operador { background: var(--border); color: var(--brand-navy); }

  .alert-bar { background: #fff7ed; border: 1px solid #fdba74; color: #9a3412; padding: 12px; border-radius: 10px; margin-bottom: 12px; display: flex; gap: 10px; align-items: flex-start; cursor: pointer; }
  .alert-bar .ab-icon { font-size: 22px; }
  .alert-bar .ab-body { flex: 1; }
  .alert-bar .ab-title { font-weight: 700; font-size: 14px; }
  .alert-bar .ab-text { font-size: 12px; margin-top: 2px; }
  .alert-bar .ab-cta { font-size: 11px; font-weight: 700; color: var(--brand-orange); margin-top: 4px; }

  .accept-card { background: #fff7ed; border: 2px solid var(--warning); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
  .accept-card .ac-title { font-weight: 700; color: #9a3412; font-size: 14px; }
  .accept-card .ac-meta { font-size: 12px; color: #9a3412; margin-top: 4px; }
</style>

<body>
<div id="app"></div>

<script>
/* ============================================================ */
/* BRANDÃO & MARMO ENGENHARIA — Controle de Patrimônio          */
/* Versão de produção (Supabase realtime + cache local)         */
/* ============================================================ */

/* ----- Configuração Supabase -------------------------------- */
const SUPABASE_URL = 'https://tahbdtreiboceyjpuiow.supabase.co';
const SUPABASE_KEY = 'sb_publishable_r0fnOhIE81GtolzZGDsMdA_oLBaxxFY';

const SB = (typeof supabase !== 'undefined' && SUPABASE_URL && SUPABASE_KEY)
  ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false },
      realtime: { params: { eventsPerSecond: 5 } }
    })
  : null;

/* ----- Camada de Autenticação ------------------------------- */
/* Supabase Auth é a fonte da verdade. A sessão fica em localStorage
   sob a chave sb-<projectref>-auth-token (gerenciada pela SDK).
   Aqui só expomos helpers e ligamos auth ⇄ DB.usuarios pelo e-mail. */
const Auth = {
  async getUser() {
    if (!SB) return null;
    const { data } = await SB.auth.getUser();
    return data && data.user ? data.user : null;
  },
  async getSession() {
    if (!SB) return null;
    const { data } = await SB.auth.getSession();
    return data && data.session ? data.session : null;
  },
  async signIn(email, senha) {
    if (!SB) throw new Error('Supabase não inicializado');
    const { data, error } = await SB.auth.signInWithPassword({ email, password: senha });
    if (error) throw error;
    return data.user;
  },
  async signOut() {
    if (!SB) return;
    try { await SB.auth.signOut(); } catch (e) { console.warn('[Auth] signOut:', e.message); }
  },
  async updateOwnPassword(novaSenha) {
    if (!SB) throw new Error('Supabase não inicializado');
    const { error } = await SB.auth.updateUser({ password: novaSenha });
    if (error) throw error;
  },
  onChange(cb) {
    if (!SB) return null;
    return SB.auth.onAuthStateChange((event, session) => cb(event, session));
  },
  async fetchProfile(userId) {
    if (!SB || !userId) return null;
    const { data, error } = await SB.from('profiles')
      .select('nome,perfil,setor,ativo')
      .eq('id', userId)
      .maybeSingle();
    if (error) { console.warn('[Auth] fetchProfile:', error.message); return null; }
    return data;
  }
};

/* ------------------------------------------------------------ */
/* Fase 3 — persistência relacional.
   load() lê das 7 tabelas (categorias, subcategorias, localizacoes,
   software_tipos, patrimonios, movimentacoes, inventarios) + profiles.
   save() é diff-based: compara o DB atual com o último baseline e
   roteia INSERTs/UPDATEs/DELETEs por linha. Movimentações são insert-only.
*/
const BMStore = {
  KEY: 'bm_patrimonio_prod',
  _baseline: null,
  _saveQueue: Promise.resolve(),

  _stripSession(d) { if (!d) return d; const { currentUser, ...rest } = d; return rest; },
  _clone(d) { return JSON.parse(JSON.stringify(d)); },

  /* ---------- Mapeamentos snake_case ⇄ camelCase ---------- */
  _patrimonioFromRow(r) {
    return {
      id: r.id,
      codigoBarras: r.codigo_barras,
      descricao: r.descricao,
      categoriaId: r.categoria_id,
      subcategoriaId: r.subcategoria_id,
      marca: r.marca, modelo: r.modelo,
      numeroSerie: r.numero_serie,
      notaFiscal: r.nota_fiscal,
      dataAquisicao: r.data_aquisicao,
      valorAquisicao: r.valor_aquisicao != null ? Number(r.valor_aquisicao) : 0,
      dataRegistro: r.data_registro,
      observacoes: r.observacoes,
      foto: r.foto,
      status: r.status,
      localizacaoAtualId: r.localizacao_atual_id,
      responsavelAtualId: r.responsavel_atual_id,
      softwareTipoId: r.software_tipo_id,
      tipoSoftware: r.tipo_software,
      licencaChave: r.licenca_chave,
      licencaValidade: r.licenca_validade,
      licencaResponsavel: r.licenca_responsavel,
      licencaEquipamento: r.licenca_equipamento,
      criadoPor: r.criado_por,
      criadoEm: r.criado_em,
      atualizadoEm: r.atualizado_em,
      solicitadoPor: r.solicitado_por,
      solicitacaoMotivo: r.solicitacao_motivo,
      solicitadoMovPor: r.solicitado_mov_por,
      pendingMove: r.pending_move
    };
  },
  _patrimonioToRow(p) {
    return {
      id: p.id,
      codigo_barras: p.codigoBarras || null,
      descricao: p.descricao || '',
      categoria_id: p.categoriaId || null,
      subcategoria_id: p.subcategoriaId || null,
      marca: p.marca || null, modelo: p.modelo || null,
      numero_serie: p.numeroSerie || null,
      nota_fiscal: p.notaFiscal || null,
      data_aquisicao: p.dataAquisicao || null,
      valor_aquisicao: p.valorAquisicao || 0,
      data_registro: p.dataRegistro || null,
      observacoes: p.observacoes || null,
      foto: p.foto || null,
      status: p.status || 'ativo',
      localizacao_atual_id: p.localizacaoAtualId || null,
      responsavel_atual_id: p.responsavelAtualId || null,
      software_tipo_id: p.softwareTipoId || null,
      tipo_software: p.tipoSoftware || null,
      licenca_chave: p.licencaChave || null,
      licenca_validade: p.licencaValidade || null,
      licenca_responsavel: p.licencaResponsavel || null,
      licenca_equipamento: p.licencaEquipamento || null,
      criado_por: p.criadoPor || null,
      criado_em: p.criadoEm || new Date().toISOString(),
      // atualizado_em é setado pelo trigger do banco
      solicitado_por: p.solicitadoPor || null,
      solicitacao_motivo: p.solicitacaoMotivo || null,
      solicitado_mov_por: p.solicitadoMovPor || null,
      pending_move: p.pendingMove || null
    };
  },
  _movFromRow(r) {
    return {
      id: r.id, patrimonioId: r.patrimonio_id, tipo: r.tipo, data: r.data,
      usuarioId: r.usuario_id,
      origemLocalId: r.origem_local_id, destinoLocalId: r.destino_local_id,
      origemRespId: r.origem_resp_id, destinoRespId: r.destino_resp_id,
      motivo: r.motivo
    };
  },
  _movToRow(m) {
    return {
      id: m.id, patrimonio_id: m.patrimonioId, tipo: m.tipo,
      data: m.data || new Date().toISOString(),
      usuario_id: m.usuarioId || null,
      origem_local_id: m.origemLocalId || null,
      destino_local_id: m.destinoLocalId || null,
      origem_resp_id: m.origemRespId || null,
      destino_resp_id: m.destinoRespId || null,
      motivo: m.motivo || null
    };
  },
  _catToRow(c)    { return { id: c.id, nome: c.nome, icone: c.icone || null }; },
  _subcatToRow(s) { return { id: s.id, nome: s.nome, categoria_id: s.categoriaId }; },
  _locToRow(l)    { return { id: l.id, nome: l.nome, tipo: l.tipo || null, parent_id: l.parent || null }; },
  _swtToRow(s)    { return { id: s.id, nome: s.nome }; },
  _invToRow(i) {
    // O schema só tem nome/iniciado_em/finalizado_em/responsavel_id/itens.
    // Campos extras do app (localizacaoId, esperados, lidos, faltantes, fora)
    // são serializados dentro de `itens` pra não perder dados.
    const extras = {};
    ['localizacaoId','esperados','lidos','faltantes','fora','encontrados'].forEach(k => {
      if (i[k] !== undefined) extras[k] = i[k];
    });
    const itens = Array.isArray(i.itens) ? i.itens : (i.itens || []);
    return {
      id: i.id,
      nome: i.nome || 'Inventário',
      iniciado_em: i.iniciadoEm || new Date().toISOString(),
      finalizado_em: i.finalizadoEm || null,
      responsavel_id: i.responsavelId || i.iniciadoPor || null,
      itens: Object.keys(extras).length ? { ...extras, lista: itens } : itens
    };
  },

  /* ---------- Load ---------- */
  async load() {
    if (!SB) {
      const raw = localStorage.getItem(this.KEY);
      const data = raw ? (() => { try { return JSON.parse(raw); } catch { return this.seed(); } })() : this.seed();
      this._baseline = this._clone(data);
      return { ...data, currentUser: null };
    }
    try {
      const [profs, cats, subs, locs, swts, patrs, movs, invs] = await Promise.all([
        SB.from('profiles').select('id,email,nome,perfil,setor,ativo,whatsapp').order('email'),
        SB.from('categorias').select('*').order('id'),
        SB.from('subcategorias').select('*').order('id'),
        SB.from('localizacoes').select('*').order('id'),
        SB.from('software_tipos').select('*').order('id'),
        SB.from('patrimonios').select('*').order('id'),
        SB.from('movimentacoes').select('*').order('id'),
        SB.from('inventarios').select('*').order('id')
      ]);
      const err = [profs, cats, subs, locs, swts, patrs, movs, invs].find(r => r.error);
      if (err) throw new Error(err.error.message);

      const data = {
        usuarios: (profs.data || []).map(p => ({
          id: p.id, nome: p.nome || p.email, email: p.email,
          perfil: p.perfil || 'operador', setor: p.setor || '',
          ativo: p.ativo !== false,
          whatsapp: p.whatsapp || ''
        })),
        categorias: (cats.data || []).map(c => ({ id: c.id, nome: c.nome, icone: c.icone })),
        subcategorias: (subs.data || []).map(s => ({ id: s.id, nome: s.nome, categoriaId: s.categoria_id })),
        localizacoes: (locs.data || []).map(l => ({ id: l.id, nome: l.nome, tipo: l.tipo, parent: l.parent_id })),
        softwareTipos: (swts.data || []).map(s => ({ id: s.id, nome: s.nome })),
        patrimonios: (patrs.data || []).map(r => this._patrimonioFromRow(r)),
        movimentacoes: (movs.data || []).map(r => this._movFromRow(r)),
        inventarios: (invs.data || []).map(i => {
          // itens pode ser array (legado) ou objeto { localizacaoId, esperados, ..., lista }
          const it = i.itens;
          const isWrapped = it && !Array.isArray(it) && typeof it === 'object';
          const extras = isWrapped ? it : {};
          const lista = isWrapped ? (it.lista || []) : (Array.isArray(it) ? it : []);
          return {
            id: i.id, nome: i.nome,
            iniciadoEm: i.iniciado_em, finalizadoEm: i.finalizado_em,
            responsavelId: i.responsavel_id, iniciadoPor: i.responsavel_id,
            localizacaoId: extras.localizacaoId,
            esperados: extras.esperados, lidos: extras.lidos,
            faltantes: extras.faltantes, fora: extras.fora, encontrados: extras.encontrados,
            itens: lista
          };
        }),
        _nextId: {}
      };
      const maxId = (arr) => (arr || []).reduce((acc, x) => Math.max(acc, x.id || 0), 0);
      data._nextId = {
        patrimonios:   maxId(data.patrimonios)   + 1,
        movimentacoes: maxId(data.movimentacoes) + 1,
        localizacoes:  maxId(data.localizacoes)  + 1,
        subcategorias: maxId(data.subcategorias) + 1,
        softwareTipos: maxId(data.softwareTipos) + 1,
        inventarios:   maxId(data.inventarios)   + 1
      };
      try { localStorage.setItem(this.KEY, JSON.stringify(data)); } catch {}
      this._baseline = this._clone(data);
      return { ...data, currentUser: null };
    } catch (e) {
      console.warn('[Supabase] load falhou, usando cache local:', e.message);
      const raw = localStorage.getItem(this.KEY);
      const data = raw ? (() => { try { return JSON.parse(raw); } catch { return this.seed(); } })() : this.seed();
      this._baseline = this._clone(data);
      return { ...data, currentUser: null };
    }
  },

  /* ---------- Save (diff-based) ---------- */
  save(data) {
    const shared = this._stripSession(data);
    try { localStorage.setItem(this.KEY, JSON.stringify(shared)); } catch {}
    if (!SB) return;
    const snapshot = this._clone(shared);
    this._saveQueue = this._saveQueue
      .then(() => this._persistDiff(snapshot))
      .catch(e => { console.error('[Supabase] save erro:', e && (e.message || e)); toast('Erro ao salvar: ' + (e && e.message || 'desconhecido'), 'error'); });
  },

  async _persistDiff(curr) {
    const base = this._baseline || { categorias:[], subcategorias:[], localizacoes:[], softwareTipos:[], patrimonios:[], movimentacoes:[], inventarios:[] };

    // Coleções com UPSERT + DELETE
    await this._syncCollection('categorias',    base.categorias,    curr.categorias    || [], (x) => this._catToRow(x));
    await this._syncCollection('subcategorias', base.subcategorias, curr.subcategorias || [], (x) => this._subcatToRow(x));
    await this._syncCollection('localizacoes',  base.localizacoes,  curr.localizacoes  || [], (x) => this._locToRow(x));
    await this._syncCollection('software_tipos',base.softwareTipos, curr.softwareTipos || [], (x) => this._swtToRow(x));
    await this._syncCollection('patrimonios',   base.patrimonios,   curr.patrimonios   || [], (x) => this._patrimonioToRow(x));
    await this._syncCollection('inventarios',   base.inventarios,   curr.inventarios   || [], (x) => this._invToRow(x));

    // Movimentações: insert-only (RLS bloqueia UPDATE)
    const baseMovIds = new Set((base.movimentacoes || []).map(m => m.id));
    const newMovs = (curr.movimentacoes || []).filter(m => !baseMovIds.has(m.id));
    if (newMovs.length) {
      const { error } = await SB.from('movimentacoes').insert(newMovs.map(m => this._movToRow(m)));
      if (error) throw new Error('movimentacoes insert: ' + error.message);
    }

    this._baseline = this._clone(curr);
  },

  async _syncCollection(table, baseArr, currArr, toRow) {
    const baseMap = new Map((baseArr || []).map(x => [x.id, x]));
    const currMap = new Map((currArr || []).map(x => [x.id, x]));

    const upserts = [];
    for (const [id, x] of currMap) {
      const prev = baseMap.get(id);
      if (!prev || JSON.stringify(prev) !== JSON.stringify(x)) upserts.push(toRow(x));
    }
    if (upserts.length) {
      const { error } = await SB.from(table).upsert(upserts, { onConflict: 'id' });
      if (error) throw new Error(`${table} upsert: ${error.message}`);
    }
    const deletedIds = [];
    for (const [id] of baseMap) if (!currMap.has(id)) deletedIds.push(id);
    if (deletedIds.length) {
      const { error } = await SB.from(table).delete().in('id', deletedIds);
      if (error) throw new Error(`${table} delete: ${error.message}`);
    }
  },

  /* ---------- Realtime ---------- */
  subscribe(onChange) {
    if (!SB) return null;
    const tables = ['categorias','subcategorias','localizacoes','software_tipos','patrimonios','movimentacoes','inventarios','profiles'];
    const ch = SB.channel('bm_relacional');
    let queued = false;
    const trigger = () => {
      if (queued) return; queued = true;
      setTimeout(() => { queued = false; onChange(); }, 250);
    };
    tables.forEach(t => ch.on('postgres_changes', { event: '*', schema: 'public', table: t }, trigger));
    return ch.subscribe();
  },

  /* ---------- Seed (apenas fallback offline) ---------- */
  seed() {
    return {
      usuarios: [],
      categorias: [
        { id: 1, nome: 'Obra', icone: '🦺' },
        { id: 2, nome: 'TI - Equipamentos', icone: '💻' },
        { id: 3, nome: 'TI - Softwares',    icone: '🔑' }
      ],
      localizacoes: [{ id: 1, nome: 'Sede Administrativa', tipo: 'unidade', parent: null }],
      patrimonios: [], movimentacoes: [],
      subcategorias: [
        { id: 1,  nome: 'Computadores/Notebooks', categoriaId: 2 },
        { id: 2,  nome: 'Monitores',              categoriaId: 2 },
        { id: 3,  nome: 'Impressoras',            categoriaId: 2 },
        { id: 4,  nome: 'Redes/Telecom',          categoriaId: 2 },
        { id: 5,  nome: 'Periféricos',            categoriaId: 2 },
        { id: 6,  nome: 'Ferramentas Manuais',    categoriaId: 1 },
        { id: 7,  nome: 'Máquinas/Equipamentos',  categoriaId: 1 },
        { id: 8,  nome: 'EPIs',                   categoriaId: 1 },
        { id: 9,  nome: 'Veículos',               categoriaId: 1 },
        { id: 10, nome: 'Suite Office',           categoriaId: 3 },
        { id: 11, nome: 'Sistema de Gestão (ERP)',categoriaId: 3 },
        { id: 12, nome: 'CAD / Projetos',         categoriaId: 3 },
        { id: 13, nome: 'Segurança / Antivírus',  categoriaId: 3 },
        { id: 14, nome: 'Sistema Operacional',    categoriaId: 3 },
        { id: 15, nome: 'Outros',                 categoriaId: 3 }
      ],
      softwareTipos: [], inventarios: [],
      _nextId: { patrimonios: 1, movimentacoes: 1, localizacoes: 2, inventarios: 1, subcategorias: 16, softwareTipos: 1 }
    };
  }
};

let DB = { usuarios: [], categorias: [], subcategorias: [], localizacoes: [], patrimonios: [], movimentacoes: [], inventarios: [], softwareTipos: [], _nextId: { patrimonios:1, movimentacoes:1, localizacoes:1, inventarios:1, subcategorias:1, softwareTipos:1 } };
const save = () => BMStore.save(DB);
/* nextId: gera o próximo id numérico em memória.
   As tabelas no Postgres têm SERIAL/BIGSERIAL, mas a UI continua precisando
   de id local pra referências antes do upsert chegar ao banco. Em caso de
   colisão, o UPSERT no banco usa esse id; a sequence é mantida coerente
   via setval no script de migração. */
const nextId = (col) => {
  if (!DB._nextId) DB._nextId = {};
  if (!DB._nextId[col]) {
    const max = (DB[col] || []).reduce((acc, x) => Math.max(acc, x.id || 0), 0);
    DB._nextId[col] = max + 1;
  }
  return DB._nextId[col]++;
};

/* ============== NOTIFICAÇÕES WHATSAPP (Evolution API via Edge Function) ============== */
/* Fire-and-forget: nunca quebra a UX do app se o WhatsApp falhar.
   A Edge Function `notificar-whatsapp` é quem fala com a Evolution API.

   Uso:
     notificarWhatsApp('evento', { dados }, ['uuid1','uuid2'])
   Também aceita números prontos no array (formato 55DDDNNNNNNNN).
   Se destinatarios vier vazio, a Edge Function cai no WHATSAPP_TEST_NUMBER. */
async function notificarWhatsApp(evento, dados, destinatarios) {
  if (!SB) return;
  try {
    const body = { evento, dados };
    if (Array.isArray(destinatarios) && destinatarios.length) {
      // dedup + filtra nulos/vazios
      body.destinatarios = Array.from(new Set(destinatarios.filter(Boolean)));
    }
    const { data, error } = await SB.functions.invoke('notificar-whatsapp', { body });
    if (error) console.warn('[whatsapp] invoke erro:', error);
    else if (data && data.error) console.warn('[whatsapp] erro:', data.error);
    else console.log('[whatsapp] ✓', evento, data);
  } catch (e) {
    console.warn('[whatsapp] exceção:', e);
  }
}

/* Helpers de destinatários — devolvem UUIDs únicos de usuários ativos.
   A Edge Function resolve UUID → número usando service_role. */
const WhatsDest = {
  diretoria() {
    return DB.usuarios.filter(u => u.ativo !== false && u.perfil === 'diretoria').map(u => u.id);
  },
  // Admins de uma categoria (quem pode aprovar) — inclui Diretoria sempre.
  aprovadoresDaCategoria(catId) {
    return DB.usuarios.filter(u => {
      if (u.ativo === false) return false;
      if (u.perfil === 'diretoria') return true;
      if (u.perfil === 'admin_ti'    && (catId === 2 || catId === 3)) return true;
      if (u.perfil === 'admin_obras' && catId === 1) return true;
      return false;
    }).map(u => u.id);
  },
  // Envolvidos no patrimônio: criador + responsável atual (sem duplicar).
  envolvidos(p) {
    const out = new Set();
    if (p.criadoPor)           out.add(p.criadoPor);
    if (p.responsavelAtualId)  out.add(p.responsavelAtualId);
    if (p.solicitadoPor)       out.add(p.solicitadoPor);
    if (p.solicitadoMovPor)    out.add(p.solicitadoMovPor);
    return Array.from(out);
  },
  // Para movimentação: solicitante + responsável atual + novo responsável
  movimentacao(p, novoRespId) {
    const out = new Set();
    if (p.criadoPor)          out.add(p.criadoPor);
    if (p.responsavelAtualId) out.add(p.responsavelAtualId);
    if (p.solicitadoMovPor)   out.add(p.solicitadoMovPor);
    if (novoRespId)           out.add(novoRespId);
    return Array.from(out);
  },
  // Lista única com Diretoria + envolvidos
  diretoriaMais(...ids) {
    const out = new Set(this.diretoria());
    for (const i of ids.flat()) if (i) out.add(i);
    return Array.from(out);
  }
};

/* ============== CONTAS-MESTRE (proteção contra desativação acidental) ============== */
/* Lista de e-mails de contas que NÃO podem ser desativadas pelo app, mesmo por
   outra Diretoria. Também não podem ter o perfil alterado.
   Nome / setor / WhatsApp continuam editáveis (pelo próprio dono ou Diretoria).
   Pra excluir de verdade (cenário muito raro, ex: LGPD): só direto no Supabase
   após zerar todas as FKs — operação manual e consciente. */
const MASTER_EMAILS = new Set([
  's.marmo@brandaoemarmo.com.br'
]);
function isMaster(user) {
  return !!(user && user.email && MASTER_EMAILS.has(String(user.email).toLowerCase()));
}

/* Máscara/validação de número WhatsApp brasileiro. */
function whatsLimpar(v) { return String(v || '').replace(/\D/g, ''); }
function whatsValidar(v) {
  const d = whatsLimpar(v);
  return d.length === 12 || d.length === 13; // 55 + DDD + 8 ou 9 dígitos
}
function whatsNormalizar(v) {
  let d = whatsLimpar(v);
  if (d.length === 10 || d.length === 11) d = '55' + d;
  return whatsValidar(d) ? d : null;
}
function whatsFormatar(v) {
  const d = whatsLimpar(v);
  if (d.length < 3) return d;
  // 55 (DD) 9XXXX-XXXX
  if (d.length <= 4)  return '+' + d.slice(0,2) + ' (' + d.slice(2) + ')';
  if (d.length <= 9)  return '+' + d.slice(0,2) + ' (' + d.slice(2,4) + ') ' + d.slice(4);
  if (d.length <= 12) return '+' + d.slice(0,2) + ' (' + d.slice(2,4) + ') ' + d.slice(4,8) + '-' + d.slice(8);
  return '+' + d.slice(0,2) + ' (' + d.slice(2,4) + ') ' + d.slice(4,9) + '-' + d.slice(9,13);
}

/* ============== AUTH & PERMISSIONS ============== */

const Perms = {
  isAdmin(u) { return u && (u.perfil === 'diretoria' || u.perfil === 'admin_ti' || u.perfil === 'admin_obras'); },
  isDiretoria(u) { return u && u.perfil === 'diretoria'; },
  isOperador(u) { return u && (u.perfil === 'operador' || u.perfil === 'operador_ti'); },
  canManageCategoria(u, categoriaId) {
    if (!u) return false;
    if (u.perfil === 'diretoria') return true;
    if (u.perfil === 'admin_ti'   && (categoriaId === 2 || categoriaId === 3)) return true;
    if (u.perfil === 'admin_obras'&& categoriaId === 1) return true;
    return false;
  },
  canCreate(u) { return !!u; },
  canDelete(u) { return Perms.isDiretoria(u); },
  canApproveCadastro(u, categoriaId) {
    if (!u) return false;
    if (u.perfil === 'diretoria') return true;
    if (u.perfil === 'admin_ti'   && (categoriaId === 2 || categoriaId === 3)) return true;
    if (u.perfil === 'admin_obras'&& categoriaId === 1) return true;
    return false;
  },
  canRequestBaixa(u, categoriaId) { return Perms.canManageCategoria(u, categoriaId); },
  canRequestMove(u, p) {
    if (!u || !p) return false;
    if (Perms.canManageCategoria(u, p.categoriaId)) return true;
    if (u.perfil === 'operador_ti' && (p.categoriaId === 2 || p.categoriaId === 3)) return true;
    if (u.perfil === 'operador' && p.responsavelAtualId === u.id) return true;
    return false;
  },
  movimentacoesPendentesParaAprovador(user) {
    if (!user) return [];
    return DB.patrimonios.filter(p =>
      p.status === 'aguardando_aprovacao_movimentacao' &&
      Perms.canApproveCadastro(user, p.categoriaId)  // mesma regra de aprovação
    );
  },
  canApproveBaixa(u) { return Perms.isDiretoria(u); },
  allowedCategorias(u) {
    if (!u) return [];
    if (u.perfil === 'diretoria')  return DB.categorias;
    if (u.perfil === 'admin_ti')   return DB.categorias.filter(c => c.id === 2 || c.id === 3);
    if (u.perfil === 'admin_obras')return DB.categorias.filter(c => c.id === 1);
    if (u.perfil === 'operador_ti')return DB.categorias.filter(c => c.id === 2 || c.id === 3);
    if (u.perfil === 'operador')   return DB.categorias;
    return [];
  },
  perfilLabel(perfil) {
    return ({
      diretoria:    'Diretoria',
      admin_ti:     'Adm. TI',
      admin_obras:  'Adm. Obras',
      operador:     'Operador Obra',
      operador_ti:  'Operador TI'
    })[perfil] || perfil;
  }
};

/* ============== LOOKUPS ============== */

const Lookup = {
  user(id) { return DB.usuarios.find(u => u.id === id); },
  cat(id)  { return DB.categorias.find(c => c.id === id); },
  loc(id)  { return DB.localizacoes.find(l => l.id === id); },
  movs(patrimonioId) { return DB.movimentacoes.filter(m => m.patrimonioId === patrimonioId).sort((a,b) => new Date(a.data) - new Date(b.data)); },
  pendingForUser(userId) {
    return DB.patrimonios.filter(p => p.status === 'aguardando_aceite' && p.responsavelAtualId === userId);
  },
  pendingCadastrosForApprover(user) {
    return DB.patrimonios.filter(p =>
      p.status === 'aguardando_aprovacao_cadastro' &&
      Perms.canApproveCadastro(user, p.categoriaId)
    );
  },
  pendingBaixasForDiretoria(user) {
    if (!Perms.isDiretoria(user)) return [];
    return DB.patrimonios.filter(p =>
      p.status === 'aguardando_aprovacao_baixa' ||
      p.status === 'aguardando_aprovacao_extravio'
    );
  },
  pendingCount(userId) {
    const u = Lookup.user(userId);
    if (!u) return 0;
    return Lookup.pendingForUser(userId).length
         + Lookup.pendingCadastrosForApprover(u).length
         + Lookup.pendingBaixasForDiretoria(u).length
         + Perms.movimentacoesPendentesParaAprovador(u).length;
  },
  canSee(user, p) {
    if (!user || !p) return false;
    if (p.status === 'excluido') return false; // exclusão lógica: some do app, mas fica no Supabase
    if (user.perfil === 'diretoria') return true;
    if (user.perfil === 'admin_ti')    return p.categoriaId === 2 || p.categoriaId === 3;
    if (user.perfil === 'admin_obras') return p.categoriaId === 1;
    if (user.perfil === 'operador_ti') return p.categoriaId === 2 || p.categoriaId === 3;
    return p.responsavelAtualId === user.id || p.criadoPor === user.id;
  },
  visibleItems(user) {
    return DB.patrimonios.filter(p => Lookup.canSee(user, p));
  },
  // Localizações que o usuário pode ver — operador só vê locais onde tem item
  visibleLocations(user) {
    if (!user) return [];
    if (Perms.isAdmin(user)) {
      // admin_ti/obras vê todos os locais (para mover entre obras)
      return DB.localizacoes;
    }
    const myLocs = new Set(Lookup.visibleItems(user).map(p => p.localizacaoAtualId));
    return DB.localizacoes.filter(l => myLocs.has(l.id));
  },
  hasItemsUnderCustody(userId) {
    return DB.patrimonios.some(p => p.responsavelAtualId === userId);
  }
};

function bindLogin() {
  $('#login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    const email = $('#login-email').value.trim().toLowerCase();
    const senha = $('#login-senha').value;
    if (btn) { btn.disabled = true; btn.dataset._t = btn.textContent; btn.textContent = 'Entrando...'; }
    try {
      const authUser = await Auth.signIn(email, senha);
      // Para perfis admin, exige 2FA antes de prosseguir
      const mfaOk = await ensureMfaForAdmins(authUser);
      if (!mfaOk) { await Auth.signOut(); return toast('2FA cancelado. Acesso negado.', 'error'); }
      // Antes do login a RLS bloqueava leitura — agora puxa o estado real.
      try { DB = await BMStore.load(); } catch (e) { console.warn('[load pós-login]:', e.message); }
      const id = await syncCurrentUserFromAuth(authUser);
      if (id == null) {
        await Auth.signOut();
        return toast('Sua conta ainda não foi provisionada no app. Contate a Diretoria.', 'error');
      }

      const u = Lookup.user(id);
      toast('Bem-vindo, ' + (u ? u.nome.split(' ')[0] : email), 'success');
      render();

      const msg = (err && err.message) || 'Falha ao entrar';
      // Mensagens comuns do Supabase: "Invalid login credentials", "Email not confirmed"
      if (/Invalid login/i.test(msg))       toast('E-mail ou senha incorretos', 'error');
      else if (/Email not confirmed/i.test(msg)) toast('E-mail ainda não confirmado. Verifique sua caixa de entrada.', 'error');
      else toast(msg, 'error');
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = btn.dataset._t || 'Entrar'; }
    }
  });
}

/* ===== MFA (TOTP) para perfis administrativos ===== */
const ADMIN_PERFIS = ['diretoria','admin_ti','admin_obras'];

async function ensureMfaForAdmins(authUser) {
  if (!SB || !authUser) return true;
  const profile = await Auth.fetchProfile(authUser.id);
  if (!profile || !ADMIN_PERFIS.includes(profile.perfil)) return true;
  const { data: aal } = await SB.auth.mfa.getAuthenticatorAssuranceLevel();
  if (aal && aal.currentLevel === 'aal2') return true;
  const { data: factors, error: fe } = await SB.auth.mfa.listFactors();
  if (fe) { toast('Erro MFA: ' + fe.message, 'error'); return false; }
  const totp = (factors.totp || []).find(f => f.status === 'verified');
  if (totp) return await mfaChallenge(totp.id);
  return await mfaEnroll();
}

function mfaModal(innerHtml) {
  const m = document.createElement('div');
  m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px;';
  m.innerHTML = '<div style="background:white;border-radius:12px;padding:24px;max-width:380px;width:100%;text-align:center;">' + innerHtml + '</div>';
  document.body.appendChild(m);
  return m;
}

async function mfaEnroll() {
  const { data, error } = await SB.auth.mfa.enroll({ factorType: 'totp', friendlyName: 'Patrimônio ' + Date.now() });
  if (error) { toast('Erro MFA enroll: ' + error.message, 'error'); return false; }
  const factorId = data.id;
  return new Promise(resolve => {
    const m = mfaModal(`
      <h2 style="color:#1B2A5E;margin:0 0 10px;font-size:18px;">Ativar 2FA</h2>
      <p style="font-size:12px;color:#6b7280;margin-bottom:14px;">Escaneie o QR no Google Authenticator/Authy e digite o código de 6 dígitos.</p>
      <div style="background:white;padding:6px;margin-bottom:10px;">${data.totp.qr_code}</div>
      <p style="font-size:10px;color:#6b7280;margin-bottom:4px;">Ou digite manualmente:</p>
      <code style="display:block;background:#f4f4f5;padding:6px;border-radius:4px;font-size:11px;word-break:break-all;margin-bottom:12px;">${data.totp.secret}</code>
      <input id="mfa-code" placeholder="000000" maxlength="6" inputmode="numeric" style="font-size:22px;text-align:center;padding:8px;width:140px;border:1px solid #e5e7eb;border-radius:6px;margin-bottom:12px;">
      <div style="display:flex;gap:8px;justify-content:center;">
        <button id="mfa-cancel" class="btn secondary" style="width:auto;padding:8px 14px;">Cancelar</button>
        <button id="mfa-ok" class="btn" style="width:auto;padding:8px 14px;">Confirmar</button>
      </div>
    `);
    m.querySelector('#mfa-cancel').onclick = async () => { try { await SB.auth.mfa.unenroll({ factorId }); } catch{} m.remove(); resolve(false); };
    m.querySelector('#mfa-ok').onclick = async () => {
      const code = m.querySelector('#mfa-code').value.trim();
      const { data: ch, error: e1 } = await SB.auth.mfa.challenge({ factorId });
      if (e1) { toast(e1.message, 'error'); return; }
      const { error: e2 } = await SB.auth.mfa.verify({ factorId, challengeId: ch.id, code });
      if (e2) { toast('Código inválido', 'error'); return; }
      m.remove(); toast('2FA ativado!', 'success'); resolve(true);
    };
  });
}

async function mfaChallenge(factorId) {
  const { data: ch, error } = await SB.auth.mfa.challenge({ factorId });
  if (error) { toast(error.message, 'error'); return false; }
  return new Promise(resolve => {
    const m = mfaModal(`
      <h2 style="color:#1B2A5E;margin:0 0 10px;font-size:18px;">Código do autenticador</h2>
      <p style="font-size:13px;color:#6b7280;margin-bottom:16px;">Abra o app autenticador e digite o código de 6 dígitos.</p>
      <input id="mfa-code" placeholder="000000" maxlength="6" inputmode="numeric" autofocus style="font-size:24px;text-align:center;padding:10px;width:160px;border:1px solid #e5e7eb;border-radius:6px;margin-bottom:16px;">
      <div style="display:flex;gap:8px;justify-content:center;">
        <button id="mfa-cancel" class="btn secondary" style="width:auto;padding:8px 14px;">Cancelar</button>
        <button id="mfa-ok" class="btn" style="width:auto;padding:8px 14px;">Verificar</button>
      </div>
    `);
    m.querySelector('#mfa-cancel').onclick = () => { m.remove(); resolve(false); };
    m.querySelector('#mfa-ok').onclick = async () => {
      const code = m.querySelector('#mfa-code').value.trim();
      const { error } = await SB.auth.mfa.verify({ factorId, challengeId: ch.id, code });
      if (error) { toast('Código inválido', 'error'); return; }
      m.remove(); resolve(true);
    };
  });
}

/* Fase 3: DB.usuarios é populado por BMStore.load() a partir de `profiles`
   (uuid como id). Aqui apenas localizamos o entry pelo uuid do Auth e
   devolvemos o id (uuid string). Sem mutação local — profiles é a fonte. */
async function syncCurrentUserFromAuth(authUser) {
  if (!authUser || !authUser.id) return null;
  let entry = DB.usuarios.find(x => x.id === authUser.id);
  if (!entry && SB) {
    // Fallback: busca o próprio profile (RLS sempre permite ler o próprio)
    try {
      const { data } = await SB.from('profiles')
        .select('id,email,nome,perfil,setor,ativo').eq('id', authUser.id).maybeSingle();
      if (data) {
        entry = { id: data.id, nome: data.nome || data.email, email: data.email,
                  perfil: data.perfil || 'operador', setor: data.setor || '',
                  ativo: data.ativo !== false };
        if (!DB.usuarios.find(x => x.id === entry.id)) DB.usuarios.push(entry);
      }
    } catch (e) { console.warn('[sync] fallback profile:', e.message); }
  }
  if (!entry) {
    toast('Sua conta não está provisionada. Contate a Diretoria.', 'error');
    return null;
  }
  if (entry.ativo === false) {
    toast('Sua conta está desativada. Contate a Diretoria.', 'error');
    return null;
  }
  return entry.id;
}

  let items = Lookup.visibleItems(u);

  if (f.q) {
    const q = f.q.toLowerCase();
    items = items.filter(p =>
      p.descricao.toLowerCase().includes(q) ||
      p.codigoBarras.toLowerCase().includes(q) ||
      (p.tipoSoftware || '').toLowerCase().includes(q)
    );
  }
  if (f.status) items = items.filter(p => p.status === f.status);
  if (f.categoria) items = items.filter(p => String(p.categoriaId) === String(f.categoria));
  if (f.local) items = items.filter(p => String(p.localizacaoAtualId) === String(f.local));
  if (f.responsavel) items = items.filter(p => String(p.responsavelAtualId) === String(f.responsavel));

  // Categorias disponíveis para o usuário (admin_ti só vê TI, etc.)
  const catsVisiveis = u.perfil === 'admin_ti' ? DB.categorias.filter(c => c.id === 2 || c.id === 3)
                     : u.perfil === 'admin_obras' ? DB.categorias.filter(c => c.id === 1)
                     : DB.categorias;
  const showCatFilter = catsVisiveis.length > 1;

  // Locais e usuários para os filtros (apenas admins)
  const locaisDisponiveis = Lookup.visibleLocations(u);
  const usuariosDisponiveis = DB.usuarios;

  const titulo = isOperador ? 'Meus bens' : 'Patrimônios';

  return `
    <div class="page-title">${titulo} <span class="pill">${items.length}</span></div>

    <div class="filter-row">
      <input type="text" id="f-q" placeholder="Buscar..." value="${escapeHtml(f.q)}">
    </div>
    <div class="filter-row">
      ${showCatFilter ? `
      <select id="f-cat">
        <option value="">Todas categorias</option>
        ${catsVisiveis.map(c => `<option value="${c.id}" ${String(f.categoria)===String(c.id)?'selected':''}>${c.icone} ${c.nome}</option>`).join('')}
      </select>` : ''}
      <select id="f-status">
        <option value="">Todos status</option>
        <option value="ativo"                            ${f.status==='ativo'?'selected':''}>Ativo</option>
        <option value="aguardando_aceite"                ${f.status==='aguardando_aceite'?'selected':''}>Aguard. aceite</option>
        <option value="aguardando_aprovacao_cadastro"      ${f.status==='aguardando_aprovacao_cadastro'?'selected':''}>Aguard. aprovação cadastro</option>
        <option value="aguardando_aprovacao_movimentacao"  ${f.status==='aguardando_aprovacao_movimentacao'?'selected':''}>Aguard. aprovação movimentação</option>
        <option value="aguardando_aprovacao_baixa"         ${f.status==='aguardando_aprovacao_baixa'?'selected':''}>Aguard. aprovação baixa</option>
        <option value="aguardando_aprovacao_extravio"    ${f.status==='aguardando_aprovacao_extravio'?'selected':''}>Aguard. aprovação extravio</option>
        <option value="manutencao"                       ${f.status==='manutencao'?'selected':''}>Manutenção</option>
        <option value="emprestado"         ${f.status==='emprestado'?'selected':''}>Emprestado</option>
        <option value="baixado"            ${f.status==='baixado'?'selected':''}>Baixado</option>
        <option value="extraviado"         ${f.status==='extraviado'?'selected':''}>Extraviado</option>
      </select>
    </div>
    ${isAdmin ? `
    <div class="filter-row">
      <select id="f-local">
        <option value="">Todas localizações</option>
        ${locaisDisponiveis.map(l => `<option value="${l.id}" ${String(f.local)===String(l.id)?'selected':''}>${escapeHtml(l.nome)}</option>`).join('')}
      </select>
      <select id="f-resp">
        <option value="">Todos responsáveis</option>
        ${usuariosDisponiveis.map(x => `<option value="${x.id}" ${String(f.responsavel)===String(x.id)?'selected':''}>${escapeHtml(x.nome)}</option>`).join('')}
      </select>
    </div>` : ''}

    ${items.length ? `
      <div class="item-list">
        ${items.map(p => renderItemCard(p)).join('')}
      </div>
    ` : `
      <div class="empty-state">
        <div class="emoji">📭</div>
        <p>${isOperador ? 'Você não tem bens sob sua custódia.' : 'Nenhum patrimônio encontrado.'}</p>
      </div>
    `}
  `;
}

function renderItemCard(p) {
  const cat = Lookup.cat(p.categoriaId);
  const loc = Lookup.loc(p.localizacaoAtualId);
  const resp = Lookup.user(p.responsavelAtualId);
  const catClass = cat ? (cat.id === 2 ? 'cat-ti' : 'cat-obra') : '';
  return `
    <div class="item ${catClass} ${p.status === 'aguardando_aceite' ? 'pending-accept' : ''}" data-id="${p.id}" data-action="open">
      <div class="item-icon">${cat ? cat.icone : '📦'}</div>
      <div class="item-info">
        <div class="title">${escapeHtml(p.descricao)}</div>
        <div class="subtitle">${loc ? escapeHtml(loc.nome) : '—'} · ${resp ? escapeHtml(resp.nome) : 'Sem responsável'}</div>
        <div style="margin-top:4px;">
          <span class="codigo">${escapeHtml(p.codigoBarras)}</span>
          <span class="badge ${p.status}" style="margin-left:6px;">${statusLabel(p.status)}</span>
        </div>
      </div>
    </div>
  `;
}

function statusLabel(s) {
  return ({
    ativo:'Ativo',
    aguardando_aceite:'Aguard. aceite',
    aguardando_aprovacao_cadastro:'Aguard. aprovação cadastro',
    aguardando_aprovacao_movimentacao:'Aguard. aprovação movimentação',
    aguardando_aprovacao_baixa:'Aguard. aprovação baixa',
    aguardando_aprovacao_extravio:'Aguard. aprovação extravio',
    manutencao:'Manutenção',
    emprestado:'Emprestado',
    baixado:'Baixado',
    extraviado:'Extraviado',
    excluido:'Excluído'
  })[s] || s;
}

function bindList() {
  const q = $('#f-q'); if (q) q.addEventListener('input', e => { State.filter.q = e.target.value; render(); $('#f-q').focus(); });
  const fc = $('#f-cat'); if (fc) fc.addEventListener('change', e => { State.filter.categoria = e.target.value; render(); });
  const fs = $('#f-status'); if (fs) fs.addEventListener('change', e => { State.filter.status = e.target.value; render(); });
  const fl = $('#f-local'); if (fl) fl.addEventListener('change', e => { State.filter.local = e.target.value; render(); });
  const fr = $('#f-resp'); if (fr) fr.addEventListener('change', e => { State.filter.responsavel = e.target.value; render(); });
  $$('[data-action="open"]').forEach(el => el.addEventListener('click', () => openDetail(parseInt(el.dataset.id))));
}

/* ============== DETAIL MODAL ============== */

function openDetail(patrimonioId) {
  const p = DB.patrimonios.find(x => x.id === patrimonioId);
  if (!p) return toast('Item não encontrado', 'error');
  const u = Lookup.user(DB.currentUser);
  if (!Lookup.canSee(u, p)) return toast('Sem permissão para visualizar este item', 'error');
  const cat = Lookup.cat(p.categoriaId);
  const loc = Lookup.loc(p.localizacaoAtualId);
  const resp = Lookup.user(p.responsavelAtualId);
  const movs = Lookup.movs(p.id);

  const isAdminCat = Perms.canManageCategoria(u, p.categoriaId);
  const podeManager = isAdminCat;
  const podeMover = Perms.canRequestMove(u, p) && p.status !== 'aguardando_aprovacao_movimentacao' && p.status !== 'aguardando_aceite';
  const podeDeletar = Perms.canDelete(u);
  const aguardandoMeuAceite = (p.status === 'aguardando_aceite' && p.responsavelAtualId === u.id);

  const html = `
    <div class="modal-backdrop" id="modal-detail">
      <div class="modal" onclick="event.stopPropagation()">
        <button class="close-btn" data-close>&times;</button>
        <button class="btn secondary" data-close style="width:auto;padding:6px 14px;font-size:13px;margin-bottom:12px;">← Voltar</button>
        <h2>${escapeHtml(p.descricao)}</h2>
        <div style="margin-bottom:12px;">
          <span class="codigo" style="font-family:monospace; color:var(--brand-orange); font-weight:700;">${escapeHtml(p.codigoBarras)}</span>
          <span class="badge ${p.status}" style="margin-left:8px;">${statusLabel(p.status)}</span>
          <span class="badge ${cat && cat.id===2?'cat-ti':'cat-obra'}" style="margin-left:4px;">${cat?cat.icone+' '+cat.nome:'—'}</span>
        </div>

        ${aguardandoMeuAceite ? `
          <div class="accept-card">
            <div class="ac-title">Item aguardando seu aceite</div>
            <div class="ac-meta">Confirme o recebimento para finalizar a movimentação.</div>
            <div style="margin-top:10px;"><button class="btn success" data-action="accept">✓ Confirmar recebimento</button></div>
          </div>
        ` : ''}

        ${p.foto ? `<div style="margin:10px 0;text-align:center;"><img src="${p.foto}" alt="Foto do patrimônio" style="max-width:100%;max-height:300px;border-radius:10px;border:1px solid var(--border);cursor:pointer;" onclick="window.open(this.src,'_blank')"></div>` : ''}
        ${isAdminCat ? `
          <div style="text-align:center;margin:0 0 12px;">
            <input type="file" id="d-foto" accept="image/*" style="display:none;">
            <button class="btn secondary" data-action="add-foto" style="width:auto;padding:6px 14px;font-size:13px;">📷 ${p.foto ? 'Trocar foto' : 'Adicionar foto'}</button>
          </div>
        ` : ''}
        <div class="card" style="padding:12px;">
          <div class="detail-row"><span class="label">Categoria</span><span class="value">${cat ? cat.icone+' '+cat.nome : '—'}</span></div>
          <div class="detail-row"><span class="label">Nota fiscal</span><span class="value">${escapeHtml(p.notaFiscal || '—')}</span></div>
          <div class="detail-row"><span class="label">Aquisição</span><span class="value">${fmtDate(p.dataAquisicao)}</span></div>
          <div class="detail-row"><span class="label">Valor</span><span class="value">${fmtMoney(p.valorAquisicao)}</span></div>
          <div class="detail-row"><span class="label">Localização</span><span class="value">${loc ? escapeHtml(loc.nome) : '—'}</span></div>
          <div class="detail-row"><span class="label">Responsável</span><span class="value">${resp ? escapeHtml(resp.nome) : '—'}</span></div>
          ${p.observacoes ? `<div class="detail-row"><span class="label">Obs.</span><span class="value">${escapeHtml(p.observacoes)}</span></div>` : ''}
          <div class="detail-row"><span class="label">Cadastrado por</span><span class="value">${escapeHtml((Lookup.user(p.criadoPor) || {}).nome || '—')} em ${fmtDate(p.criadoEm)}</span></div>
        </div>

        ${(() => {
          if (p.status === 'aguardando_aprovacao_cadastro' && Perms.canApproveCadastro(u, p.categoriaId)) {
            return `
              <div class="accept-card" style="border-color:#3730a3; background:#eef2ff;">
                <div class="ac-title" style="color:#3730a3;">Cadastro aguardando sua aprovação</div>
                <div class="ac-meta" style="color:#3730a3;">Solicitado por ${escapeHtml((Lookup.user(p.criadoPor)||{}).nome || '—')}.</div>
                <div class="btn-row" style="margin-top:10px;">
                  <button class="btn success" data-action="approve-cad">✓ Aprovar cadastro</button>
                  <button class="btn danger"  data-action="reject-cad">✗ Rejeitar</button>
                </div>
              </div>`;
          }
          if ((p.status === 'aguardando_aprovacao_baixa' || p.status === 'aguardando_aprovacao_extravio') && Perms.canApproveBaixa(u)) {
            const tipo = p.status === 'aguardando_aprovacao_baixa' ? 'baixa' : 'extravio';
            return `
              <div class="accept-card" style="border-color:#92400e;">
                <div class="ac-title">${tipo === 'baixa' ? 'Baixa' : 'Extravio'} aguardando aprovação da Diretoria</div>
                <div class="ac-meta">Solicitado por ${escapeHtml((Lookup.user(p.solicitadoPor)||{}).nome || '—')}${p.solicitacaoMotivo ? ' · ' + escapeHtml(p.solicitacaoMotivo) : ''}.</div>
                <div class="btn-row" style="margin-top:10px;">
                  <button class="btn danger"    data-action="approve-baixa">✓ Aprovar ${tipo}</button>
                  <button class="btn secondary" data-action="reject-baixa">✗ Rejeitar</button>
                </div>
              </div>`;
          }
          if (p.status === 'aguardando_aprovacao_cadastro' && p.criadoPor === u.id) {
            return `<div class="lock-hint" style="margin-top:10px;"><span>⏳</span><span>Aguardando aprovação do administrador da categoria.</span></div>`;
          }
          if (p.status === 'aguardando_aprovacao_baixa' || p.status === 'aguardando_aprovacao_extravio') {
            const tipo = p.status === 'aguardando_aprovacao_baixa' ? 'baixa' : 'extravio';
            return `<div class="lock-hint" style="margin-top:10px;"><span>⏳</span><span>${tipo === 'baixa' ? 'Baixa' : 'Extravio'} aguardando aprovação da Diretoria.</span></div>`;
          }
          // Movimentação aguardando aprovação do admin da categoria
          if (p.status === 'aguardando_aprovacao_movimentacao') {
            if (Perms.canApproveCadastro(u, p.categoriaId)) {
              const dest = p.pendingMove || {};
              const lTxt = dest.localizacaoAtualId ? (Lookup.loc(dest.localizacaoAtualId)||{}).nome : '—';
              const rTxt = dest.responsavelAtualId ? (Lookup.user(dest.responsavelAtualId)||{}).nome : '—';
              return `
                <div class="accept-card" style="border-color:#9a3412; background:#ffedd5;">
                  <div class="ac-title" style="color:#9a3412;">Movimentação aguardando sua aprovação</div>
                  <div class="ac-meta" style="color:#9a3412;">Solicitada por ${escapeHtml((Lookup.user(p.solicitadoMovPor)||{}).nome || '—')}.<br>Local destino: <strong>${escapeHtml(lTxt)}</strong> · Responsável destino: <strong>${escapeHtml(rTxt)}</strong>${dest.motivo ? '<br>Motivo: '+escapeHtml(dest.motivo) : ''}</div>
                  <div class="btn-row" style="margin-top:10px;">
                    <button class="btn success" data-action="approve-move">✓ Aprovar movimentação</button>
                    <button class="btn danger"  data-action="reject-move">✗ Rejeitar</button>
                  </div>
                </div>`;
            }
            return `<div class="lock-hint" style="margin-top:10px;"><span>⏳</span><span>Movimentação aguardando aprovação do administrador da categoria.</span></div>`;
          }
          // Botões de ação
          if (podeMover || podeManager) {
            const moveBtn  = podeMover  ? `<button class="btn" data-action="move">↗ Movimentar</button>` : '';
            const manutBtn = podeManager ? (p.status !== 'manutencao' ? `<button class="btn warning" data-action="manut">🔧 Manutenção</button>` : `<button class="btn success" data-action="ret-manut">✓ Retornou</button>`) : '';
            const baixaRow = podeManager ? `
              <div class="btn-row" style="margin-bottom:8px;">
                <button class="btn outline-red" data-action="baixa">⬇ ${Perms.isDiretoria(u) ? 'Baixar' : 'Solicitar baixa'}</button>
                <button class="btn secondary"   data-action="extraviado">⚠ ${Perms.isDiretoria(u) ? 'Extraviado' : 'Solicitar extravio'}</button>
              </div>` : '';
            return `
              <div class="btn-row" style="margin-bottom:8px;">${moveBtn}${manutBtn}</div>
              ${baixaRow}`;
          }
          return `<div class="lock-hint" style="margin-top:10px;"><span>🔒</span><span>Apenas o administrador da categoria pode movimentar este item.</span></div>`;
        })()}
        ${podeDeletar ? `
          <button class="btn danger" data-action="delete" style="margin-top:8px;">🗑 Excluir patrimônio</button>
        ` : ''}

        <hr class="separator">
        <h2 style="margin-top:8px;">Histórico</h2>
        <div class="timeline">
          ${movs.map(m => renderTimelineEntry(m)).join('')}
        </div>
      </div>
    </div>
  `;

  const wrap = document.createElement('div');
  wrap.innerHTML = html;
  const node = wrap.firstElementChild;
  document.body.appendChild(node);
  node.addEventListener('click', e => { if (e.target === node) node.remove(); });
  node.querySelectorAll('[data-close]').forEach(b => b.addEventListener('click', () => node.remove()));

  const $a = (sel) => node.querySelector(sel);
  if ($a('[data-action="accept"]')) $a('[data-action="accept"]').addEventListener('click', () => { acceptReceipt(p.id); node.remove(); openDetail(p.id); });
  if ($a('[data-action="add-foto"]')) {
    const inpFoto = $a('#d-foto');
    $a('[data-action="add-foto"]').addEventListener('click', () => inpFoto.click());
    inpFoto.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      toast('Processando foto...', 'success');
      try {
        const dataURL = await comprimirImagem(file);
        p.foto = dataURL;
        p.atualizadoEm = new Date().toISOString();
        save();
        toast('Foto salva', 'success');
        node.remove(); openDetail(p.id);
      } catch (err) {
        toast('Falha ao processar a foto', 'error');
      }
    });
  }
  if ($a('[data-action="move"]'))   $a('[data-action="move"]').addEventListener('click', () => { node.remove(); openMove(p.id); });
  if ($a('[data-action="manut"]'))  $a('[data-action="manut"]').addEventListener('click', () => { node.remove(); sendToMaintenance(p.id); });
  if ($a('[data-action="ret-manut"]')) $a('[data-action="ret-manut"]').addEventListener('click', () => { changeStatus(p.id, 'ativo', 'Retorno de manutenção', 'retorno_manutencao'); node.remove(); openDetail(p.id); });
  if ($a('[data-action="baixa"]'))  $a('[data-action="baixa"]').addEventListener('click', () => { requestBaixa(p.id, 'baixa'); node.remove(); });
  if ($a('[data-action="extraviado"]')) $a('[data-action="extraviado"]').addEventListener('click', () => { requestBaixa(p.id, 'extravio'); node.remove(); });
  if ($a('[data-action="approve-cad"]')) $a('[data-action="approve-cad"]').addEventListener('click', () => { approveCadastro(p.id); node.remove(); });
  if ($a('[data-action="reject-cad"]'))  $a('[data-action="reject-cad"]').addEventListener('click', () => { if(confirm('Rejeitar este cadastro? Ele sai do app, mas o registro fica guardado no Supabase.')){ rejectCadastro(p.id); node.remove(); }});
  if ($a('[data-action="approve-baixa"]')) $a('[data-action="approve-baixa"]').addEventListener('click', () => { approveBaixa(p.id); node.remove(); });
  if ($a('[data-action="reject-baixa"]'))  $a('[data-action="reject-baixa"]').addEventListener('click', () => { rejectBaixa(p.id); node.remove(); });
  if ($a('[data-action="approve-move"]')) $a('[data-action="approve-move"]').addEventListener('click', () => { approveMove(p.id); node.remove(); });
  if ($a('[data-action="reject-move"]'))  $a('[data-action="reject-move"]').addEventListener('click', () => { rejectMove(p.id); node.remove(); });
  if ($a('[data-action="delete"]')) $a('[data-action="delete"]').addEventListener('click', () => { if(confirm('Excluir este patrimônio? Ele sai do app, mas o registro e o histórico ficam guardados no Supabase.')){ deletePatrimonio(p.id); node.remove(); }});
}

function renderTimelineEntry(m) {
  const u = Lookup.user(m.usuarioId);
  const isAccept = m.tipo === 'aceite_recebimento';
  const tipoLabel = ({
    cadastro:'Cadastro inicial',
    solicitacao_cadastro:'Solicitação de cadastro',
    aprovacao_cadastro:'✓ Cadastro aprovado',
    transferencia_local:'Transferência de local',
    transferencia_resp:'Transferência de responsável',
    transferencia_local_resp:'Transferência de local e responsável',
    solicitacao_movimentacao:'Solicitação de movimentação',
    rejeicao_movimentacao:'✗ Movimentação rejeitada',
    manutencao:'Enviado para manutenção',
    retorno_manutencao:'Retorno de manutenção',
    aceite_recebimento:'✓ Recebimento confirmado',
    solicitacao_baixa:'Solicitação de baixa',
    solicitacao_extravio:'Solicitação de extravio',
    rejeicao_baixa:'✗ Baixa rejeitada',
    rejeicao_extravio:'✗ Extravio rejeitado',
    baixa:'Baixa do patrimônio',
    extravio:'Item extraviado',
    inventario:'Inventário'
  })[m.tipo] || m.tipo;
  let detalhes = '';
  if (m.destinoLocalId) { const l = Lookup.loc(m.destinoLocalId); if (l) detalhes += '→ ' + l.nome + ' '; }
  if (m.destinoRespId)  { const r = Lookup.user(m.destinoRespId); if (r) detalhes += '· Resp.: ' + r.nome; }
  return `
    <div class="timeline-item ${isAccept?'acceptance':''}">
      <div class="when">${fmtDateTime(m.data)}</div>
      <div class="what">${tipoLabel}</div>
      ${detalhes ? `<div class="meta">${escapeHtml(detalhes)}</div>` : ''}
      ${m.motivo ? `<div class="meta">${escapeHtml(m.motivo)}</div>` : ''}
      <div class="who">por ${escapeHtml(u ? u.nome : '—')}</div>
    </div>
  `;
}

/* ============== MOVE / STATUS ============== */

function openMove(patrimonioId) {
  const p = DB.patrimonios.find(x => x.id === patrimonioId);
  const u = Lookup.user(DB.currentUser);
  if (!Perms.canRequestMove(u, p)) return toast('Sem permissão para esta categoria', 'error');
  const isOpProprio = u.perfil === 'operador' && p.responsavelAtualId === u.id && !Perms.canManageCategoria(u, p.categoriaId);

  const html = `
    <div class="modal-backdrop" id="modal-move">
      <div class="modal" onclick="event.stopPropagation()">
        <button class="close-btn" data-close>&times;</button>
        <h2>Movimentar bem</h2>
        <div style="font-size:13px; color:var(--muted); margin-bottom:14px;">${escapeHtml(p.descricao)}</div>

        <div class="lock-hint">
          <span>ℹ️</span>
          <span>${isOpProprio ? 'Sua solicitação será analisada pelo administrador. Após aprovação, o destinatário precisará <strong>aceitar o recebimento</strong>.' : 'O destinatário precisará <strong>aceitar o recebimento</strong> para a movimentação ser efetivada.'}</span>
        </div>

        <form id="move-form">
          <div class="form-group">
            <label>Tipo</label>
            <select id="m-tipo">
              <option value="transferencia_local_resp">Transferir local e/ou responsável</option>
            </select>
          </div>
          <div class="form-group">
            <label>Novo local</label>
            <select id="m-local">
              <option value="">— Manter (${escapeHtml((Lookup.loc(p.localizacaoAtualId)||{}).nome || '—')}) —</option>
              ${DB.localizacoes.map(l => `<option value="${l.id}">${escapeHtml(l.nome)}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Novo responsável</label>
            <select id="m-resp">
              <option value="">— Manter (${escapeHtml((Lookup.user(p.responsavelAtualId)||{}).nome || '—')}) —</option>
              ${DB.usuarios.map(c => `<option value="${c.id}">${escapeHtml(c.nome)} (${escapeHtml(c.setor || '—')})</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Motivo / Observação</label>
            <textarea id="m-motivo" rows="2" placeholder="Ex.: Realocação para nova obra"></textarea>
          </div>
          <button type="submit" class="btn">Registrar movimentação</button>
        </form>
      </div>
    </div>
  `;
  const wrap = document.createElement('div'); wrap.innerHTML = html;
  const node = wrap.firstElementChild; document.body.appendChild(node);
  node.addEventListener('click', e => { if (e.target === node) node.remove(); });
  node.querySelector('[data-close]').addEventListener('click', () => node.remove());

  node.querySelector('#move-form').addEventListener('submit', e => {
    e.preventDefault();
    const novoLocal = parseInt(node.querySelector('#m-local').value) || null;
    const novoResp = node.querySelector('#m-resp').value || null;   // uuid (string)
    const motivo = node.querySelector('#m-motivo').value.trim();
    if (!novoLocal && !novoResp) return toast('Escolha local ou responsável', 'error');

    const tipo = novoLocal && novoResp ? 'transferencia_local_resp' : (novoLocal ? 'transferencia_local' : 'transferencia_resp');
    if (isOpProprio) {
      // Operador OBRA: pede aprovação do ADM OBRA antes de aplicar
      p.pendingMove = { localizacaoAtualId: novoLocal, responsavelAtualId: novoResp, motivo: motivo || '', tipo };
      p.statusBeforePending = p.status;
      p.status = 'aguardando_aprovacao_movimentacao';
      p.solicitadoMovPor = u.id;
      p.atualizadoEm = new Date().toISOString();
      DB.movimentacoes.push({
        id: nextId('movimentacoes'),
        patrimonioId: p.id, tipo: 'solicitacao_movimentacao',
        data: new Date().toISOString(),
        usuarioId: u.id,
        motivo: 'Solicitação de movimentação' + (motivo ? ' — ' + motivo : ''),
        destinoLocalId: novoLocal, destinoRespId: novoResp
      });
      save();
      notificarWhatsApp('movimentacao_solicitada', {
        codigo: p.codigoBarras, descricao: p.descricao,
        respAtual: (Lookup.user(p.responsavelAtualId) || {}).nome,
        respNovo:  (Lookup.user(novoResp) || {}).nome,
        localizacaoNova: ((DB.localizacoes||[]).find(l => l.id === novoLocal) || {}).nome,
        motivo,
        solicitadoPor: u.nome
      }, WhatsDest.aprovadoresDaCategoria(p.categoriaId).concat([u.id]));
      node.remove();
      toast('Solicitação enviada — aguardando aprovação do administrador', 'success');
      render();
      return;
    }
    DB.movimentacoes.push({
      id: nextId('movimentacoes'),
      patrimonioId: p.id, tipo,
      data: new Date().toISOString(),
      usuarioId: u.id,
      motivo: motivo || 'Movimentação registrada',
      destinoLocalId: novoLocal, destinoRespId: novoResp
    });
    const respAntes = p.responsavelAtualId;
    if (novoLocal) p.localizacaoAtualId = novoLocal;
    if (novoResp)  p.responsavelAtualId = novoResp;
    p.status = 'aguardando_aceite';
    p.atualizadoEm = new Date().toISOString();
    save();
    // Movimentação direta (admin/diretoria) — avisa partes envolvidas + pede aceite ao destino
    notificarWhatsApp('movimentacao_aprovada', {
      codigo: p.codigoBarras, descricao: p.descricao,
      respNovo: (Lookup.user(novoResp) || {}).nome,
      localizacaoNova: ((DB.localizacoes||[]).find(l => l.id === novoLocal) || {}).nome,
      aprovadoPor: u.nome
    }, [respAntes, novoResp, u.id].filter(Boolean));
    if (novoResp) {
      notificarWhatsApp('recebimento_pendente', {
        codigo: p.codigoBarras, descricao: p.descricao,
        localizacao: ((DB.localizacoes||[]).find(l => l.id === novoLocal) || {}).nome,
        enviadoPor: u.nome
      }, [novoResp]);
    }
    node.remove();
    toast('Movimentação registrada — aguardando aceite do destinatário', 'success');
    render();
  });
}

function acceptReceipt(patrimonioId) {
  const p = DB.patrimonios.find(x => x.id === patrimonioId);
  const u = Lookup.user(DB.currentUser);
  if (p.status !== 'aguardando_aceite' || p.responsavelAtualId !== u.id) {
    return toast('Apenas o destinatário pode aceitar', 'error');
  }
  // Se havia status pendente (ex: aguardando aceite p/ envio à manutenção), aplica
  if (p.pendingStatus) { p.status = p.pendingStatus; delete p.pendingStatus; }
  else { p.status = 'ativo'; }
  p.atualizadoEm = new Date().toISOString();
  DB.movimentacoes.push({
    id: nextId('movimentacoes'), patrimonioId: p.id,
    tipo: 'aceite_recebimento', data: new Date().toISOString(),
    usuarioId: u.id, motivo: 'Recebimento confirmado pelo destinatário'
  });
  save();
  notificarWhatsApp('recebimento_aceito', {
    codigo: p.codigoBarras, descricao: p.descricao,
    responsavel: u.nome
  }, WhatsDest.envolvidos(p).concat(WhatsDest.diretoria()));
  toast('Recebimento confirmado', 'success');
  render();
}
