/* ============== APROVAÇÕES DE CADASTRO ============== */
function approveCadastro(patrimonioId) {
  const p = DB.patrimonios.find(x => x.id === patrimonioId);
  const u = Lookup.user(DB.currentUser);
  if (!p || p.status !== 'aguardando_aprovacao_cadastro') return;
  if (!Perms.canApproveCadastro(u, p.categoriaId)) return toast('Sem permissão para aprovar', 'error');
  // Software (cat 3): aprovação vai direto para ativo (não há aceite físico de licença)
  const isSoft = p.categoriaId === 3;
  p.status = isSoft ? 'ativo' : 'aguardando_aceite';
  p.aprovadoPor = u.id; p.aprovadoEm = new Date().toISOString();
  DB.movimentacoes.push({
    id: nextId('movimentacoes'), patrimonioId: p.id,
    tipo: 'aprovacao_cadastro', data: new Date().toISOString(),
    usuarioId: u.id, motivo: isSoft ? 'Licença aprovada e ativada' : 'Cadastro aprovado'
  });
  save();
  notificarWhatsApp('cadastro_aprovado', {
    codigo: p.codigoBarras, descricao: p.descricao,
    responsavel: (Lookup.user(p.responsavelAtualId) || {}).nome,
    aprovadoPor: u.nome,
    isSoftware: isSoft
  }, [p.criadoPor, p.responsavelAtualId].filter(Boolean));
  // Aviso ao responsável que precisa aceitar (hardware)
  if (!isSoft && p.responsavelAtualId && p.responsavelAtualId !== p.criadoPor) {
    notificarWhatsApp('recebimento_pendente', {
      codigo: p.codigoBarras, descricao: p.descricao,
      localizacao: ((DB.localizacoes||[]).find(l => l.id === p.localizacaoAtualId) || {}).nome,
      enviadoPor: u.nome
    }, [p.responsavelAtualId]);
  }
  toast(isSoft ? 'Licença aprovada e ativada' : 'Cadastro aprovado — aguardando aceite do responsável', 'success');
  render();
}
function rejectCadastro(patrimonioId) {
  const p = DB.patrimonios.find(x => x.id === patrimonioId);

/* ============== APROVAÇÕES DE BAIXA / EXTRAVIO ============== */
function requestBaixa(patrimonioId, tipo) {
  const p = DB.patrimonios.find(x => x.id === patrimonioId);
  const u = Lookup.user(DB.currentUser);
  if (!p) return;
  if (!Perms.canRequestBaixa(u, p.categoriaId)) return toast('Sem permissão', 'error');
  const label = tipo === 'baixa' ? 'baixa' : 'extravio';
  if (Perms.isDiretoria(u)) {
    if (!confirm(`Confirmar ${label} deste patrimônio?`)) return;
    p.statusAnterior = p.status;
    p.status = tipo === 'baixa' ? 'baixado' : 'extraviado';
    p.atualizadoEm = new Date().toISOString();
    DB.movimentacoes.push({
      id: nextId('movimentacoes'), patrimonioId: p.id,
      tipo: tipo === 'baixa' ? 'baixa' : 'extravio',
      data: new Date().toISOString(), usuarioId: u.id,
      motivo: tipo === 'baixa' ? 'Baixa do patrimônio (Diretoria)' : 'Item extraviado (Diretoria)'
    });
    save();
    notificarWhatsApp(tipo === 'baixa' ? 'baixa_aprovada' : 'extravio_aprovado', {
      codigo: p.codigoBarras, descricao: p.descricao,
      aprovadoPor: u.nome
    }, WhatsDest.diretoriaMais(p.responsavelAtualId, p.criadoPor));
    toast(`${label.charAt(0).toUpperCase()+label.slice(1)} efetivada`, 'success'); render(); return;
  }
  const motivo = prompt(`Motivo da solicitação de ${label}:`, '');
  if (motivo === null) return;
  p.statusAnterior = p.status;
  p.status = tipo === 'baixa' ? 'aguardando_aprovacao_baixa' : 'aguardando_aprovacao_extravio';
  p.solicitadoPor = u.id; p.solicitadoEm = new Date().toISOString(); p.solicitacaoMotivo = motivo;
  DB.movimentacoes.push({
    id: nextId('movimentacoes'), patrimonioId: p.id,
    tipo: tipo === 'baixa' ? 'solicitacao_baixa' : 'solicitacao_extravio',
    data: new Date().toISOString(), usuarioId: u.id,
    motivo: motivo || `Solicitação de ${label}`
  });
  save();
  notificarWhatsApp(tipo === 'baixa' ? 'baixa_solicitada' : 'extravio_solicitado', {
    codigo: p.codigoBarras, descricao: p.descricao,
    responsavel: (Lookup.user(p.responsavelAtualId) || {}).nome,
    motivo,
    solicitadoPor: u.nome
  }, WhatsDest.diretoriaMais(u.id, p.responsavelAtualId));
  toast(`Solicitação de ${label} enviada à Diretoria`, 'success'); render();
}
function approveBaixa(patrimonioId) {

function deletePatrimonio(patrimonioId) {
  const u = Lookup.user(DB.currentUser);
  if (!Perms.canDelete(u)) return toast('Apenas a Diretoria pode excluir', 'error');
  const p = DB.patrimonios.find(x => x.id === patrimonioId);
  if (!p) return;
  // Exclusão LÓGICA: o item some do app (status 'excluido' é filtrado em canSee),
  // mas o registro e todo o histórico de movimentações continuam no Supabase.
  // Não removemos das listas em memória → o sync não dispara DELETE no banco.
  p.status = 'excluido';

    id: nextId('movimentacoes'), patrimonioId: p.id,

    usuarioId: u.id, motivo: 'Excluído do app pela Diretoria — registro preservado'
  });

  toast('Patrimônio excluído (registro mantido no Supabase)', 'success');
  render();
}

function bindCreate() {
  const u = Lookup.user(DB.currentUser);
  if (!Perms.canCreate(u)) return;

  const scanBtn = $('#c-scan');
  if (scanBtn) scanBtn.addEventListener('click', () => openScanner((code) => { $('#c-codigo').value = code; }));

  // Botões de foto: tirar (camera) ou galeria
  const btnTirar = $('#btn-tirar-foto');
  const btnEscolher = $('#btn-escolher-foto');
  const inpFoto = $('#c-foto');
  const inpGal  = $('#c-foto-galeria');
  if (btnTirar && inpFoto) btnTirar.addEventListener('click', () => inpFoto.click());
  if (btnEscolher && inpGal) btnEscolher.addEventListener('click', () => inpGal.click());
  // Preview e copia da seleção da galeria para o input principal
  const previewFoto = (file) => {
    const preview = $('#c-foto-preview');
    if (!file || !preview) return;
    if (!file.type.startsWith('image/')) { preview.innerHTML = '<div style="color:var(--danger);font-size:12px;">Apenas imagens.</div>'; return; }
    const url = URL.createObjectURL(file);
    preview.innerHTML = `<img src="${url}" style="max-width:200px;max-height:200px;border-radius:8px;border:1px solid var(--border);">`;
  };
  if (inpFoto) inpFoto.addEventListener('change', e => previewFoto(e.target.files[0]));
  if (inpGal)  inpGal.addEventListener('change',  e => {
    // Move o arquivo para inpFoto para o submit lê-lo dali
    if (inpGal.files[0]) {
      const dt = new DataTransfer();
      dt.items.add(inpGal.files[0]);
      inpFoto.files = dt.files;
      previewFoto(inpGal.files[0]);
    }
  });

  // Toggle campos software
  const catSel = $('#c-cat');
  function toggleSoftwareFields() {
    if (!catSel) return;
    const isSoft = parseInt(catSel.value) === 3;
    const fhw  = $('#form-hardware'),  fsw  = $('#form-software');
    const fhwx = $('#form-hw-extra');
    if (fhw)  fhw.style.display  = isSoft ? 'none'  : 'block';
    if (fhwx) fhwx.style.display = isSoft ? 'none'  : 'block';
    if (fsw)  fsw.style.display  = isSoft ? 'block' : 'none';
    if ($('#sw-chave'))  $('#sw-chave').required  = isSoft;
    if ($('#sw-resp'))   $('#sw-resp').required   = isSoft;
    if ($('#sw-equipamento')) $('#sw-equipamento').required = isSoft;
    if ($('#sw-subcat')) $('#sw-subcat').required = isSoft;
    if ($('#c-desc'))    $('#c-desc').required    = !isSoft;
    if ($('#c-loc'))     $('#c-loc').required     = !isSoft;
    if ($('#c-resp'))    $('#c-resp').required    = !isSoft;
    if ($('#c-subcat'))  $('#c-subcat').required  = !isSoft;
    if ($('#c-foto'))    $('#c-foto').required    = !isSoft;
    // Código de barras: só usado para hardware (software é auto-gerado)
    const codGroup = $('#c-codigo-group');
    const codInput = $('#c-codigo');
    if (codGroup) codGroup.style.display = isSoft ? 'none' : 'block';
    if (codInput) codInput.required = !isSoft;
    // Popular subcategorias hardware
    const subcatSel = $('#c-subcat');
    if (subcatSel && !isSoft) {
      const catId = parseInt(catSel.value);
      const subs = (DB.subcategorias||[]).filter(s => s.categoriaId === catId);
      subcatSel.innerHTML = '<option value="">— Selecione —</option>' + subs.map(s => `<option value="${s.id}">${escapeHtml(s.nome)}</option>`).join('');
    }
    // Popular subcategorias software (com pré-seleção da primeira)
    const swSubcatSel = $('#sw-subcat');
    if (swSubcatSel && isSoft) {
      const subs = (DB.subcategorias||[]).filter(s => s.categoriaId === 3);
      swSubcatSel.innerHTML = subs.map((s,i) => `<option value="${s.id}"${i===0?' selected':''}>${escapeHtml(s.nome)}</option>`).join('');
    }
    // Pré-preencher Data do registro com hoje
    const swDataReg = $('#sw-data-registro');
    if (swDataReg && isSoft && !swDataReg.value) {
      swDataReg.value = new Date().toISOString().slice(0,10);
    }
  }
  if (catSel) { catSel.addEventListener('change', toggleSoftwareFields); toggleSoftwareFields(); }


  $('#create-form').addEventListener('submit', async e => {
    e.preventDefault();
    const catId = parseInt($('#c-cat').value);
    const isOperador = Perms.isOperador(u);
    if (!isOperador && !Perms.canManageCategoria(u, catId)) return toast('Sem permissão para esta categoria', 'error');

    // ── Softwares TI (cat 3) ─────────────────────────────────
    if (catId === 3) {
      const chave = $('#sw-chave')  ? $('#sw-chave').value.trim()  : '';
      const resp  = $('#sw-resp')   ? $('#sw-resp').value.trim()   : '';
      const equip = $('#sw-equipamento') ? $('#sw-equipamento').value.trim() : '';
      const swSubcatId = $('#sw-subcat') ? (parseInt($('#sw-subcat').value)||null) : null;
      if (!swSubcatId) return toast('Selecione a subcategoria', 'error');
      if (!chave)      return toast('Informe o número da licença', 'error');
      if (!resp)       return toast('Informe o responsável', 'error');
      if (!equip)      return toast('Informe o equipamento', 'error');
      const subcatObj = (DB.subcategorias||[]).find(s => s.id === swSubcatId);
      const subcatNome = subcatObj ? subcatObj.nome : 'Licença';
      const descricao  = subcatNome + ' — ' + chave;
      const autoCode = 'BM-SW-' + String(DB._nextId.patrimonios).padStart(4,'0');
      const sw = {
        id: nextId('patrimonios'), codigoBarras: autoCode,
        categoriaId: 3, subcategoriaId: swSubcatId,
        descricao: descricao, tipoSoftware: subcatNome,
        licencaChave: chave,
        licencaValidade: $('#sw-validade') ? $('#sw-validade').value || null : null,
        licencaResponsavel: resp,
        licencaEquipamento: equip,
        valorAquisicao: parseFloat($('#sw-valor') ? $('#sw-valor').value : '0') || 0,
        dataAquisicao: $('#sw-data') ? $('#sw-data').value || null : null,
        dataRegistro:  $('#sw-data-registro') ? $('#sw-data-registro').value || null : null,
        observacoes: '',
        status: isOperador ? 'aguardando_aprovacao_cadastro' : 'ativo',
        criadoPor: u.id, criadoEm: new Date().toISOString(),
        localizacaoAtualId: null, responsavelAtualId: u.id
      };
      DB.patrimonios.push(sw);
      DB.movimentacoes.push({
        id: nextId('movimentacoes'), patrimonioId: sw.id,
        tipo: isOperador ? 'solicitacao_cadastro' : 'cadastro',
        data: new Date().toISOString(), usuarioId: u.id,
        motivo: isOperador ? 'Solicitação de cadastro de licença — aguardando aprovação' : 'Licença cadastrada'
      });
      save();
      const destSw = isOperador
        ? WhatsDest.aprovadoresDaCategoria(3).concat([u.id])
        : WhatsDest.diretoriaMais(u.id);
      notificarWhatsApp(isOperador ? 'patrimonio_solicitado' : 'patrimonio_cadastrado', {
        codigo: sw.codigoBarras,
        descricao: sw.descricao,
        categoria: 'TI - Softwares',
        subcategoria: subcatNome,
        responsavel: resp,
        valor: sw.valorAquisicao,
        criadoPor: u.nome,
        aguardandoAprovacao: isOperador,
      }, destSw);
      toast(
        isOperador
          ? 'Solicitação enviada — aguardando aprovação do administrador'
          : 'Licença cadastrada!',
        'success'
      );
      State.tab='list'; render(); return;
    }

    // ── Hardware (cats 1 e 2) ─────────────────────────────────
    const codigo = $('#c-codigo').value.trim();
    if (!codigo) return toast('Informe o código de barras / número do patrimônio', 'error');
    if (DB.patrimonios.some(p => p.codigoBarras.toLowerCase() === codigo.toLowerCase())) {
      return toast('Já existe um patrimônio cadastrado com este código: ' + codigo, 'error');
    }
    const subcatId = $('#c-subcat') ? (parseInt($('#c-subcat').value)||null) : null;
    if (!subcatId) return toast('Selecione a subcategoria', 'error');
    const fotoFile = $('#c-foto') && $('#c-foto').files[0];
    if (!fotoFile) return toast('Adicione o registro fotográfico', 'error');
    toast('Processando foto...', 'success');
    const fotoDataURL = await comprimirImagem(fotoFile);

    const novo = {
      id: nextId('patrimonios'),
      codigoBarras: codigo,
      descricao: $('#c-desc').value.trim(),
      categoriaId: catId,
      subcategoriaId: subcatId,
      notaFiscal: $('#c-nf').value.trim(),
      dataAquisicao: $('#c-data').value || null,
      valorAquisicao: parseFloat($('#c-valor').value) || 0,
      localizacaoAtualId: parseInt($('#c-loc').value),
      responsavelAtualId: $('#c-resp').value || null,   // uuid (string) do auth.users
      observacoes: $('#c-obs').value.trim(),
      foto: fotoDataURL,
      status: isOperador ? 'aguardando_aprovacao_cadastro' : 'aguardando_aceite',
      criadoPor: u.id,
      criadoEm: new Date().toISOString()
    };
    DB.patrimonios.push(novo);
    DB.movimentacoes.push({
      id: nextId('movimentacoes'), patrimonioId: novo.id,
      tipo: isOperador ? 'solicitacao_cadastro' : 'cadastro',
      data: new Date().toISOString(),
      usuarioId: u.id,
      motivo: isOperador ? 'Solicitação de cadastro — aguardando aprovação' : 'Cadastro inicial',
      destinoLocalId: novo.localizacaoAtualId, destinoRespId: novo.responsavelAtualId
    });
    save();
    // Destinatários:
    //  - Aguardando aprovação: aprovadores da categoria (Diretoria + admin)
    //  - Cadastro direto (admin/diretoria): responsável atual (precisa aceitar)
    const destCad = isOperador
      ? WhatsDest.aprovadoresDaCategoria(novo.categoriaId).concat([u.id])
      : [novo.responsavelAtualId, u.id].filter(Boolean);
    notificarWhatsApp(isOperador ? 'patrimonio_solicitado' : 'patrimonio_cadastrado', {
      codigo: novo.codigoBarras,
      descricao: novo.descricao,
      categoria: ((DB.categorias||[]).find(c => c.id === novo.categoriaId) || {}).nome,
      subcategoria: ((DB.subcategorias||[]).find(s => s.id === novo.subcategoriaId) || {}).nome,
      responsavel: (Lookup.user(novo.responsavelAtualId) || {}).nome,
      localizacao: ((DB.localizacoes||[]).find(l => l.id === novo.localizacaoAtualId) || {}).nome,
      valor: novo.valorAquisicao,
      criadoPor: u.nome,
      aguardandoAprovacao: isOperador,
    }, destCad);
    toast(
      isOperador
        ? 'Solicitação enviada — aguardando aprovação do administrador'
        : 'Cadastrado — aguardando aceite do responsável',
      'success'
    );
    State.tab = 'list';
    render();
  });
}

  const noEscopo = Perms.isAdmin(u)
    ? todosPending.filter(p => Perms.isDiretoria(u) || Perms.canManageCategoria(u, p.categoriaId))
    : [];

  const baixasParaAprovar = Lookup.pendingBaixasForDiretoria(u);

        <h2>Cadastros aguardando sua aprovação <span class="pill">${cadastrosParaAprovar.length}</span></h2>

          <div class="item-list">${cadastrosParaAprovar.map(p => renderItemCard(p)).join('')}</div>
        ` : `<div class="empty-state" style="padding:20px;"><div class="emoji">📭</div><p>Nenhuma solicitação.</p></div>`}
      </div>
    ` : ''}

    ${Perms.canApproveCadastro(u, 1) || Perms.canApproveCadastro(u, 2) ? `
      <div class="card">
        <h2>Movimentações aguardando sua aprovação <span class="pill">${movimentacoesParaAprovar.length}</span></h2>
        <div class="card-hint">Solicitações de movimentação feitas por operadores.</div>
        ${movimentacoesParaAprovar.length ? `
          <div class="item-list">${movimentacoesParaAprovar.map(p => renderItemCard(p)).join('')}</div>
        ` : `<div class="empty-state" style="padding:20px;"><div class="emoji">📭</div><p>Nenhuma solicitação.</p></div>`}

    ${Perms.isDiretoria(u) ? `
      <div class="card">
        <h2>Baixas e extravios aguardando aprovação <span class="pill">${baixasParaAprovar.length}</span></h2>
        <div class="card-hint">Solicitações dos administradores que precisam de sua aprovação.</div>

    ${Perms.isOperador(u) ? `

        <h2>Meus cadastros aguardando aprovação <span class="pill">${meusCadastrosPendentes.length}</span></h2>

/* ============== SCANNER ============== */

let codeReader = null;
function openScanner(onCode, keepOpen=false) {
  const html = `
    <div class="modal-backdrop" id="modal-scan">
      <div class="modal" onclick="event.stopPropagation()">
        <button class="close-btn" data-close>&times;</button>
        <h2>Escanear código</h2>
        <div class="scanner-container">
          <video id="scanner-video" playsinline></video>
          <div class="scanner-overlay"></div>
          <div class="scanner-status" id="scanner-status">Aponte para o código de barras</div>
        </div>
        <div class="form-group" style="margin-top:14px;">
          <label>Ou digite o código manualmente</label>
          <input type="text" id="manual-code" placeholder="Ex.: BM-TI-0001">
        </div>
        <button class="btn" id="manual-go">Confirmar código</button>
      </div>
    </div>
  `;
  const wrap = document.createElement('div'); wrap.innerHTML = html;
  const node = wrap.firstElementChild; document.body.appendChild(node);
  const close = () => {
    if (codeReader) { try { codeReader.reset(); } catch {} codeReader = null; }
    node.remove();
  };
  node.addEventListener('click', e => { if (e.target === node) close(); });
  node.querySelector('[data-close]').addEventListener('click', close);

  const handleCode = (code) => {
    if (!onCode) {
      // default: try to find and open
      const p = DB.patrimonios.find(p => p.codigoBarras === code);
      if (p) { close(); openDetail(p.id); }
      else { node.querySelector('#scanner-status').textContent = 'Código não cadastrado: ' + code; }
      return;
    }
    if (keepOpen) {
      onCode(code);
      close();
    } else {
      onCode(code);
      close();
    }
  };

  node.querySelector('#manual-go').addEventListener('click', () => {
    const c = node.querySelector('#manual-code').value.trim();
    if (!c) return;
    handleCode(c);
  });

  // Try to start camera
  try {
    if (typeof ZXing === 'undefined') throw new Error('ZXing não carregou');
    codeReader = new ZXing.BrowserMultiFormatReader();
    codeReader.decodeFromVideoDevice(null, 'scanner-video', (result, err) => {
      if (result) {
        node.querySelector('#scanner-status').textContent = '✓ Lido: ' + result.text;
        handleCode(result.text);
      }
    }).catch(e => {
      node.querySelector('#scanner-status').textContent = 'Sem acesso à câmera. Use o campo abaixo.';
    });
  } catch (e) {
    node.querySelector('#scanner-status').textContent = 'Câmera indisponível. Digite manualmente.';
  }
}

function openReport(kind) {
  const me = Lookup.user(DB.currentUser);
  const base = Lookup.visibleItems(me);
  let titulo, rows;
  if (kind === 'cat') {
    titulo = 'Por categoria';
    rows = DB.categorias.map(c => {
      const items = base.filter(p => p.categoriaId === c.id);
      return { nome: c.icone+' '+c.nome, qtd: items.length, valor: items.reduce((s,p) => s+(p.valorAquisicao||0), 0) };
    }).filter(r => r.qtd > 0);
  } else if (kind === 'loc') {
    titulo = 'Por localização';
    rows = DB.localizacoes.map(l => {
      const items = base.filter(p => p.localizacaoAtualId === l.id);
      return { nome: l.nome, qtd: items.length, valor: items.reduce((s,p) => s+(p.valorAquisicao||0), 0) };
    }).filter(r => r.qtd > 0);
  } else {
    titulo = 'Por responsável';
    rows = DB.usuarios.map(u => {
      const items = base.filter(p => p.responsavelAtualId === u.id);
      return { nome: u.nome+' ('+(u.setor||'—')+')', qtd: items.length, valor: items.reduce((s,p) => s+(p.valorAquisicao||0), 0) };
    }).filter(r => r.qtd > 0);
  }
  const html = `
    <div class="modal-backdrop" id="modal-rep">
      <div class="modal" onclick="event.stopPropagation()">
        <button class="close-btn" data-close>&times;</button>
        <h2>Relatório · ${titulo}</h2>
        <div class="card" style="padding:0;">
          ${rows.map(r => `
            <div class="detail-row" style="padding:12px;">
              <span class="label" style="color:var(--text); font-weight:600;">${escapeHtml(r.nome)}</span>
              <span class="value">${r.qtd} itens · ${fmtMoney(r.valor)}</span>
            </div>
          `).join('') || '<div class="empty-state"><p>Sem dados.</p></div>'}
        </div>
      </div>
    </div>
  `;
  const wrap = document.createElement('div'); wrap.innerHTML = html;
  const node = wrap.firstElementChild; document.body.appendChild(node);
  node.addEventListener('click', e => { if (e.target === node) node.remove(); });
  node.querySelector('[data-close]').addEventListener('click', () => node.remove());
}

function exportCSV() {
  const me = Lookup.user(DB.currentUser);
  const sep = ';';
  const headers = ['Codigo','Descricao','Categoria','NF','Aquisicao','Valor','Status','Localizacao','Responsavel'];
  const rows = Lookup.visibleItems(me).map(p => [
    p.codigoBarras,
    (p.descricao||'').replace(/[\r\n;]/g,' '),
    (Lookup.cat(p.categoriaId)||{}).nome || '',
    p.notaFiscal||'',
    p.dataAquisicao||'', (p.valorAquisicao||0).toFixed(2).replace('.',','),
    statusLabel(p.status),
    (Lookup.loc(p.localizacaoAtualId)||{}).nome || '',
    (Lookup.user(p.responsavelAtualId)||{}).nome || ''
  ]);
  const csv = '﻿' + [headers, ...rows].map(r => r.join(sep)).join('\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'patrimonio_brandao_marmo.csv';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('CSV exportado', 'success');
}

  const wrap = document.createElement('div'); wrap.innerHTML = html;

    if (target.perfil === 'diretoria') {
      const diretoresAtivos = DB.usuarios.filter(x => x.perfil === 'diretoria' && x.ativo !== false).length;
      if (diretoresAtivos <= 1) {
        return toast('⛔ Não é possível desativar o último usuário Diretoria. O app ficaria sem administrador-raiz.', 'error');

      const aviso = prompt(
        `⚠️ ATENÇÃO — desativar usuário DIRETORIA\n\n` +

        `   ${target.nome} (${target.email})\n\n` +

          .update({ nome, setor, perfil, whatsapp, ativo: true, updated_at: new Date().toISOString() })

      }
      return;
    }
    // Não existe: chama a Edge Function `criar-usuario` (server-side, com service_role).
    if (!SB) return toast('Supabase indisponível', 'error');
    if (u.perfil !== 'diretoria') return toast('Apenas a Diretoria pode criar usuários.', 'error');
    if (!email || !nome) return toast('Preencha nome e e-mail.', 'error');

    } catch (err) {
      toast('Erro ao criar usuário: ' + (err.message || ''), 'error');
    }
  });
}

            <div class="form-help">Obrigatório. Receberá todas as notificações do app.</div>
          </div>
          <div class="form-group">
            <label>Perfil ${
              targetMaster ? '<span style="color:var(--brand-navy);font-size:11px;font-weight:normal;">🛡️ (conta-mestre — bloqueado)</span>'
                           : (isDir ? '' : '<span style="color:var(--muted);font-size:11px;font-weight:normal;">(só Diretoria altera)</span>')

            <select id="edu-perfil" ${perfilEditavel ? '' : 'disabled style="background:#f3f4f6;color:#6b7280;"'}>
              ${perfisDisp.map(([v,l]) => `<option value="${v}" ${target.perfil===v?'selected':''}>${l}</option>`).join('')}
              ${!perfisDisp.find(([v]) => v === target.perfil) ? `<option value="${target.perfil}" selected>${Perms.perfilLabel(target.perfil)}</option>` : ''}
            </select>
          </div>
          <button class="btn">💾 Salvar alterações</button>
        </form>
      </div>

  node.addEventListener('click', e => { if (e.target === node) { node.remove(); openCadUser(); } });
  node.querySelector('[data-close]').addEventListener('click', () => { node.remove(); openCadUser(); });

  // Máscara WhatsApp
  const whatsInput = node.querySelector('#edu-whats');
  whatsInput.addEventListener('input', () => {
    whatsInput.value = whatsFormatar(whatsInput.value);
    try { whatsInput.setSelectionRange(whatsInput.value.length, whatsInput.value.length); } catch {}
  });

  node.querySelector('#edu-form').addEventListener('submit', async e => {
    e.preventDefault();
    if (!SB) return toast('Supabase indisponível', 'error');
    const nome  = node.querySelector('#edu-nome').value.trim();

      openCadUser();
    } catch (err) {
      toast('Erro ao atualizar: ' + (err.message || ''), 'error');
    }
  });

/* ============== IMPORTAÇÃO CSV ============== */
function parseCSV(text) {
  // Parser CSV simples com suporte a aspas e vírgulas dentro de campos.
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i+1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') inQuotes = false;
      else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',' || c === ';') { row.push(field); field = ''; }
      else if (c === '\r') { /* skip */ }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else field += c;
    }
  }
  if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
  return rows.filter(r => r.some(v => (v||'').trim() !== ''));
}

function csvEscape(v) {
  if (v == null) return '';
  const s = String(v);
  if (/[",;\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function downloadCsv(filename, rows) {
  const csv = rows.map(r => r.map(csvEscape).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

          <h2 style="margin:0;font-size:18px;">Importar CSV</h2>
        </div>
        <div class="form-group">
          <label>Categoria</label>
          <select id="csv-cat">
            ${DB.categorias.map(c => `<option value="${c.id}">${c.icone} ${escapeHtml(c.nome)}</option>`).join('')}
          </select>
        </div>
        <div style="background:#f9fafb;border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px;font-size:13px;">
          <div style="font-weight:700;margin-bottom:6px;">Como funciona</div>
          <div style="color:var(--muted);line-height:1.5;">
            1. Baixe o modelo da categoria escolhida.<br>
            2. Preencha no Excel/Sheets e salve como <strong>CSV (separado por vírgula)</strong>.<br>
            3. Carregue o arquivo aqui. Códigos já existentes serão <strong>sobrescritos</strong>.
          </div>
        </div>
        <button class="btn secondary" id="csv-template" style="margin-bottom:12px;">📄 Baixar modelo CSV</button>
        <div class="form-group">
          <label>Arquivo CSV</label>
          <input type="file" id="csv-file" accept=".csv,text/csv">
        </div>
        <div id="csv-preview" style="font-size:12px;color:var(--muted);margin-bottom:12px;"></div>
        <button class="btn" id="csv-import">📥 Importar</button>
      </div>
    </div>`;
  const wrap = document.createElement('div'); wrap.innerHTML = html;
  const node = wrap.firstElementChild; document.body.appendChild(node);
  node.addEventListener('click', e => { if (e.target === node) node.remove(); });
  node.querySelector('[data-close]').addEventListener('click', () => node.remove());

  // Baixar modelo
  node.querySelector('#csv-template').addEventListener('click', () => {
    const catId = parseInt(node.querySelector('#csv-cat').value);
    const tpl = CSV_TEMPLATES[catId]; if (!tpl) return;
    const cat = Lookup.cat(catId);
    downloadCsv(`modelo-${cat.nome.replace(/[^a-z0-9]+/gi,'_').toLowerCase()}.csv`, [tpl.headers, tpl.sample]);
  });

  // Preview do arquivo
  let parsedRows = null;
  node.querySelector('#csv-file').addEventListener('change', (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        parsedRows = parseCSV(ev.target.result.replace(/^\uFEFF/,''));
        const total = parsedRows.length - 1;
        node.querySelector('#csv-preview').innerHTML = total > 0
          ? `<div style="color:var(--success);">✓ ${total} linha(s) lida(s). Cabeçalho: <code>${parsedRows[0].slice(0,5).join(', ')}…</code></div>`
          : `<div style="color:var(--danger);">Arquivo vazio ou sem dados.</div>`;
      } catch (err) {
        parsedRows = null;
        node.querySelector('#csv-preview').innerHTML = `<div style="color:var(--danger);">Erro ao ler: ${escapeHtml(err.message)}</div>`;
      }
    };
    reader.readAsText(file, 'utf-8');
  });

  // Importar
  node.querySelector('#csv-import').addEventListener('click', () => {
    if (!parsedRows || parsedRows.length < 2) return toast('Selecione um CSV com dados', 'error');
    const catId = parseInt(node.querySelector('#csv-cat').value);
    const tpl = CSV_TEMPLATES[catId]; if (!tpl) return;
    const headers = parsedRows[0].map(h => h.trim());
    const required = tpl.headers;
    const missing = required.filter(h => !headers.includes(h));
    if (missing.length) return toast(`Colunas faltando: ${missing.join(', ')}`, 'error');

    let criados = 0, atualizados = 0, erros = [];
    const idx = (h) => headers.indexOf(h);

    for (let i = 1; i < parsedRows.length; i++) {
      const row = parsedRows[i];
      const get = (h) => (row[idx(h)] || '').trim();
      try {
        if (catId === 3) {
          // SOFTWARE
          const subNome = get('subcategoria');
          let sub = (DB.subcategorias||[]).find(x => x.categoriaId === 3 && x.nome.toLowerCase() === subNome.toLowerCase());
          if (!sub) {
            sub = { id: nextId('subcategorias'), nome: subNome || 'Outros', categoriaId: 3 };
            DB.subcategorias.push(sub);
          }
          const chave = get('licencaChave');
          if (!chave) { erros.push(`L${i+1}: licencaChave vazio`); continue; }
          const codigo = 'BM-SW-' + String(DB._nextId.patrimonios).padStart(4,'0');
          const desc = sub.nome + ' — ' + chave;
          const novo = {
            id: nextId('patrimonios'), codigoBarras: codigo,
            categoriaId: 3, subcategoriaId: sub.id,
            descricao: desc, tipoSoftware: sub.nome,
            licencaChave: chave,
            licencaValidade: get('licencaValidade') || null,
            licencaResponsavel: get('licencaResponsavel'),
            licencaEquipamento: get('licencaEquipamento'),
            valorAquisicao: parseFloat(get('valorAquisicao')) || 0,
            dataAquisicao: get('dataAquisicao') || null,
            dataRegistro: get('dataRegistro') || null,
            observacoes: get('observacoes'),
            status: 'ativo', criadoPor: u.id, criadoEm: new Date().toISOString(),
            localizacaoAtualId: null, responsavelAtualId: u.id
          };
          DB.patrimonios.push(novo);
          DB.movimentacoes.push({ id: nextId('movimentacoes'), patrimonioId: novo.id,
            tipo: 'cadastro', data: new Date().toISOString(), usuarioId: u.id, motivo: 'Importação CSV' });
          criados++;
        } else {
          // HARDWARE (Obra ou TI - Equipamentos)
          const codigo = get('codigoBarras');
          if (!codigo) { erros.push(`L${i+1}: codigoBarras vazio`); continue; }
          const desc = get('descricao');
          if (!desc) { erros.push(`L${i+1}: descricao vazia`); continue; }
          const subNome = get('subcategoria');
          let sub = (DB.subcategorias||[]).find(x => x.categoriaId === catId && x.nome.toLowerCase() === subNome.toLowerCase());
          if (!sub && subNome) {
            sub = { id: nextId('subcategorias'), nome: subNome, categoriaId: catId };
            DB.subcategorias.push(sub);
          }
          const locNome = get('localizacao');
          let loc = (DB.localizacoes||[]).find(x => x.nome.toLowerCase() === locNome.toLowerCase());
          if (!loc && locNome) {
            loc = { id: nextId('localizacoes'), nome: locNome, tipo: 'unidade', parent: null };
            DB.localizacoes.push(loc);
          }
          const respEmail = get('responsavelEmail').toLowerCase();
          let resp = DB.usuarios.find(x => x.email.toLowerCase() === respEmail);
          if (!resp) resp = u; // default ao admin que importa

          const existing = DB.patrimonios.find(p => p.codigoBarras.toLowerCase() === codigo.toLowerCase());
          const dados = {
            codigoBarras: codigo,
            descricao: desc,
            categoriaId: catId,
            subcategoriaId: sub ? sub.id : null,
            marca: get('marca'),
            modelo: get('modelo'),
            numeroSerie: get('numeroSerie'),
            notaFiscal: get('notaFiscal'),
            dataAquisicao: get('dataAquisicao') || null,
            valorAquisicao: parseFloat(get('valorAquisicao')) || 0,
            localizacaoAtualId: loc ? loc.id : null,
            responsavelAtualId: resp.id,
            observacoes: get('observacoes')
          };
          if (existing) {
            Object.assign(existing, dados);
            atualizados++;
            DB.movimentacoes.push({ id: nextId('movimentacoes'), patrimonioId: existing.id,
              tipo: 'edicao', data: new Date().toISOString(), usuarioId: u.id, motivo: 'Atualizado via importação CSV' });
          } else {
            const novo = { id: nextId('patrimonios'), ...dados,
              status: 'ativo', criadoPor: u.id, criadoEm: new Date().toISOString() };
            DB.patrimonios.push(novo);
            DB.movimentacoes.push({ id: nextId('movimentacoes'), patrimonioId: novo.id,
              tipo: 'cadastro', data: new Date().toISOString(), usuarioId: u.id, motivo: 'Importação CSV' });
            criados++;
          }
        }
      } catch (err) {
        erros.push(`L${i+1}: ${err.message}`);
      }
    }
    save();
    let msg = `${criados} criado(s), ${atualizados} atualizado(s)`;
    if (erros.length) msg += `, ${erros.length} erro(s)`;
    toast(msg, erros.length ? 'error' : 'success');
    if (erros.length) console.warn('Erros de importação:', erros);
    node.remove();
    render();
  });
}

// Comprime imagem (File) e retorna Promise<dataURL JPEG>
function comprimirImagem(file, maxLado = 1280, qualidade = 0.75) {
  return new Promise((resolve, reject) => {
    if (!file) return resolve(null);
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxLado || h > maxLado) {
          if (w > h) { h = Math.round(h * maxLado / w); w = maxLado; }
          else       { w = Math.round(w * maxLado / h); h = maxLado; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', qualidade));
      };
      img.onerror = () => reject(new Error('Falha ao ler imagem'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('Falha ao ler arquivo'));
    reader.readAsDataURL(file);
  });
}

/* ============== INIT ============== */
// Registra Service Worker para PWA standalone (Android esconde URL bar)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW:', err));
  });
}

(async () => {
  const appEl = document.getElementById('app');
  if (appEl) appEl.innerHTML = '<div style="padding:60px 20px;text-align:center;color:#1B2A5E;font-family:sans-serif;"><div style="font-size:32px;margin-bottom:16px;">⏳</div><div style="font-weight:700;">Carregando...</div></div>';

  // Verifica sessão do Supabase Auth ANTES de tentar carregar dados.
  // Sem sessão, a RLS bloqueia leitura de app_state — exibe tela de login.
  const session = await Auth.getSession();

  if (!session) {
    // Sem login: carrega só o estado mínimo do cache local (ou seed)
    // para que a tela de login renderize. A carga real vem após signIn.
    try {
      const raw = localStorage.getItem(BMStore.KEY);
      DB = raw ? { ...JSON.parse(raw), currentUser: null } : { ...BMStore.seed(), currentUser: null };
    } catch { DB = { ...BMStore.seed(), currentUser: null }; }
    render();
  } else {
    try { DB = await BMStore.load(); }
    catch (e) { console.error('Erro ao carregar dados:', e); DB = { ...BMStore.seed(), currentUser: null }; }
    const id = await syncCurrentUserFromAuth(session.user);
    if (id == null) {
      // Sessão existe mas o usuário não está provisionado: sai e mostra login.
      await Auth.signOut();
      DB.currentUser = null;
    } else {
      DB.currentUser = id;
    }
    render();
  }

  // Realtime: qualquer mudança nas 7 tabelas (ou em profiles) dispara reload.
  // O callback é chamado uma única vez por janela de 250ms — agrupa rajadas.
  BMStore.subscribe(async () => {
    try {
      const myUserId = DB && DB.currentUser;
      const fresh = await BMStore.load();
      DB = { ...fresh, currentUser: myUserId };
      render();
    } catch (e) { console.warn('[Realtime] reload falhou:', e && e.message); }
  });

  // Reage a sign-out em outras abas ou expiração de token
  Auth.onChange(async (event, sess) => {
    if (event === 'SIGNED_OUT' || !sess) {
      DB.currentUser = null;
      render();
    } else if (event === 'SIGNED_IN' && sess && (!DB.currentUser)) {
      try { DB = await BMStore.load(); } catch {}
      const id = await syncCurrentUserFromAuth(sess.user);
      DB.currentUser = id;
      render();
    }
  });
})();
</script>
