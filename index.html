<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SESMT B&M - Controle de Documentação</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bm-blue:#1a3d7c; --bm-orange:#e8a23a;
    --bg:#f4f6fa; --card:#fff; --text:#1f2937; --muted:#6b7280; --border:#e5e7eb;
    --ok:#16a34a; --warn:#f59e0b; --crit:#dc2626; --info:#2563eb;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
    --radius:10px;
  }
  body{background:linear-gradient(180deg,#eef2f9 0%,var(--bg) 200px) fixed}
  .card{border-radius:var(--radius);border:1px solid rgba(0,0,0,.04)}
  .topbar{box-shadow:0 2px 4px rgba(0,0,0,.04)}
  .sidebar{background:linear-gradient(180deg,#fff 0%,#fafbfd 100%)}
  .stat-card{border-radius:var(--radius);transition:transform .15s}
  .stat-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
  .btn-primary{box-shadow:0 1px 2px rgba(26,61,124,.2)}
  table thead th:first-child{border-radius:6px 0 0 0}
  table thead th:last-child{border-radius:0 6px 0 0}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
  button{font-family:inherit;cursor:pointer;border:none;font-size:14px}
  input,select,textarea{font-family:inherit;font-size:14px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;width:100%;background:#fff}
  textarea{resize:vertical;min-height:60px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--bm-blue);box-shadow:0 0 0 3px rgba(26,61,124,.1)}
  label{display:block;margin-bottom:4px;font-weight:500;color:#374151;font-size:13px}
  .btn{padding:8px 16px;border-radius:6px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .btn-primary{background:var(--bm-blue);color:#fff} .btn-primary:hover{background:#162f5e}
  .btn-secondary{background:#fff;color:var(--bm-blue);border:1px solid var(--bm-blue)} .btn-secondary:hover{background:#f0f4fb}
  .btn-danger{background:#fee2e2;color:var(--crit)} .btn-danger:hover{background:#fecaca}
  .btn-success{background:var(--ok);color:#fff} .btn-success:hover{background:#15803d}
  .btn-warn{background:#fef3c7;color:#92400e}
  .btn-sm{padding:4px 10px;font-size:12px}

  /* LOGIN */
  #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f254d 0%,var(--bm-blue) 50%,#0a1d3d 100%);position:relative;overflow:hidden}
  #loginScreen::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(232,162,58,.15) 0%,transparent 70%);top:-200px;right:-200px}
  #loginScreen::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.05) 0%,transparent 70%);bottom:-200px;left:-150px}
  .login-box{background:#fff;padding:44px 40px;border-radius:16px;width:420px;box-shadow:0 30px 70px rgba(0,0,0,.4);position:relative;z-index:1}
  .logo{text-align:center;margin-bottom:28px}
  .logo-name{font-size:32px;font-weight:800;color:var(--bm-blue);letter-spacing:.5px;line-height:1}
  .logo-name span{color:var(--bm-orange)}
  .logo-sub{font-size:11px;color:var(--bm-blue);letter-spacing:3px;margin-top:6px;font-weight:600;opacity:.7}
  .form-group{margin-bottom:16px}
  .login-hint{font-size:12px;color:var(--muted);margin-top:16px;padding:10px;background:#f9fafb;border-radius:6px}
  .filtros-box{background:#fff;border:1px solid var(--border);border-left:3px solid var(--bm-blue);border-radius:8px;padding:12px 14px;margin-bottom:14px}
  .filtros-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
  .filtros-row:last-child{margin-bottom:0}
  .filtros-row .label{font-size:12px;font-weight:600;color:var(--muted);min-width:90px;letter-spacing:.3px;text-transform:uppercase}
  .pill-filter{display:inline-block;padding:5px 12px;border:1px solid var(--border);background:#f9fafb;color:var(--text);border-radius:18px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
  .pill-filter:hover{border-color:var(--bm-blue);background:#eef2f9}
  .pill-filter.active{background:var(--bm-blue);color:#fff;border-color:var(--bm-blue);box-shadow:0 1px 3px rgba(26,61,124,.3)}
  .pill-filter.active-status-ok{background:var(--ok);border-color:var(--ok)}
  .pill-filter.active-status-warn{background:var(--warn);border-color:var(--warn);color:#000}
  .pill-filter.active-status-crit{background:var(--crit);border-color:var(--crit)}
  .pill-filter.active-status-info{background:var(--info);border-color:var(--info)}
  .pill-filter.active-status-pendente{background:#6b7280;border-color:#6b7280}
  .filtros-scroll{display:flex;gap:6px;flex-wrap:wrap;flex:1}
  .filtros-busca{flex:1;min-width:200px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px}
  .filtros-clear{margin-left:auto;background:transparent;border:none;color:var(--crit);font-size:12px;font-weight:600;cursor:pointer;padding:4px 8px}
  .filtros-clear:hover{text-decoration:underline}
  .login-hint b{color:var(--text)}

  /* APP */
  #appScreen{display:none}
  .topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:50}
  .topbar-left{display:flex;align-items:center;gap:30px}
  .topbar .logo-name{font-size:18px}
  .user-info{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted)}
  .user-info b{color:var(--text)}
  .badge-role{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px}
  .badge-role.sesmt{background:#1a3d7c;color:#fff}
  .badge-role.coordenador,.badge-role.engenheiro{background:#0d9488;color:#fff}
  .badge-role.visualizador{background:#6b7280;color:#fff}
  .badge-role.empresa{background:#e8a23a;color:#fff}
  .layout{display:flex;min-height:calc(100vh - 60px - 56px)}
  .footer{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#fff;border-top:1px solid var(--border);color:var(--muted);font-size:12px;height:56px}
  .footer img{max-height:30px}
  .sidebar{width:230px;background:#fff;border-right:1px solid var(--border);padding:16px 0}
  .nav-section{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:14px 20px 6px;font-weight:600}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;color:#4b5563;font-weight:500;border-left:3px solid transparent}
  .nav-item:hover{background:#f9fafb;color:var(--text)}
  .nav-item.active{background:#eef2f9;color:var(--bm-blue);border-color:var(--bm-blue)}
  .nav-icon{font-size:15px;width:18px;text-align:center}
  .main{flex:1;padding:24px;overflow:auto}
  .page-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;gap:16px;flex-wrap:wrap}
  .page-title{font-size:22px;font-weight:700;color:var(--text)}
  .page-sub{color:var(--muted);font-size:13px;margin-top:2px}

  /* CARDS */
  .card{background:var(--card);border-radius:8px;box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:20px}
  .stat-card{background:#fff;padding:18px;border-radius:8px;box-shadow:var(--shadow);border-left:4px solid var(--bm-blue)}
  .stat-card.ok{border-color:var(--ok)}
  .stat-card.warn{border-color:var(--warn)}
  .stat-card.crit{border-color:var(--crit)}
  .stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .stat-value{font-size:28px;font-weight:700;color:var(--text)}
  .stat-sub{font-size:12px;color:var(--muted);margin-top:2px}

  /* TABLE */
  table{width:100%;border-collapse:collapse}
  th{background:#f9fafb;text-align:left;padding:10px 12px;font-weight:600;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
  td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
  tr:hover td{background:#fafbfc}
  .status{display:inline-block;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
  .status.ok{background:#dcfce7;color:#166534}
  .status.warn{background:#fef3c7;color:#92400e}
  .status.crit{background:#fee2e2;color:#991b1b}
  .status.pendente{background:#e5e7eb;color:#4b5563}
  .status.info{background:#dbeafe;color:#1e40af}

  /* MODAL */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:20px}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:12px;width:100%;max-width:700px;max-height:92vh;overflow:auto}
  .modal.lg{max-width:900px}
  .modal-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
  .modal-title{font-size:18px;font-weight:600}
  .modal-close{background:none;color:var(--muted);font-size:22px;line-height:1}
  .modal-body{padding:20px 24px}
  .modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:#fff}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

  /* TOOLBAR / FILTROS */
  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;background:#fff;padding:12px;border-radius:8px;box-shadow:var(--shadow);border-left:4px solid var(--bm-blue)}
  .toolbar::before{content:'🔎 Filtros:';font-weight:600;color:var(--bm-blue);font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-right:8px}
  .toolbar input,.toolbar select{max-width:240px}
  .toolbar label{margin:0;font-size:12px;white-space:nowrap}
  .toolbar-spacer{flex:1}
  .empty{text-align:center;padding:40px;color:var(--muted)}
  .empty-icon{font-size:40px;margin-bottom:10px}
  .pill{display:inline-block;background:#eef2f9;color:var(--bm-blue);padding:2px 8px;border-radius:10px;font-size:11px;margin-right:4px;margin-bottom:4px;font-weight:500}

  /* CHECKBOX LIST */
  .checkbox-list{max-height:240px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;padding:6px}
  .checkbox-list label{display:flex;align-items:flex-start;gap:8px;padding:6px 10px;font-weight:400;cursor:pointer;border-radius:4px;font-size:13px}
  .checkbox-list label:hover{background:#f9fafb}
  .checkbox-list input{width:auto;margin-top:3px}
  .checkbox-list .cat{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600;padding:8px 10px 4px;letter-spacing:1px}

  .toast{position:fixed;top:80px;right:24px;background:var(--ok);color:#fff;padding:12px 18px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:200;animation:slideIn .3s;max-width:380px}
  .toast.err{background:var(--crit)} .toast.warn{background:var(--warn);color:#fff}
  @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
  .alert{padding:12px 16px;background:#fef3c7;border-left:4px solid var(--warn);border-radius:6px;margin-bottom:16px;font-size:13px}
  .alert.info{background:#dbeafe;border-color:#3b82f6}
  .alert.success{background:#dcfce7;border-color:var(--ok)}
  details{margin-bottom:8px;border:1px solid var(--border);border-radius:6px}
  summary{padding:10px 14px;cursor:pointer;font-weight:500;background:#f9fafb;border-radius:6px}
  details[open] summary{border-bottom:1px solid var(--border);border-radius:6px 6px 0 0}

  .doc-row{display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid #f3f4f6}
  .doc-row:last-child{border-bottom:none}
  .doc-name{font-weight:500}
  .doc-meta{font-size:11px;color:var(--muted);margin-top:2px}
  .badge-ia{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
  .badge-ia.aprovado{background:#dcfce7;color:#166534}
  .badge-ia.duvida{background:#fef3c7;color:#92400e}
  .badge-ia.recusado{background:#fee2e2;color:#991b1b}
  .badge-ia.pendente{background:#e5e7eb;color:#4b5563}

  .small-actions{display:flex;gap:4px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="logo">
      <div class="logo-name">BRANDÃO<span>&MARMO</span></div>
      <div class="logo-sub">ENGENHARIA E CONSTRUÇÕES</div>
    </div>
    <div style="text-align:center;color:var(--muted);margin-bottom:20px;font-size:13px">Sistema SESMT — Controle de Documentação</div>
    <div class="form-group">
      <label>E-mail</label>
      <input id="loginUser" name="email" autocomplete="username" type="email" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input id="loginPass" name="password" autocomplete="current-password" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo"><div class="logo-name">B&M <span style="font-size:13px;font-weight:400;color:var(--muted)">| SESMT</span></div></div>
    </div>
    <div class="user-info">
      <span><b id="topUser">—</b> <span class="badge-role sesmt" id="topRole">SESMT</span></span>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Sair</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main"></div>
  </div>
  <div class="footer" id="footer">
    <div id="footerLogo"></div>
    <div>SESMT • Controle de Documentação • <span id="footerYear"></span></div>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal" id="modalEl">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Título</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script>
/* ===== SUPABASE ===== */
const SUPABASE_URL = 'https://vpaylafvhprihfrhqrax.supabase.co';
const SUPABASE_KEY = 'sb_publishable_UNOQ5DSb3xiZ9eIvIub8Fg_ENxPsYW3';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ===== CONSTANTES ===== */
const STORAGE_KEY = 'sesmt_bm_data_v7';
const ROLES = {
  diretoria:{label:'DIRETORIA',badge:'sesmt'},
  sesmt:{label:'SESMT',badge:'sesmt'},
  coordenador:{label:'COORDENADOR',badge:'coordenador'},
  engenheiro:{label:'ENGENHEIRO',badge:'engenheiro'},
  tst:{label:'TST',badge:'engenheiro'},
  cliente:{label:'CLIENTE',badge:'visualizador'},
  visualizador:{label:'VISUALIZADOR',badge:'visualizador'},
  empresa:{label:'EMPRESA',badge:'empresa'}
};

let DB = null;
let session = null;
let currentPage = 'dashboard';
let filtros = {obraId:'',empresaId:'',status:'',busca:''};

/* ===== STORAGE ===== */
let _syncTimer = null;
function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
  if(!session) return;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(()=>syncToSupabase().catch(e=>{console.error('sync',e); toast('Erro ao salvar online: '+(e.message||e),'err');}), 400);
}
function load(){
  DB = {usuarios:[],catalogoDocs:[],catalogoFuncoes:[],empresas:[],obras:[],funcionarios:[],maquinas:[],documentos:[],logs:[],
    config:{smtp:{host:'',porta:587,usuario:'',senha:'',remetente:''},diasAvisoVencimento:30,iaHabilitada:true,geminiApiKey:'',geminiModel:'gemini-2.0-flash',webhookMake:'',logoData:'',nomeEmpresa:'BRANDÃO & MARMO',corPrimaria:'#1a3d7c',corSecundaria:'#e8a23a'}};
}

async function loadFromSupabase(){
  try{
    const [us,cd,cf,em,ob,eo,fu,mq,dc,cfg,lg] = await Promise.all([
      sb.from('usuarios').select('*'),
      sb.from('catalogo_documentos').select('*'),
      sb.from('catalogo_funcoes').select('*'),
      sb.from('empresas').select('*'),
      sb.from('obras').select('*'),
      sb.from('empresa_obras').select('*'),
      sb.from('funcionarios').select('*'),
      sb.from('maquinas').select('*'),
      sb.from('documentos').select('*'),
      sb.from('config').select('*').eq('id',1).maybeSingle(),
      sb.from('logs_email').select('*').order('data',{ascending:false}).limit(200)
    ]);
    DB.usuarios = (us.data||[]).map(u=>({id:u.id,email:u.email,nome:u.nome,tipo:u.tipo,empresaId:u.empresa_id,obraIds:u.obra_ids||[],naoApagar:u.nao_apagar}));
    DB.catalogoDocs = (cd.data||[]).map(d=>({id:d.id,nome:d.nome,categoria:d.categoria,validadeDias:d.validade_dias,descricao:d.descricao,checklistIA:d.checklist_ia}));
    DB.catalogoFuncoes = (cf.data||[]).map(f=>({id:f.id,nome:f.nome,docsIds:f.docs_ids||[]}));
    const emObras = {}; (eo.data||[]).forEach(r=>{(emObras[r.empresa_id]=emObras[r.empresa_id]||[]).push(r.obra_id);});
    DB.empresas = (em.data||[]).map(e=>({id:e.id,cnpj:e.cnpj,razao:e.razao,responsavel:e.responsavel,email:e.email,telefone:e.telefone,obraIds:emObras[e.id]||[]}));
    DB.obras = (ob.data||[]).map(o=>({id:o.id,nome:o.nome,endereco:o.endereco,ativa:o.ativa,clienteNome:o.cliente_nome,destinatariosExtras:o.destinatarios_extras,coordenadorId:o.coordenador_id,engenheiroId:o.engenheiro_id,tstId:o.tst_id,sesmtId:o.sesmt_id,docsEmpresa:o.docs_empresa||[],docsFuncionarioBase:o.docs_funcionario_base||[],docsMaquina:o.docs_maquina||[]}));
    DB.funcionarios = (fu.data||[]).map(f=>({id:f.id,empresaId:f.empresa_id,obraId:f.obra_id,nome:f.nome,cpf:f.cpf,funcaoId:f.funcao_id,ativo:f.ativo}));
    DB.maquinas = (mq.data||[]).map(m=>({id:m.id,empresaId:m.empresa_id,obraId:m.obra_id,descricao:m.descricao,patrimonio:m.patrimonio}));
    DB.documentos = (dc.data||[]).map(d=>({id:d.id,refTipo:d.ref_tipo,refId:d.ref_id,obraId:d.obra_id,docId:d.doc_id,arquivo:d.arquivo,arquivoPath:d.arquivo_path,arquivoData:'',emitidoEm:d.emitido_em,validade:d.validade,iaStatus:d.ia_status,iaNota:d.ia_nota,sesmtStatus:d.sesmt_status,sesmtMotivo:d.sesmt_motivo,sesmtPor:d.sesmt_por}));
    if(cfg.data){
      const c = cfg.data;
      DB.config = {smtp:{host:c.smtp_host||'',porta:c.smtp_porta||587,usuario:c.smtp_user||'',senha:c.smtp_pass||'',remetente:c.smtp_remetente||''},diasAvisoVencimento:c.dias_aviso_vencimento||30,iaHabilitada:c.ia_habilitada!==false,geminiApiKey:c.gemini_api_key||'',geminiModel:c.gemini_model||'gemini-2.0-flash',webhookMake:c.webhook_make||'',logoData:c.logo_data||'',nomeEmpresa:c.nome_empresa||'BRANDÃO & MARMO',corPrimaria:c.cor_primaria||'#1a3d7c',corSecundaria:c.cor_secundaria||'#e8a23a'};
    }
    DB.logs = (lg.data||[]).map(l=>({data:new Date(l.data).toLocaleString('pt-BR'),para:l.para,cc:l.cc,assunto:l.assunto,itens:l.itens,enviadoPor:l.enviado_por,via:l.via}));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
  }catch(e){ console.error('loadFromSupabase',e); toast('Erro ao carregar dados: '+(e.message||e),'err'); }
}

async function syncToSupabase(){
  if(!session) return;
  const c = DB.config;

/* ===== LOGIN ===== */
async function doLogin(){
  const e = document.getElementById('loginUser').value.trim().toLowerCase();
  const p = document.getElementById('loginPass').value;
  toast('Entrando...');
  const {data:auth, error} = await sb.auth.signInWithPassword({email:e, password:p});
  if(error){ toast('E-mail ou senha inválidos','err'); return; }
  const {data:perfil, error:errP} = await sb.from('usuarios').select('*').eq('id', auth.user.id).maybeSingle();
  if(errP || !perfil){ toast('Conta sem perfil. Contate o admin.','err'); await sb.auth.signOut(); return; }
  session = {id:perfil.id, email:perfil.email, nome:perfil.nome, tipo:perfil.tipo, empresaId:perfil.empresa_id, obraIds:perfil.obra_ids||[], naoApagar:perfil.nao_apagar};
  await loadFromSupabase();
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  // logo / nome no topbar
  const logoEl = document.querySelector('.topbar .logo .logo-name');
  if(DB.config.logoData){
    logoEl.innerHTML = `<img src="${DB.config.logoData}" style="max-height:34px;vertical-align:middle"> <span style="font-size:13px;font-weight:400;color:var(--muted);margin-left:8px">| SESMT</span>`;
  } else {
    logoEl.innerHTML = `${DB.config.nomeEmpresa||'B&M'} <span style="font-size:13px;font-weight:400;color:var(--muted)">| SESMT</span>`;
  }
  aplicarTema();
  // logo no rodapé
  const fl = document.getElementById('footerLogo');
  if(DB.config.logoData){
    fl.innerHTML = `<img src="${DB.config.logoData}">`;
  } else {
    fl.innerHTML = `<b style="color:var(--bm-blue)">${DB.config.nomeEmpresa||'B&M'}</b>`;
  }
  document.getElementById('footerYear').textContent = new Date().getFullYear();
  document.getElementById('topUser').textContent = session.nome;
  const role = ROLES[session.tipo];
  const rb = document.getElementById('topRole');
  rb.textContent = role.label;
  rb.className = 'badge-role '+role.badge;
  filtros = {obraId:'',empresaId:'',status:'',busca:''};
  renderSidebar();
  go('dashboard');
}

}

/* ===== PERMISSÕES ===== */
function pode(acao){
  if(!session) return false;
  const t = session.tipo;
  // ações: 'config_docs','config_obra','aprovar_doc','enviar_doc','ver_tudo','gerir_usuarios','notificar'
  const p = {
    diretoria:['*'],
    sesmt:['*'],
    coordenador:['ver_obra','enviar_doc','notificar'],
    engenheiro:['ver_obra','enviar_doc','notificar'],
    tst:['ver_obra','enviar_doc','notificar','aprovar_doc'],
    cliente:['ver_obra'],
    visualizador:['ver_obra'],
    empresa:['enviar_doc','ver_propria']
  };
  return p[t].includes('*') || p[t].includes(acao);
}

function escopoObras(){
  if(!session) return [];
  if(['diretoria','sesmt','visualizador'].includes(session.tipo)) return DB.obras;
  if(session.tipo==='empresa'){
    const emp = DB.empresas.find(e=>e.id===session.empresaId);
    return DB.obras.filter(o=>(emp?.obraIds||[]).includes(o.id));
  }
  return DB.obras.filter(o=>session.obraIds.includes(o.id));
}
function escopoEmpresas(){
  if(!session) return [];
  if(session.tipo==='empresa') return DB.empresas.filter(e=>e.id===session.empresaId);
  if(['diretoria','sesmt','visualizador'].includes(session.tipo)) return DB.empresas;
  // coord/eng: empresas que têm gente nas suas obras
  const oids = session.obraIds;
  const eids = new Set();
  DB.funcionarios.filter(f=>oids.includes(f.obraId)).forEach(f=>eids.add(f.empresaId));
  DB.maquinas.filter(m=>oids.includes(m.obraId)).forEach(m=>eids.add(m.empresaId));
  return DB.empresas.filter(e=>eids.has(e.id));
}
function escopoFuncionarios(){
  if(!session) return [];
  if(session.tipo==='empresa') return DB.funcionarios.filter(f=>f.empresaId===session.empresaId);
  if(['diretoria','sesmt','visualizador'].includes(session.tipo)) return DB.funcionarios;
  return DB.funcionarios.filter(f=>session.obraIds.includes(f.obraId));
}
function escopoMaquinas(){
  if(!session) return [];
  if(session.tipo==='empresa') return DB.maquinas.filter(m=>m.empresaId===session.empresaId);
  if(['diretoria','sesmt','visualizador'].includes(session.tipo)) return DB.maquinas;
  return DB.maquinas.filter(m=>session.obraIds.includes(m.obraId));
}

/* ===== DOCS EXIGIDOS / STATUS ===== */
function docsExigidosEmpresa(empresa, obraId){
  // união de todas as obras onde a empresa atua (ou apenas a obra filtrada)
  const obras = obraId ? DB.obras.filter(o=>o.id===obraId) : DB.obras.filter(o=>{
    return DB.funcionarios.some(f=>f.empresaId===empresa.id && f.obraId===o.id) ||
           DB.maquinas.some(m=>m.empresaId===empresa.id && m.obraId===o.id);
  });
  const ids = new Set();
  obras.forEach(o=>(o.docsEmpresa||[]).forEach(d=>ids.add(d)));
  return [...ids].map(id=>DB.catalogoDocs.find(d=>d.id===id)).filter(Boolean);
}
function docsExigidosFuncionario(func){
  const obra = DB.obras.find(o=>o.id===func.obraId);
  const funcao = DB.catalogoFuncoes.find(f=>f.id==func.funcaoId);
  const ids = new Set([...(obra?.docsFuncionarioBase||[]), ...(funcao?.docsIds||[])]);
  return [...ids].map(id=>DB.catalogoDocs.find(d=>d.id===id)).filter(Boolean);
}
function docsExigidosMaquina(maq){
  const obra = DB.obras.find(o=>o.id===maq.obraId);
  return (obra?.docsMaquina||[]).map(id=>DB.catalogoDocs.find(d=>d.id===id)).filter(Boolean);
}

function getDoc(tipo, refId, docId, obraId){
  return DB.documentos.find(d=>d.refTipo===tipo && d.refId===refId && d.docId===docId && (tipo!=='empresa' || (d.obraId||null)===(obraId||null)));
}

function statusDoc(doc, exigencia){
  if(!doc) return {label:'NÃO ENVIADO', cls:'pendente', dias:null};
  // status sesmt manda
  if(doc.sesmtStatus==='recusado') return {label:'RECUSADO', cls:'crit'};
  if(doc.sesmtStatus==='pendente') return {label:'AGUARDANDO SESMT', cls:'info'};
  // sesmt aprovado: verifica validade
  if(exigencia && exigencia.validadeDias && doc.validade){
    const dias = Math.floor((new Date(doc.validade)-new Date())/86400000);
    if(dias<0) return {label:'VENCIDO', cls:'crit', dias};
    if(dias<=DB.config.diasAvisoVencimento) return {label:`Vence em ${dias}d`, cls:'warn', dias};
  }
  return {label:'EM DIA', cls:'ok'};
}

function calcStatus(tipo, ref){
  let ok=0,warn=0,crit=0,pend=0,aguard=0,total=0;
  function bump(s){ total++; if(s.cls==='ok')ok++; else if(s.cls==='warn')warn++; else if(s.cls==='crit')crit++; else if(s.cls==='info')aguard++; else pend++; }
  if(tipo==='empresa'){
    (ref.obraIds||[]).forEach(oid=>{
      const obra = DB.obras.find(o=>o.id===oid);
      (obra?.docsEmpresa||[]).forEach(did=>{
        const ex = DB.catalogoDocs.find(c=>c.id===did); if(!ex) return;
        bump(statusDoc(getDoc('empresa',ref.id,did,oid), ex));
      });
    });
  } else {
    const exigidos = tipo==='funcionario'?docsExigidosFuncionario(ref) : docsExigidosMaquina(ref);
    exigidos.forEach(e=>bump(statusDoc(getDoc(tipo, ref.id, e.id), e)));
  }
  return {total, ok, warn, crit, pend, aguard};
}

/* ===== IA ===== */
function simularIA(){
  const r = Math.random();
  if(r<0.7) return {iaStatus:'aprovado', iaNota:'(Simulado) Documento parece OK.'};
  if(r<0.9) return {iaStatus:'duvida', iaNota:'(Simulado) Revisão recomendada.'};
  return {iaStatus:'recusado', iaNota:'(Simulado) Ilegível.'};
}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=>res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function analisarComGemini(file, docExigido, contexto){
  const apiKey = DB.config.geminiApiKey;
  if(!apiKey) return simularIA();
  if(!file) return {iaStatus:'pendente', iaNota:'Sem arquivo para analisar.'};

  const checklist = docExigido.checklistIA || docExigido.descricao || '';
  const prompt = `Voce e um analista SENIOR de SESMT (Saude e Seguranca do Trabalho) experiente, JUSTO e EQUILIBRADO, de uma construtora brasileira (Brandao & Marmo). Sua funcao e validar documentos enviados por empresas terceirizadas.

DOCUMENTO ESPERADO: "${docExigido.nome}"

CONTEXTO CADASTRADO NO SISTEMA:
${contexto}

${checklist ? 'CHECKLIST ESPECIFICO DA B&M PARA ESTE DOCUMENTO:\n'+checklist+'\n' : ''}

═══ PRINCIPIO BASICO ═══
NA DUVIDA, MARQUE "duvida" PARA REVISAO HUMANA. NAO "recusado".
SO "recusado" se houver problema CLARO e INSANAVEL.
Voce deve ser JUSTO: documentos validos da vida real tem variacoes — aceite as razoaveis.

═══ VARIACOES QUE VOCE DEVE ACEITAR (NAO sao motivo de recusa) ═══
- Acentuacao: "JOSE" = "JOSÉ", "MARCAO" = "MARÇÃO"
- Abreviacoes: "Jr." = "Junior", "J." = "Jose", "Ma." = "Maria"
- Sobrenome: ordem diferente, sobrenome composto, "de/da/dos" com ou sem
- CPF/CNPJ: "123.456.789-00" = "12345678900", com ou sem formatacao
- Maiusculas/minusculas
- Espacos extras, traços, pontos
- Qualidade de scan razoavel (mesmo um pouco borrado se da pra ler)
- Diferenca de fonte/layout entre documentos
- Carimbos/assinaturas em variacoes de cor/posicao

═══ SO RECUSE ("recusado") QUANDO ═══
1. NOME no PDF for de PESSOA COMPLETAMENTE DIFERENTE da cadastrada (nao apenas variacao)
2. CPF/CNPJ tiver DIGITOS NUMERICOS diferentes (nao apenas formatacao)
3. TIPO de documento for outro completamente (ex: enviaram CNH no lugar de ASO)
4. Documento for FALSIFICADO, RASURADO, ou claramente fraudulento
5. Estiver TAO ilegivel que e impossivel extrair qualquer dado

═══ MARQUE "duvida" QUANDO ═══
- Nao conseguir ler claramente nome ou CPF (mas o documento parece valido)
- Algum item do checklist nao for confirmavel mas tambem nao for negado
- Documento parece OK mas com qualidade ruim
- Voce nao tem certeza absoluta — prefere revisao humana

═══ APROVE QUANDO ═══
- Identidade bate (mesmo com variacoes toleraveis)
- Tipo de documento confere
- Checklist principal atendido
- Documento legivel e completo

OUTPUT: APENAS UM JSON PURO, SEM markdown, SEM backticks. Formato EXATO:
{
  "status": "aprovado",
  "resumo": "uma frase curta resumindo a analise",
  "leitura": {
    "nome": "nome encontrado no PDF ou null",
    "cpf_cnpj": "CPF/CNPJ encontrado no PDF (com formatacao) ou null",
    "funcao": "funcao/cargo encontrado ou null",
    "emissao": "data de emissao encontrada ou null",
    "validade": "data de validade encontrada ou null",
    "outros_dados": "outras informacoes relevantes (CRM, ART, nr horas, etc) ou null"
  },
  "comparacao": {
    "nome_bate": "sim / nao / parcial / nao_visivel",
    "cpf_cnpj_bate": "sim / nao / parcial / nao_visivel",
    "funcao_compativel": "sim / nao / parcial / nao_aplicavel"
  },
  "checklist": [
    {"item": "texto do item verificado", "atendido": true, "observacao": "detalhe opcional"}
  ],
  "divergencias": ["lista de problemas reais encontrados, ou vazia"],
  "recomendacao": "se status != aprovado, o que fazer para corrigir; se aprovado, vazio"
}`;

  try{
    const base64 = await fileToBase64(file);
    const mimeType = file.type || 'application/pdf';
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${DB.config.geminiModel||'gemini-2.0-flash'}:generateContent?key=${encodeURIComponent(apiKey)}`;
    const res = await fetch(url, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        contents:[{parts:[
          {inline_data:{mime_type:mimeType, data:base64}},
          {text:prompt}
        ]}],
        generationConfig:{temperature:0.15, maxOutputTokens:3000, responseMimeType:'application/json'}
      })
    });
    if(!res.ok){
      const err = await res.text();
      return {iaStatus:'pendente', iaNota:`Erro Gemini ${res.status}: ${err.slice(0,200)}`};
    }
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const cleaned = text.replace(/```json|```/g,'').trim();
    let parsed;
    try{ parsed = JSON.parse(cleaned); }
    catch(e){
      const m = cleaned.match(/\{[\s\S]*\}/);
      if(m){ try{ parsed = JSON.parse(m[0]); }catch(e2){ return {iaStatus:'pendente', iaNota:'IA respondeu fora do formato JSON. Texto: '+cleaned.slice(0,300)}; } }
      else return {iaStatus:'pendente', iaNota:'IA respondeu fora do formato JSON. Texto: '+cleaned.slice(0,300)};
    }
    const status = ['aprovado','duvida','recusado'].includes(parsed.status) ? parsed.status : 'duvida';
    return {iaStatus:status, iaNota: formatarNotaIA(parsed)};
  } catch(e){
    return {iaStatus:'pendente', iaNota:'Falha ao chamar Gemini: '+e.message};
  }
}

function formatarNotaIA(p){
  const linhas = [];
  if(p.resumo) linhas.push('📋 RESUMO: '+p.resumo);
  if(p.leitura){
    linhas.push('');
    linhas.push('🔍 DADOS LIDOS NO DOCUMENTO:');
    const L = p.leitura;
    if(L.nome) linhas.push('  • Nome: '+L.nome);
    if(L.cpf_cnpj) linhas.push('  • CPF/CNPJ: '+L.cpf_cnpj);
    if(L.funcao) linhas.push('  • Função/Cargo: '+L.funcao);
    if(L.emissao) linhas.push('  • Emissão: '+L.emissao);
    if(L.validade) linhas.push('  • Validade: '+L.validade);
    if(L.outros_dados) linhas.push('  • Outros: '+L.outros_dados);
  }
  if(p.comparacao){
    linhas.push('');
    linhas.push('✓ COMPARAÇÃO COM CADASTRO:');
    const C = p.comparacao;
    const map = (v)=>({sim:'✅ confere',nao:'❌ DIVERGENTE',parcial:'⚠️ parcial',nao_visivel:'❓ não visível',nao_aplicavel:'— n/a'})[v]||v;
    if(C.nome_bate) linhas.push('  • Nome: '+map(C.nome_bate));
    if(C.cpf_cnpj_bate) linhas.push('  • CPF/CNPJ: '+map(C.cpf_cnpj_bate));
    if(C.funcao_compativel) linhas.push('  • Função: '+map(C.funcao_compativel));
  }
  if(Array.isArray(p.checklist) && p.checklist.length){
    linhas.push('');
    linhas.push('📝 CHECKLIST DE VALIDAÇÃO:');
    p.checklist.forEach(c=>{
      const mark = c.atendido?'✅':'❌';
      linhas.push('  '+mark+' '+c.item+(c.observacao?' — '+c.observacao:''));
    });
  }
  if(Array.isArray(p.divergencias) && p.divergencias.length){
    linhas.push('');
    linhas.push('⚠️ DIVERGÊNCIAS / PROBLEMAS:');
    p.divergencias.forEach(d=>linhas.push('  • '+d));
  }
  if(p.recomendacao){
    linhas.push('');
    linhas.push('💡 RECOMENDAÇÃO: '+p.recomendacao);
  }
  return linhas.join('\n');
}

    html += `</div></div>`;

  // EMPRESA
  if(opts.empresa && !isEmpresa && emps.length>=1){
    html += `<div class="filtros-row"><span class="label">🏢 Empresa</span><div class="filtros-scroll">`;
    html += `<button class="pill-filter ${!filtros.empresaId?'active':''}" onclick="filtros.empresaId='';go('${currentPage}')">Todas</button>`;

    html += `</div></div>`;
  }
  // STATUS
  if(opts.status){
    const sts = [['','Todos'],['ok','Em dia'],['warn','Vencendo'],['crit','Vencidos/Recusados'],['info','Aguardando SESMT'],['pendente','Não enviados']];
    html += `<div class="filtros-row"><span class="label">📊 Status</span><div class="filtros-scroll">`;
    html += sts.map(([v,l])=>{const act=filtros.status===v;const cls=act?(v?`active active-status-${v}`:'active'):''; return `<button class="pill-filter ${cls}" onclick="filtros.status='${v}';go('${currentPage}')">${l}</button>`;}).join('');
    html += `</div></div>`;
  }
  html += `</div>`;
  return html;
}

function checkboxesDocs(categoria, selecionados, name){
  const docs = DB.catalogoDocs.filter(d=>d.categoria===categoria);
  if(docs.length===0) return '<div class="empty">Nenhum documento no catálogo. Cadastre em Catálogo de Documentos.</div>';
  return docs.map(d=>`<label><input type="checkbox" name="${name}" value="${d.id}" ${selecionados.includes(d.id)?'checked':''}><span><b>${d.nome}</b>${d.validadeDias?` <span style="color:var(--muted);font-size:11px">(${d.validadeDias}d)</span>`:''}${d.descricao?`<div style="font-size:11px;color:var(--muted)">${d.descricao}</div>`:''}</span></label>`).join('');
}
function getChecked(name){ return [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(i=>i.value); }

function editEmpresa(id){
  const e = id ? DB.empresas.find(x=>x.id===id) : {cnpj:'',razao:'',email:'',responsavel:'',telefone:'',obraIds:[]};
  const userExistente = id ? DB.usuarios.find(u=>u.tipo==='empresa'&&u.empresaId===id) : null;
  const obrasAtivas = DB.obras.filter(o=>o.ativa);
  showModal(id?'Editar Empresa':'Nova Empresa', `
    <div class="grid-2">
      <div class="form-group"><label>CNPJ</label><input id="f_cnpj" value="${e.cnpj}" placeholder="00.000.000/0001-00"></div>
      <div class="form-group"><label>Razão Social</label><input id="f_razao" value="${e.razao}"></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Responsável</label><input id="f_resp" value="${e.responsavel||''}"></div>
      <div class="form-group"><label>Telefone</label><input id="f_tel" value="${e.telefone||''}"></div>
    </div>
    <div class="form-group"><label>E-mail (login da empresa)</label><input id="f_email" type="email" value="${e.email}"></div>
    <div class="form-group"><label>Senha de acesso ${id?'(deixe em branco para manter)':''}</label><input id="f_senha" type="password" placeholder="${id?'••••':'Senha inicial'}"></div>
    <div class="form-group">
      <label>🏗️ Obras onde esta empresa está atuando</label>
      <div class="checkbox-list">
        ${obrasAtivas.length===0?'<div class="empty" style="padding:14px">Cadastre obras primeiro</div>':obrasAtivas.map(o=>`<label><input type="checkbox" name="f_obras_emp" value="${o.id}" ${(e.obraIds||[]).includes(o.id)?'checked':''}><span><b>${o.nome}</b><div style="font-size:11px;color:var(--muted)">${o.endereco||''}</div></span></label>`).join('')}
      </div>
    </div>
    <div class="alert info">A empresa fará login com o e-mail acima. Ela só poderá <b>enviar</b> documentos — quem define o que é exigido é o SESMT.</div>
  `, async ()=>{
    const data = {cnpj:val('f_cnpj'),razao:val('f_razao'),responsavel:val('f_resp'),telefone:val('f_tel'),email:val('f_email').toLowerCase(),obraIds:getChecked('f_obras_emp').map(x=>parseInt(x))};
    const senha = val('f_senha');
    if(!data.cnpj||!data.razao||!data.email){ toast('CNPJ, razão e e-mail obrigatórios','err'); return false; }
    if(id){
      // atualizar empresa direto no Supabase
      const {error:errE} = await sb.from('empresas').update({cnpj:data.cnpj, razao:data.razao, responsavel:data.responsavel, email:data.email, telefone:data.telefone}).eq('id', id);
      if(errE){ toast('Erro: '+errE.message,'err'); return false; }
      // atualizar empresa_obras
      await sb.from('empresa_obras').delete().eq('empresa_id', id);
      if(data.obraIds.length){
        await sb.from('empresa_obras').insert(data.obraIds.map(oid=>({empresa_id:id, obra_id:oid})));
      }
      Object.assign(e, data);
      if(userExistente && senha){ toast('Senha de usuário só pode ser alterada via "Esqueci minha senha"','warn'); }
    } else {
      if(!senha || senha.length<6){ toast('Senha obrigatória (mín. 6)','err'); return false; }
      toast('Cadastrando empresa...');
      // criar empresa
      const {data:novaEmp, error:errIns} = await sb.from('empresas').insert({cnpj:data.cnpj,razao:data.razao,responsavel:data.responsavel,email:data.email,telefone:data.telefone}).select().single();
      if(errIns){ toast('Erro ao criar empresa: '+errIns.message,'err'); return false; }
      const newId = novaEmp.id;
      // vincular obras
      if(data.obraIds.length){
        await sb.from('empresa_obras').insert(data.obraIds.map(oid=>({empresa_id:newId, obra_id:oid})));
      }
      // criar usuario tipo empresa via Edge Function
      const {data:resp, error} = await sb.functions.invoke('criar-usuario', {
        body:{email:data.email, password:senha, nome:data.razao, tipo:'empresa', empresaId:newId, obraIds:[]}
      });
      if(error||resp?.error){
        // rollback empresa
        await sb.from('empresas').delete().eq('id', newId);
        toast('Erro ao criar login: '+(resp?.error||error.message),'err');
        return false;
      }
      DB.empresas.push({id:newId,...data});
      DB.usuarios.push({id:resp.id,email:data.email,nome:data.razao,tipo:'empresa',empresaId:newId,obraIds:[],naoApagar:false});
    }
    save(); go('empresas'); toast('Empresa salva com sucesso');
    return true;
  });
}

function renderFuncionarios(){

    lista = lista.filter(f=>{
      const s = calcStatus('funcionario',f);
      if(filtros.status==='ok') return s.crit===0&&s.warn===0&&s.pend===0&&s.aguard===0;
      if(filtros.status==='crit') return s.crit>0;
      if(filtros.status==='warn') return s.warn>0;
      if(filtros.status==='pendente') return s.pend>0;
      if(filtros.status==='info') return s.aguard>0;

  document.getElementById('main').innerHTML = `

          const emp = DB.empresas.find(x=>x.id===f.empresaId);

          const funcao = DB.catalogoFuncoes.find(x=>x.id===f.funcaoId);
          const s = calcStatus('funcionario',f);
          const cls = s.crit>0?'crit':s.warn>0||s.pend>0||s.aguard>0?'warn':'ok';
          return `<tr>
            <td><b>${f.nome}</b></td><td>${f.cpf}</td><td>${funcao?.nome||'-'}</td>
            ${!isEmpresa?`<td>${emp?.razao||'-'}</td>`:''}
            <td>${obra?.nome||'-'}</td>
            <td><span class="status ${cls}">${s.ok}/${s.total}</span></td>

              <button class="btn btn-secondary btn-sm" onclick="verDocsRef('funcionario',${f.id},'${esc(f.nome)}')">📄</button>

      <div><div class="page-title">${isEmpresa?'Minhas Máquinas':'Máquinas'}</div><div class="page-sub">Equipamentos de grande porte</div></div>

    <div class="card">
      <table>
        <thead><tr><th>Descrição</th><th>Patrimônio</th>${!isEmpresa?'<th>Empresa</th>':''}<th>Obra</th><th>Conformidade</th><th></th></tr></thead>
        <tbody>${lista.map(m=>{
          const emp = DB.empresas.find(x=>x.id===m.empresaId);
          const obra = DB.obras.find(x=>x.id===m.obraId);
          const s = calcStatus('maquina',m);
          const cls = s.crit>0?'crit':s.warn>0||s.pend>0||s.aguard>0?'warn':'ok';
          return `<tr>
            <td><b>${m.descricao}</b></td><td>${m.patrimonio||'-'}</td>
            ${!isEmpresa?`<td>${emp?.razao||'-'}</td>`:''}
            <td>${obra?.nome||'-'}</td>
            <td><span class="status ${cls}">${s.ok}/${s.total}</span></td>
            <td class="small-actions">
              <button class="btn btn-secondary btn-sm" onclick="verDocsRef('maquina',${m.id},'${esc(m.descricao)}')">📄</button>
              ${pode('enviar_doc')?`<button class="btn btn-secondary btn-sm" onclick="editMaquina(${m.id})">Editar</button>`:''}
            </td>
          </tr>`;}).join('')}</tbody>
      </table>
      ${lista.length===0?'<div class="empty"><div class="empty-icon">🚜</div>Nenhuma máquina</div>':''}

  `;
}
function editMaquina(id){
  const m = id ? DB.maquinas.find(x=>x.id===id) : {descricao:'',patrimonio:'',empresaId:session.tipo==='empresa'?session.empresaId:null,obraId:null};
  const empresas = escopoEmpresas(); const obras = escopoObras();
  showModal(id?'Editar Máquina':'Nova Máquina', `
    <div class="form-group"><label>Descrição</label><input id="f_desc" value="${m.descricao}"></div>
    <div class="grid-2">
      <div class="form-group"><label>Patrimônio/Série</label><input id="f_pat" value="${m.patrimonio||''}"></div>
      <div class="form-group"><label>Empresa</label><select id="f_emp" ${session.tipo==='empresa'?'disabled':''}>${empresas.map(e=>`<option value="${e.id}" ${m.empresaId===e.id?'selected':''}>${e.razao}</option>`).join('')}</select></div>
    </div>
    <div class="form-group"><label>Obra</label><select id="f_obra"><option value="">--</option>${obras.filter(o=>o.ativa).map(o=>`<option value="${o.id}" ${m.obraId===o.id?'selected':''}>${o.nome}</option>`).join('')}</select></div>
  `, ()=>{
    const data={descricao:val('f_desc'),patrimonio:val('f_pat'),empresaId:parseInt(val('f_emp'))||m.empresaId,obraId:parseInt(val('f_obra'))||null};
    if(!data.descricao||!data.empresaId){ toast('Preencha','err'); return false; }
    if(id) Object.assign(m,data); else DB.maquinas.push({id:uid(),...data});
    save(); go('maquinas'); toast('Máquina salva'); return true;
  }, id?[{label:'Excluir',cls:'btn-danger',fn:()=>{if(confirm('Excluir?')){DB.maquinas=DB.maquinas.filter(x=>x.id!==id);DB.documentos=DB.documentos.filter(d=>!(d.refTipo==='maquina'&&d.refId===id));save();go('maquinas');closeModal();}}}]:[]);
}

/* ===== LISTA DE DOCS DE UMA REFERÊNCIA ===== */
function verDocsRef(tipo, refId, nome){
  let ref;
  if(tipo==='empresa') ref = DB.empresas.find(x=>x.id===refId);
  else if(tipo==='funcionario') ref = DB.funcionarios.find(x=>x.id===refId);
  else ref = DB.maquinas.find(x=>x.id===refId);
  showModal(`Documentos: ${nome}`, renderDocsList(tipo, ref), null, [], true, 'lg');
}
function renderDocsList(tipo, ref){
  if(tipo==='empresa'){
    if(!(ref.obraIds||[]).length) return '<div class="empty">Empresa não está vinculada a nenhuma obra. Edite a empresa e marque as obras.</div>';
    return ref.obraIds.map(oid=>{
      const obra = DB.obras.find(o=>o.id===oid);
      if(!obra) return '';
      const exigidos = (obra.docsEmpresa||[]).map(id=>DB.catalogoDocs.find(d=>d.id===id)).filter(Boolean);
      if(exigidos.length===0) return `<div style="margin-bottom:18px"><h4 style="color:var(--bm-blue);padding:8px 12px;background:#eef2f9;border-radius:6px">🏗️ ${obra.nome}</h4><div class="empty" style="padding:14px;font-size:13px">Nenhum doc de empresa exigido nesta obra.</div></div>`;
      return `<div style="margin-bottom:22px">
        <h4 style="color:var(--bm-blue);padding:8px 12px;background:#eef2f9;border-radius:6px;margin-bottom:8px">🏗️ ${obra.nome}</h4>
        ${exigidos.map(de=>renderDocRow(tipo, ref, de, oid)).join('')}
      </div>`;
    }).join('');
  }
  const exigidos = tipo==='funcionario'?docsExigidosFuncionario(ref) : docsExigidosMaquina(ref);
  if(exigidos.length===0) return '<div class="empty">Nenhum documento exigido. Verifique configuração da obra.</div>';
  return exigidos.map(de=>renderDocRow(tipo, ref, de, null)).join('');
}

function renderDocRow(tipo, ref, de, obraId){
  const doc = getDoc(tipo, ref.id, de.id, obraId);
  const s = statusDoc(doc, de);
  const obraArg = obraId?`,${obraId}`:',null';
  return `<div class="doc-row" ondragover="event.preventDefault();this.style.background='#dbeafe'" ondragleave="this.style.background=''" ondrop="dropOnRow(event,'${tipo}',${ref.id},'${de.id}','${esc(de.nome)}',${de.validadeDias||'null'}${obraArg})">
    <div>
      <div class="doc-name">${de.nome}</div>
      <div class="doc-meta">
        ${doc?`📎 ${doc.arquivo} • Emitido: ${doc.emitidoEm}${doc.validade?` • Validade: ${doc.validade}`:''}`:'<span style="color:var(--muted)">⤓ Arraste o PDF aqui ou clique em Enviar →</span>'}
      </div>
      ${doc && (doc.iaNota || doc.sesmtMotivo) ? `
        <div style="margin-top:8px;padding:10px 12px;background:#f9fafb;border-left:3px solid ${doc.sesmtStatus==='recusado'?'var(--crit)':doc.iaStatus==='recusado'?'var(--crit)':doc.iaStatus==='duvida'?'var(--warn)':'var(--info)'};border-radius:4px;font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-word">
          ${doc.iaNota?`<div><b>🤖 Análise da IA (${doc.iaStatus}):</b>\n${escapeHtml(doc.iaNota)}</div>`:''}
          ${doc.sesmtMotivo?`<div style="color:var(--crit);margin-top:8px;padding-top:8px;border-top:1px solid #fecaca"><b>✗ Motivo da recusa SESMT:</b>\n${escapeHtml(doc.sesmtMotivo)}</div>`:''}
        </div>` : ''}
    </div>
    <span class="status ${s.cls}">${s.label}</span>
    <div class="small-actions">
      ${doc && doc.arquivoData ? `<button class="btn btn-secondary btn-sm" title="Baixar" onclick="baixarDoc(${doc.id})">⬇</button>`:''}
      ${doc && pode('aprovar_doc') && doc.sesmtStatus==='pendente' ? `
        <button class="btn btn-success btn-sm" title="Aprovar" onclick="aprovarDoc(${doc.id})">✓</button>
        <button class="btn btn-danger btn-sm" title="Recusar" onclick="recusarDoc(${doc.id})">✗</button>` : ''}
      ${doc && pode('enviar_doc') ? `<button class="btn btn-danger btn-sm" title="Excluir e reenviar" onclick="excluirDoc(${doc.id})">🗑</button>`:''}
    </div>
    ${pode('enviar_doc')?`<button class="btn btn-primary btn-sm" onclick="uploadDoc('${tipo}',${ref.id},'${de.id}','${esc(de.nome)}',${de.validadeDias||'null'}${obraArg})">📎 ${doc?'Atualizar':'Enviar'}</button>`:'<div></div>'}
  </div>`;
}

function dropOnRow(e,tipo,refId,docId,docNome,validadeDias,obraId){
  e.preventDefault(); e.currentTarget.style.background='';
  const f = e.dataTransfer?.files?.[0];
  if(!f){ return; }
  if(!/(pdf|image\/(jpeg|jpg|png))/.test(f.type)){ toast('Apenas PDF ou imagem (jpg/png)','err'); return; }
  uploadDoc(tipo,refId,docId,docNome,validadeDias,obraId);
  setTimeout(()=>{
    const arq = document.getElementById('f_arq');
    if(arq){
      const dt = new DataTransfer(); dt.items.add(f);
      arq.files = dt.files;
      atualizarDropLabel(arq);
    }
  }, 120);
}

function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function uploadDoc(tipo, refId, docId, docNome, validadeDias, obraId){
  obraId = obraId||null;
  const existing = getDoc(tipo, refId, docId, obraId);
  const emitido = existing?.emitidoEm || hoje();
  const validade = validadeDias ? plusDays(validadeDias) : '';
  const docExigido = DB.catalogoDocs.find(d=>d.id===docId);
  let contexto = '';
  if(tipo==='funcionario'){
    const f = DB.funcionarios.find(x=>x.id===refId);
    const funcao = DB.catalogoFuncoes.find(c=>c.id===f?.funcaoId);
    const obra = DB.obras.find(o=>o.id===f?.obraId);
    const emp = DB.empresas.find(e=>e.id===f?.empresaId);
    contexto = `• COLABORADOR: ${f?.nome}\n• CPF: ${f?.cpf}\n• FUNÇÃO: ${funcao?.nome||''}\n• EMPRESA EMPREGADORA: ${emp?.razao||''} (CNPJ ${emp?.cnpj||''})\n• OBRA: ${obra?.nome||''}`;
  } else if(tipo==='empresa'){
    const e = DB.empresas.find(x=>x.id===refId);
    const obra = obraId ? DB.obras.find(o=>o.id===obraId) : null;
    contexto = `• EMPRESA: ${e?.razao}\n• CNPJ: ${e?.cnpj}\n• RESPONSÁVEL: ${e?.responsavel||'-'}${obra?`\n• OBRA: ${obra.nome}`:''}`;
  } else if(tipo==='maquina'){
    const m = DB.maquinas.find(x=>x.id===refId);
    const emp = DB.empresas.find(e=>e.id===m?.empresaId);
    const obra = DB.obras.find(o=>o.id===m?.obraId);
    contexto = `• MÁQUINA: ${m?.descricao}\n• PATRIMÔNIO/SÉRIE: ${m?.patrimonio||'-'}\n• EMPRESA: ${emp?.razao||''}\n• OBRA: ${obra?.nome||''}`;
  }
  const temGemini = !!DB.config.geminiApiKey;
  showModal(`Enviar: ${docNome}`, `
    <div class="form-group">
      <label>Arquivo PDF</label>
      <div id="dropZone" style="border:2px dashed var(--border);border-radius:8px;padding:24px;text-align:center;background:#f9fafb;cursor:pointer;transition:all .15s" onclick="document.getElementById('f_arq').click()">
        <div style="font-size:30px;margin-bottom:4px">📎</div>
        <div id="dropLabel" style="color:var(--muted);font-size:13px"><b>Clique</b> ou <b>arraste o PDF</b> aqui</div>
      </div>
      <input id="f_arq" type="file" accept="application/pdf,image/jpeg,image/png,image/jpg" style="display:none" onchange="atualizarDropLabel(this)">
    </div>
    <div class="alert ${temGemini?'success':'info'}">
      ${temGemini ? '🤖 <b>Análise por IA ativa</b> — Gemini vai ler o PDF e validar automaticamente.' : '⚠️ Sem chave Gemini configurada — análise será simulada. Configure em Configurações.'}
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Data de Emissão</label><input id="f_emit" type="date" value="${emitido}"></div>
      ${validadeDias?`<div class="form-group"><label>Validade</label><input id="f_val" type="date" value="${validade}"></div>`:''}
    </div>
    <div id="iaLoading" style="display:none;text-align:center;padding:20px;background:#dbeafe;border-radius:8px;margin-top:12px">
      <div style="font-size:18px;margin-bottom:6px">🤖 Analisando documento com Gemini...</div>
      <div style="font-size:12px;color:var(--muted)">Pode levar alguns segundos</div>
    </div>
  `, async ()=>{
    const arq = document.getElementById('f_arq').files[0];
    const nomeArq = arq?arq.name:(existing?.arquivo||'documento.pdf');
    if(!arq && !existing){ toast('Selecione um arquivo PDF','err'); return false; }
    let ia = {iaStatus:'pendente',iaNota:''};
    let arquivoPath = existing?.arquivoPath||'';
    if(arq){
      const stamp = Date.now();
      const safe = nomeArq.replace(/[^a-zA-Z0-9._-]/g,'_').slice(0,80);
      arquivoPath = `${tipo}/${refId}/${docId}_${stamp}_${safe}`;
      toast('Enviando arquivo...');
      const {error:upErr} = await sb.storage.from('documentos').upload(arquivoPath, arq, {contentType:arq.type||'application/pdf', upsert:true});
      if(upErr){ toast('Erro ao subir PDF: '+upErr.message,'err'); return false; }
      // remover arquivo antigo se existia outro path
      if(existing?.arquivoPath && existing.arquivoPath !== arquivoPath){
        sb.storage.from('documentos').remove([existing.arquivoPath]).catch(()=>{});
      }
    }
    if(DB.config.iaHabilitada && arq){
      document.getElementById('iaLoading').style.display='block';
      if(temGemini) ia = await analisarComGemini(arq, docExigido, contexto);
      else ia = simularIA();
    } else if(existing && !arq) {
      ia = {iaStatus:existing.iaStatus, iaNota:existing.iaNota};
    }
    const data = {refTipo:tipo,refId,docId,obraId:obraId||null,arquivo:nomeArq,arquivoPath,arquivoData:'',emitidoEm:val('f_emit'),validade:validadeDias?val('f_val'):null,
      iaStatus:ia.iaStatus, iaNota:ia.iaNota, sesmtStatus:'pendente', sesmtMotivo:'', sesmtPor:null};
    if(existing) Object.assign(existing,data); else DB.documentos.push({id:uid(),...data});
    save();
    toast(`Documento enviado. IA: ${ia.iaStatus}${ia.iaNota?' — '+ia.iaNota.slice(0,80):''}`, ia.iaStatus==='recusado'?'err':ia.iaStatus==='duvida'?'warn':'');
    closeModal();
    go(currentPage);
    return true;
  });
}
async function excluirDoc(docId){
  if(!confirm('Excluir este documento? Será possível reenviar depois.')) return;
  const d = DB.documentos.find(x=>x.id===docId);
  if(d?.arquivoPath){ await sb.storage.from('documentos').remove([d.arquivoPath]).catch(()=>{}); }
  if(d && typeof d.id==='number' && d.id<1e9){ await sb.from('documentos').delete().eq('id', d.id); }
  DB.documentos = DB.documentos.filter(d=>d.id!==docId);
  save(); toast('Documento excluído'); closeModal(); go(currentPage);
}
function aprovarDoc(docId){
  const d = DB.documentos.find(x=>x.id===docId);
  d.sesmtStatus = 'aprovado'; d.sesmtPor = session.id; d.sesmtMotivo = '';
  save(); toast('Documento aprovado'); closeModal(); go(currentPage);
}
function recusarDoc(docId){
  const d = DB.documentos.find(x=>x.id===docId);
  const ex = DB.catalogoDocs.find(c=>c.id===d.docId);
  showModal(`Recusar: ${ex?.nome||d.docId}`, `
    <div class="alert">⚠️ Descreva DETALHADAMENTE o motivo da recusa. O fornecedor verá exatamente este texto para corrigir e reenviar.</div>
    <div class="form-group"><label>Motivo da recusa (detalhado)</label>
      <textarea id="f_motivo" rows="8" placeholder="Ex: O ASO está em nome de outro colaborador. O documento enviado refere-se a João Silva mas o cadastro é de José Pereira. Por favor reenviar o ASO correto, em nome de José Pereira, com data de exame recente, indicação APTO, CRM e assinatura do médico examinador."></textarea>
    </div>
    ${d.iaNota?`<div class="alert info" style="font-size:12px"><b>🤖 Análise da IA pode ajudar:</b><div style="white-space:pre-wrap;margin-top:6px">${escapeHtml(d.iaNota)}</div></div>`:''}
  `, ()=>{
    const motivo = val('f_motivo');
    if(!motivo){ toast('Descreva o motivo','err'); return false; }
    d.sesmtStatus = 'recusado'; d.sesmtMotivo = motivo; d.sesmtPor = session.id;
    save(); toast('Documento recusado','warn'); closeModal(); go(currentPage);
    return true;
  });
}

function editCatalogoDoc(id){

      <label>🤖 Checklist de validação da IA</label>
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px">Descreva exatamente o que o Gemini deve conferir neste documento. Quanto mais específico, melhor o resultado. Ex: "Confirme que tem nome, CRM, data, assinatura..."</div>
      <textarea id="f_check" rows="5" placeholder="O documento deve conter...">${d.checklistIA||''}</textarea>
    </div>
  `, ()=>{
    const newId = id || val('f_id').toLowerCase().replace(/[^a-z0-9_]/g,'_');
    if(!newId||!val('f_nome')){ toast('Preencha ID e nome','err'); return false; }
    if(!id && DB.catalogoDocs.some(x=>x.id===newId)){ toast('Já existe doc com este ID','err'); return false; }
    const data = {id:newId, categoria:val('f_cat'), nome:val('f_nome'), validadeDias:parseInt(val('f_val'))||null, descricao:val('f_desc'), checklistIA:val('f_check')};
    if(id) Object.assign(d,data); else DB.catalogoDocs.push(data);

      DB.obras.forEach(o=>{o.docsEmpresa=o.docsEmpresa?.filter(x=>x!==id);o.docsFuncionarioBase=o.docsFuncionarioBase?.filter(x=>x!==id);o.docsMaquina=o.docsMaquina?.filter(x=>x!==id);});

      save(); go('catalogo_docs'); closeModal();
    }
  }}]:[]);
}

/* ===== RELATÓRIOS ===== */
function renderRelatorios(){
  let linhas = [];
  function add(tipo, ref, nomeRef, contexto, obraId, empresaId, exigencia, doc){
    const s = statusDoc(doc, exigencia);
    linhas.push({tipo, nomeRef, contexto, docNome:exigencia.nome, emitido:doc?.emitidoEm||'-', validade:doc?.validade||'-', status:s, obraId, empresaId, iaStatus:doc?.iaStatus, sesmtStatus:doc?.sesmtStatus});
  }
  escopoEmpresas().forEach(e=>{
    (e.obraIds||[]).forEach(oid=>{
      const obra = DB.obras.find(o=>o.id===oid); if(!obra) return;
      (obra.docsEmpresa||[]).forEach(did=>{
        const ex = DB.catalogoDocs.find(c=>c.id===did); if(!ex) return;
        add('empresa', e, e.razao, `${e.cnpj} • ${obra.nome}`, oid, e.id, ex, getDoc('empresa',e.id,did,oid));
      });
    });
  });
  escopoFuncionarios().forEach(f=>{
    const emp=DB.empresas.find(x=>x.id===f.empresaId); const obra=DB.obras.find(x=>x.id===f.obraId);
    docsExigidosFuncionario(f).forEach(ex=>add('funcionario',f,f.nome,`${emp?.razao||''} • ${obra?.nome||''}`,f.obraId,f.empresaId,ex,getDoc('funcionario',f.id,ex.id)));
  });
  escopoMaquinas().forEach(m=>{
    const emp=DB.empresas.find(x=>x.id===m.empresaId);
    docsExigidosMaquina(m).forEach(ex=>add('maquina',m,m.descricao,emp?.razao||'',m.obraId,m.empresaId,ex,getDoc('maquina',m.id,ex.id)));
  });
  // aplicar filtros
  if(filtros.obraId) linhas=linhas.filter(l=>l.obraId==filtros.obraId||l.tipo==='empresa');
  if(filtros.empresaId) linhas=linhas.filter(l=>l.empresaId==filtros.empresaId);
  if(filtros.busca){ const q=filtros.busca.toLowerCase(); linhas=linhas.filter(l=>(l.nomeRef+' '+l.contexto+' '+l.docNome).toLowerCase().includes(q)); }
  if(filtros.status) linhas=linhas.filter(l=>l.status.cls===filtros.status);

  document.getElementById('main').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Relatórios</div><div class="page-sub">${linhas.length} registros</div></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" onclick="exportarCSV()">⬇️ CSV</button>
        <button class="btn btn-primary" onclick="window.print()">🖨️ Imprimir</button>
      </div>
    </div>
    ${toolbarFiltros({busca:true,obra:true,empresa:true,status:true})}
    <div class="card">
      <table id="relTable">
        <thead><tr><th>Tipo</th><th>Item</th><th>Contexto</th><th>Documento</th><th>Emissão</th><th>Validade</th><th>IA</th><th>SESMT</th><th>Status</th></tr></thead>
        <tbody>${linhas.map(l=>`<tr>
          <td>${l.tipo==='empresa'?'🏢':l.tipo==='funcionario'?'👷':'🚜'}</td>
          <td><b>${l.nomeRef}</b></td>
          <td style="font-size:12px;color:var(--muted)">${l.contexto}</td>
          <td>${l.docNome}</td>
          <td>${l.emitido}</td>
          <td>${l.validade}</td>
          <td>${l.iaStatus?`<span class="badge-ia ${l.iaStatus}">${l.iaStatus}</span>`:'-'}</td>
          <td>${l.sesmtStatus?`<span class="badge-ia ${l.sesmtStatus==='aprovado'?'aprovado':l.sesmtStatus==='recusado'?'recusado':'pendente'}">${l.sesmtStatus}</span>`:'-'}</td>
          <td><span class="status ${l.status.cls}">${l.status.label}</span></td>
        </tr>`).join('')}</tbody>
      </table>
      ${linhas.length===0?'<div class="empty">Sem registros</div>':''}
    </div>
  `;
}
function exportarCSV(){
  const rows = [['Tipo','Item','Contexto','Documento','Emissão','Validade','IA','SESMT','Status']];
  document.querySelectorAll('#relTable tbody tr').forEach(tr=>{
    rows.push([...tr.children].map(td=>td.innerText.replace(/\n/g,' ').trim()));
  });
  const csv = rows.map(r=>r.map(c=>`"${c.replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='relatorio-sesmt.csv'; a.click();
}

function destinatariosObra(obraId){
  const obra = DB.obras.find(o=>o.id===obraId);
  if(!obra) return {to:[], cc:[]};
  const cc = [];
  [obra.coordenadorId,obra.engenheiroId,obra.tstId].forEach(uid=>{
    const u = DB.usuarios.find(x=>x.id===uid);
    if(u?.email) cc.push(u.email);
  });
  // clientes vinculados
  DB.usuarios.filter(u=>u.tipo==='cliente' && (u.obraIds||[]).includes(obraId)).forEach(c=>cc.push(c.email));
  // extras manuais
  (obra.destinatariosExtras||'').split(/[,;]/).map(s=>s.trim()).filter(Boolean).forEach(e=>cc.push(e));
  return {cc:[...new Set(cc)]};
}

/* ===== NOTIFICAÇÕES ===== */
function pendenciasPorEmpresa(){
  const grupos = {};
  function add(empresaId, item){ (grupos[empresaId]=grupos[empresaId]||[]).push(item); }
  DB.empresas.forEach(e=>{
    (e.obraIds||[]).forEach(oid=>{
      const obra = DB.obras.find(o=>o.id===oid); if(!obra) return;
      (obra.docsEmpresa||[]).forEach(did=>{
        const ex = DB.catalogoDocs.find(c=>c.id===did); if(!ex) return;
        const doc=getDoc('empresa',e.id,did,oid); const s=statusDoc(doc,ex);
        if(s.cls!=='ok'&&s.cls!=='info') add(e.id,{cat:'Empresa',ref:`${e.razao} (${obra.nome})`,doc:ex.nome,status:s.label});
      });
    });
  });
  DB.funcionarios.forEach(f=>{
    docsExigidosFuncionario(f).forEach(de=>{
      const doc=getDoc('funcionario',f.id,de.id); const s=statusDoc(doc,de);
      if(s.cls!=='ok'&&s.cls!=='info') add(f.empresaId,{cat:'Colaborador',ref:f.nome,doc:de.nome,status:s.label});
    });
  });
  DB.maquinas.forEach(m=>{
    docsExigidosMaquina(m).forEach(de=>{
      const doc=getDoc('maquina',m.id,de.id); const s=statusDoc(doc,de);
      if(s.cls!=='ok'&&s.cls!=='info') add(m.empresaId,{cat:'Máquina',ref:m.descricao,doc:de.nome,status:s.label});
    });
  });
  return grupos;
}

function notificarEmpresa(empresaId){
  const grupos = pendenciasPorEmpresa();
  if(!grupos[empresaId]||grupos[empresaId].length===0){ toast('Empresa não tem pendências'); return; }
  const emp = DB.empresas.find(e=>e.id===empresaId);
  const obraIds = [...new Set([...DB.funcionarios.filter(f=>f.empresaId===emp.id).map(f=>f.obraId),...DB.maquinas.filter(m=>m.empresaId===emp.id).map(m=>m.obraId),...(emp.obraIds||[])])].filter(Boolean);
  const allCc = new Set();
  obraIds.forEach(oid=>destinatariosObra(oid).cc.forEach(c=>allCc.add(c)));
  showModal(`Notificar: ${emp.razao}`, previewEmail(emp, grupos[empresaId]), async ()=>{
    const html = previewEmail(emp, grupos[empresaId]);
    const ok = await enviarWebhook({to:emp.email, cc:[...allCc], subject:`[SESMT] Pendências - ${emp.razao}`, html, pendencias:grupos[empresaId], empresa:emp.razao});
    DB.logs.push({data:new Date().toLocaleString('pt-BR'),para:emp.email,cc:[...allCc].join(';'),assunto:`[SESMT] Pendências - ${emp.razao}`,itens:grupos[empresaId].length,enviadoPor:session.nome,via:ok?'webhook':'simulado'});
    save(); toast(ok?'E-mail enviado via webhook':'Webhook não configurado - apenas registrado'); return true;
  }, [], false, 'lg');
}

function notificarFuncionario(funcId){
  const f = DB.funcionarios.find(x=>x.id===funcId);
  const emp = DB.empresas.find(e=>e.id===f.empresaId);
  const pend = [];
  docsExigidosFuncionario(f).forEach(de=>{
    const doc=getDoc('funcionario',f.id,de.id); const s=statusDoc(doc,de);
    if(s.cls!=='ok'&&s.cls!=='info') pend.push({cat:'Colaborador',ref:f.nome,doc:de.nome,status:s.label});
  });
  if(pend.length===0){ toast('Colaborador sem pendências'); return; }
  const dest = destinatariosObra(f.obraId);
  showModal(`Notificar pendências de ${f.nome}`, previewEmail(emp, pend, f.nome, [f.obraId]), async ()=>{
    const html = previewEmail(emp, pend, f.nome, [f.obraId]);
    const ok = await enviarWebhook({to:emp.email, cc:dest.cc, subject:`[SESMT] Pendências - ${f.nome}`, html, pendencias:pend, colaborador:f.nome, empresa:emp.razao});
    DB.logs.push({data:new Date().toLocaleString('pt-BR'),para:emp.email,cc:dest.cc.join(';'),assunto:`[SESMT] Pendências - ${f.nome}`,itens:pend.length,enviadoPor:session.nome,via:ok?'webhook':'simulado'});
    save(); toast(ok?'E-mail enviado via webhook':'Sem webhook - registrado'); return true;
  }, [], false, 'lg');
}

function previewEmail(emp, pendencias, colaboradorNome, obraIds){

  const obras = obraIds && obraIds.length ? obraIds : [...new Set(DB.funcionarios.filter(f=>f.empresaId===emp.id).map(f=>f.obraId).concat(DB.maquinas.filter(m=>m.empresaId===emp.id).map(m=>m.obraId)))].filter(Boolean);
  const allCc = new Set();

      <p>Prezados,</p>

      <table>
        <thead><tr><th>Categoria</th><th>Item</th><th>Documento</th><th>Situação</th></tr></thead>
        <tbody>${pendencias.map(p=>`<tr><td>${p.cat}</td><td>${p.ref}</td><td>${p.doc}</td><td><span class="status ${p.status.includes('Vence')?'warn':p.status==='VENCIDO'||p.status==='RECUSADO'?'crit':'pendente'}">${p.status}</span></td></tr>`).join('')}</tbody>

function previewLogo(input){
  const f = input.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{
    const img = document.getElementById('logoPrev');
    img.src = r.result; img.style.display='block'; img.style.maxHeight='60px';
    img.style.marginTop='10px'; img.style.padding='6px'; img.style.border='1px solid var(--border)'; img.style.borderRadius='6px';
  };
  r.readAsDataURL(f);
}

function aplicarTema(){

async function testarWebhook(){
  const url = val('cf_webhook');
  const el = document.getElementById('webhookRes');
  if(!url){ el.innerHTML='<span style="color:var(--crit)">Cole a URL primeiro</span>'; return; }
  el.innerHTML='⏳ Testando...';
  try{
    const res = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      teste:true, to:'teste@exemplo.com', subject:'Teste do SESMT B&M', html:'<p>Mensagem de teste</p>'
    })});
    if(res.ok) el.innerHTML='<span style="color:var(--ok)">✓ Webhook respondeu OK</span>';
    else el.innerHTML=`<span style="color:var(--crit)">❌ Status ${res.status}</span>`;
  }catch(e){ el.innerHTML=`<span style="color:var(--crit)">❌ ${e.message}</span>`; }
}

async function enviarWebhook(payload){
  if(!DB.config.webhookMake) return false;
  try{
    await fetch(DB.config.webhookMake,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    return true;
  }catch(e){ console.error('webhook',e); return false; }
}

async function testarGemini(){
  const key = val('cf_gem');
  const model = val('cf_gemmod')||'gemini-2.0-flash';
  const el = document.getElementById('testRes');
  if(!key){ el.innerHTML = '<span style="color:var(--crit)">Cole a chave primeiro</span>'; return; }
  el.innerHTML = '⏳ Testando...';
  try{
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(key)}`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({contents:[{parts:[{text:'Responda apenas "OK" se você está funcionando.'}]}]})
    });
    if(!res.ok){
      const err = await res.text();
      el.innerHTML = `<span style="color:var(--crit)">❌ Erro ${res.status}: ${err.slice(0,120)}</span>`;
      return;
    }
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '(sem resposta)';
    el.innerHTML = `<span style="color:var(--ok)">✓ Conectado! Modelo respondeu: "${text.trim().slice(0,50)}"</span>`;
  } catch(e){
    el.innerHTML = `<span style="color:var(--crit)">❌ ${e.message}</span>`;
  }
}

/* ===== DOWNLOAD INDIVIDUAL E EM MASSA ===== */
async function baixarDoc(docId){
  const d = DB.documentos.find(x=>x.id===docId);
  if(!d||!d.arquivoPath){ toast('Arquivo não disponível','err'); return; }
  const {data, error} = await sb.storage.from('documentos').createSignedUrl(d.arquivoPath, 3600);
  if(error){ toast('Erro ao gerar link: '+error.message,'err'); return; }
  const a = document.createElement('a');
  a.href = data.signedUrl;
  a.download = d.arquivo||'documento.pdf';
  a.target = '_blank';
  document.body.appendChild(a); a.click(); a.remove();
}

function safeName(s){ return (s||'').replace(/[\\\/:*?"<>|]/g,'_').replace(/\s+/g,'_').slice(0,80); }

async function baixarZip(docs, nomeZip){
  if(typeof JSZip==='undefined'){ toast('JSZip não carregou','err'); return; }
  if(!docs.length){ toast('Nenhum arquivo para baixar','warn'); return; }
  const validos = docs.filter(d=>d.arquivoPath);
  if(validos.length===0){ toast('Nenhum arquivo no Storage','warn'); return; }
  toast(`Baixando ${validos.length} arquivo(s)...`);
  const zip = new JSZip();
  let count = 0;
  for(const d of validos){
    const exigido = DB.catalogoDocs.find(x=>x.id===d.docId);
    let pasta = '';
    if(d.refTipo==='empresa'){
      const e = DB.empresas.find(x=>x.id===d.refId);
      const o = d.obraId?DB.obras.find(x=>x.id===d.obraId):null;
      pasta = `EMPRESAS/${safeName(e?.razao||'?')}${o?'/'+safeName(o.nome):''}`;
    } else if(d.refTipo==='funcionario'){
      const f = DB.funcionarios.find(x=>x.id===d.refId);
      const emp = DB.empresas.find(x=>x.id===f?.empresaId);
      pasta = `COLABORADORES/${safeName(emp?.razao||'?')}/${safeName(f?.nome||'?')}`;
    } else {
      const m = DB.maquinas.find(x=>x.id===d.refId);
      const emp = DB.empresas.find(x=>x.id===m?.empresaId);
      pasta = `MAQUINAS/${safeName(emp?.razao||'?')}/${safeName(m?.descricao||'?')}`;
    }
    const fileName = `${safeName(exigido?.nome||d.docId)}_${d.arquivo||'doc.pdf'}`;
    const {data:blob, error} = await sb.storage.from('documentos').download(d.arquivoPath);
    if(error||!blob){ console.error('download',d.arquivoPath,error); continue; }
    zip.file(`${pasta}/${fileName}`, blob);
    count++;
  }
  if(count===0){ toast('Falha ao baixar arquivos','err'); return; }
  toast(`Compactando ${count} arquivo(s)...`);
  const blob = await zip.generateAsync({type:'blob'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (nomeZip||'documentos_sesmt')+'.zip';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),3000);
}

    if(d.refTipo==='funcionario'){ const f=DB.funcionarios.find(x=>x.id===d.refId); return f?.empresaId===session.empresaId; }
    if(d.refTipo==='maquina'){ const m=DB.maquinas.find(x=>x.id===d.refId); return m?.empresaId===session.empresaId; }
  });
  if(['coordenador','engenheiro','tst','cliente'].includes(session.tipo)){

      if(d.refTipo==='funcionario'){ const f=DB.funcionarios.find(x=>x.id===d.refId); return session.obraIds.includes(f?.obraId); }
      if(d.refTipo==='maquina'){ const m=DB.maquinas.find(x=>x.id===d.refId); return session.obraIds.includes(m?.obraId); }

  }
  if(filtros.status==='ok') docs = docs.filter(d=>d.sesmtStatus==='aprovado');
  else if(filtros.status==='pendente') docs = docs.filter(d=>d.sesmtStatus==='pendente');

  if(filtros.busca){

      const cat = DB.catalogoDocs.find(c=>c.id===d.docId);

      else if(d.refTipo==='empresa'){ const e=DB.empresas.find(x=>x.id===d.refId); nome=e?.razao||''; }
      else if(d.refTipo==='maquina'){ const m=DB.maquinas.find(x=>x.id===d.refId); nome=m?.descricao||''; }
      return (nome+' '+(cat?.nome||'')+' '+(d.arquivo||'')).toLowerCase().includes(q);
    });
  }

  const nomeZip = filtros.obraId ? `obra_${safeName(DB.obras.find(o=>o.id==filtros.obraId)?.nome||'')}_docs`
                : filtros.empresaId ? `empresa_${safeName(DB.empresas.find(e=>e.id==filtros.empresaId)?.razao||'')}_docs`
                : 'documentos_sesmt';

  document.getElementById('main').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Downloads</div><div class="page-sub">Baixe documentos individualmente ou em massa (ZIP)</div></div>
      <button class="btn btn-primary" onclick='baixarZip(${JSON.stringify(docs.map(d=>d.id))}.map(id=>DB.documentos.find(x=>x.id===id)), "${nomeZip}")'>📦 Baixar ${docs.length} em ZIP</button>
    </div>
    ${toolbarFiltros({busca:true,obra:true,empresa:true,status:true})}
    <div class="card">
      <table>
        <thead><tr><th>Tipo</th><th>Vínculo</th><th>Documento</th><th>Arquivo</th><th>Emissão</th><th>Validade</th><th>Status</th><th></th></tr></thead>
        <tbody>${docs.map(d=>{
          const exigido = DB.catalogoDocs.find(c=>c.id===d.docId);
          let vinc = '';
          if(d.refTipo==='funcionario'){ const f=DB.funcionarios.find(x=>x.id===d.refId); const e=DB.empresas.find(x=>x.id===f?.empresaId); vinc = `👷 ${f?.nome||'?'} (${e?.razao||'?'})`; }
          else if(d.refTipo==='empresa'){ const e=DB.empresas.find(x=>x.id===d.refId); vinc = `🏢 ${e?.razao||'?'}`; }
          else { const m=DB.maquinas.find(x=>x.id===d.refId); const e=DB.empresas.find(x=>x.id===m?.empresaId); vinc = `🚜 ${m?.descricao||'?'} (${e?.razao||'?'})`; }
          return `<tr>
            <td>${d.refTipo==='empresa'?'Empresa':d.refTipo==='funcionario'?'Colab.':'Máquina'}</td>
            <td>${vinc}</td>
            <td>${exigido?.nome||d.docId}</td>
            <td style="font-size:12px">${d.arquivo||'-'}</td>
            <td>${d.emitidoEm||'-'}</td>
            <td>${d.validade||'-'}</td>
            <td><span class="badge-ia ${d.sesmtStatus==='aprovado'?'aprovado':d.sesmtStatus==='recusado'?'recusado':'pendente'}">${d.sesmtStatus||'-'}</span></td>
            <td><button class="btn btn-secondary btn-sm" onclick="baixarDoc(${d.id})">⬇️</button></td>
          </tr>`;
        }).join('')}</tbody>
      </table>
      ${docs.length===0?'<div class="empty"><div class="empty-icon">📂</div>Nenhum arquivo para baixar com esses filtros</div>':''}
    </div>
  `;
}

function renderDevolutiva(){

  if(!filtros.obraId){
    document.getElementById('main').innerHTML = `
      <div class="page-header">
        <div><div class="page-title">Devolutiva ao Cliente</div><div class="page-sub">Matriz de conformidade por obra, pronta para enviar</div></div>

        <h3 style="margin-bottom:14px">Selecione a obra:</h3>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">
          ${obras.length===0?'<div class="empty">Cadastre uma obra primeiro</div>':obras.map(o=>`
            <button class="btn btn-secondary" style="padding:18px;text-align:left;display:block;width:100%" onclick="filtros.obraId='${o.id}';go('devolutiva')">
              <div style="font-weight:700;color:var(--bm-blue);font-size:16px">${o.nome}</div>

            </button>`).join('')}
        </div>
      </div>`;
    return;
  }

  const obra = DB.obras.find(o=>o.id==filtros.obraId);
  if(!obra){ filtros.obraId=''; go('devolutiva'); return; }
  // empresas que atuam na obra
  const empresasObra = [...new Set([
    ...DB.funcionarios.filter(f=>f.obraId===obra.id).map(f=>f.empresaId),
    ...DB.maquinas.filter(m=>m.obraId===obra.id).map(m=>m.empresaId)
  ])].map(eid=>DB.empresas.find(e=>e.id===eid)).filter(Boolean);

  // colunas empresa (docs da obra para empresa)
  const colsEmpresa = (obra.docsEmpresa||[]).map(id=>DB.catalogoDocs.find(d=>d.id===id)).filter(Boolean);

  // colunas colaborador: união docsFuncionarioBase + todos docs de todas funções dos colab da obra
  const colabsObra = DB.funcionarios.filter(f=>f.obraId===obra.id);
  const docsColabSet = new Set(obra.docsFuncionarioBase||[]);
  colabsObra.forEach(f=>{
    const funcao = DB.catalogoFuncoes.find(c=>c.id==f.funcaoId);
    (funcao?.docsIds||[]).forEach(d=>docsColabSet.add(d));
  });
  const colsColab = [...docsColabSet].map(id=>DB.catalogoDocs.find(d=>d.id===id)).filter(Boolean);

  function statusCell(doc, exigencia){
    const s = statusDoc(doc, exigencia);
    if(s.cls==='ok') return {txt:'OK', bg:'#16a34a', fg:'#fff'};
    if(s.cls==='pendente'||s.cls==='warn'||s.cls==='crit'||s.cls==='info') return {txt:'PENDENTE', bg:'#dc2626', fg:'#fff'};
    return {txt:'-', bg:'#9ca3af', fg:'#fff'};
  }

  // status final
  let temPendencia = false;
  empresasObra.forEach(e=>colsEmpresa.forEach(de=>{ const d=getDoc('empresa',e.id,de.id,obra.id); if(!d||statusDoc(d,de).cls!=='ok') temPendencia=true; }));
  colabsObra.forEach(f=>{
    const funcao = DB.catalogoFuncoes.find(c=>c.id==f.funcaoId);
    const exigidos = new Set([...(obra.docsFuncionarioBase||[]),...(funcao?.docsIds||[])]);
    colsColab.forEach(de=>{
      if(!exigidos.has(de.id)) return;
      const doc = getDoc('funcionario',f.id,de.id);
      if(!doc||statusDoc(doc,de).cls!=='ok') temPendencia=true;
    });
  });

      <div>
        <div class="page-title">Devolutiva: ${obra.nome}</div>
        <div class="page-sub">Cliente: ${obra.clienteNome||'-'} • ${empresasObra.length} empresa(s) • ${colabsObra.length} colaborador(es)</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" onclick="filtros.obraId='';go('devolutiva')">← Trocar obra</button>
        <button class="btn btn-secondary" onclick="window.print()">🖨️ Imprimir</button>
        <button class="btn btn-secondary" onclick="exportarDevolutivaCSV()">⬇️ CSV</button>
        <button class="btn btn-primary" onclick="enviarDevolutiva(${obra.id})">✉️ Enviar ao cliente</button>
      </div>
    </div>
