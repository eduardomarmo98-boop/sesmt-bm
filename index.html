      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;border-bottom:2px solid var(--bm-blue);padding-bottom:10px">
        <div>
          <div style="font-size:22px;font-weight:700;color:var(--bm-blue)">BRANDÃO<span style="color:var(--bm-orange)">&MARMO</span></div>
          <div style="font-size:11px;color:var(--muted);letter-spacing:2px">ENGENHARIA E CONSTRUÇÕES</div>
        </div>
        <div style="text-align:center;flex:1">
          <h2 style="margin:0;font-size:18px">DEVOLUTIVA DOCUMENTAÇÃO — ${obra.nome.toUpperCase()}</h2>
          <div style="font-size:12px;color:var(--muted);margin-top:4px">Emitido em ${new Date().toLocaleDateString('pt-BR')}</div>
        </div>
        <div style="background:var(--ok);color:#fff;padding:8px 16px;border-radius:50%;font-weight:700;font-size:11px;text-align:center;line-height:1.2">SEGURANÇA<br>DO TRABALHO</div>
      </div>

      ${empresasObra.length===0?'<div class="empty">Nenhuma empresa atuando nesta obra</div>':`
        <h3 style="margin:14px 0 8px;color:var(--bm-blue);font-size:14px">EMPRESA</h3>
        <table style="font-size:11px">
          <thead><tr><th style="background:var(--bm-blue);color:#fff">Empresa</th>${colsEmpresa.map(c=>`<th style="background:var(--bm-blue);color:#fff;writing-mode:vertical-rl;transform:rotate(180deg);min-width:30px;padding:8px 4px">${c.nome}</th>`).join('')}</tr></thead>
          <tbody>${empresasObra.map(e=>`<tr>
            <td><b>${e.razao}</b></td>
            ${colsEmpresa.map(de=>{ const c=statusCell(getDoc('empresa',e.id,de.id,obra.id),de); return `<td style="background:${c.bg};color:${c.fg};text-align:center;font-weight:700">${c.txt}</td>`; }).join('')}
          </tr>`).join('')}</tbody>
        </table>
      `}

      ${colabsObra.length===0?'':`
        <h3 style="margin:20px 0 8px;color:var(--bm-blue);font-size:14px">COLABORADORES</h3>
        <table style="font-size:11px">
          <thead><tr><th style="background:var(--bm-blue);color:#fff">Colaborador</th>${colsColab.map(c=>`<th style="background:var(--bm-blue);color:#fff;writing-mode:vertical-rl;transform:rotate(180deg);min-width:30px;padding:8px 4px">${c.nome}</th>`).join('')}</tr></thead>
          <tbody>${colabsObra.map(f=>{
            const funcao = DB.catalogoFuncoes.find(c=>c.id==f.funcaoId);
            const exigidos = new Set([...(obra.docsFuncionarioBase||[]),...(funcao?.docsIds||[])]);
            return `<tr>
              <td><b>${f.nome}</b><div style="font-size:10px;color:var(--muted)">${funcao?.nome||''}</div></td>
              ${colsColab.map(de=>{
                if(!exigidos.has(de.id)) return '<td style="background:#9ca3af;color:#fff;text-align:center;font-weight:700">N/A</td>';
                const c = statusCell(getDoc('funcionario',f.id,de.id),de);
                return `<td style="background:${c.bg};color:${c.fg};text-align:center;font-weight:700">${c.txt}</td>`;
              }).join('')}
            </tr>`;
          }).join('')}</tbody>
        </table>
      `}

      <div style="margin-top:24px;padding:12px;background:${temPendencia?'#fee2e2':'#dcfce7'};border-radius:6px;text-align:center;font-weight:700;font-size:16px;color:${temPendencia?'#991b1b':'#166534'}">
        STATUS FINAL: ${temPendencia?'PENDENTE':'OK - CONFORME'}
      </div>
    </div>
  `;
}

function exportarDevolutivaCSV(){
  const rows = [];
  document.querySelectorAll('#devolutivaEl table').forEach((tbl,ti)=>{
    rows.push([ti===0?'EMPRESA':'COLABORADORES']);
    [...tbl.querySelectorAll('tr')].forEach(tr=>rows.push([...tr.children].map(td=>td.innerText.replace(/\n/g,' ').trim())));
    rows.push([]);
  });
  const csv = rows.map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='devolutiva.csv'; a.click();
}

function enviarDevolutiva(obraId){
  const obra = DB.obras.find(o=>o.id===obraId);
  const dest = destinatariosObra(obraId);
  const para = prompt('E-mail principal do cliente (Para):', '');
  if(para===null) return;
  const todos = [para,...dest.cc].filter(Boolean);
  DB.logs.push({data:new Date().toLocaleString('pt-BR'),para:todos.join('; '),assunto:`[B&M] Devolutiva Documentação - ${obra.nome}`,itens:1,enviadoPor:session.nome});
  save();
  toast(`Devolutiva enviada para ${todos.length} destinatário(s)`);
}

/* ===== UTILS ===== */
function val(id){ const el=document.getElementById(id); return el?el.value.trim():''; }
function atualizarDropLabel(input){
  const lbl = document.getElementById('dropLabel');
  if(lbl && input.files[0]) lbl.innerHTML = `<b style="color:var(--bm-blue)">✓ ${input.files[0].name}</b><br><span style="font-size:11px">${(input.files[0].size/1024).toFixed(0)} KB</span>`;
}
// drag-drop global
document.addEventListener('dragover',e=>{
  const dz = document.getElementById('dropZone');
  if(!dz) return;
  e.preventDefault(); dz.style.borderColor='var(--bm-blue)'; dz.style.background='#eef2f9';
});
document.addEventListener('dragleave',e=>{
  const dz = document.getElementById('dropZone');
  if(dz){ dz.style.borderColor='var(--border)'; dz.style.background='#f9fafb'; }
});
document.addEventListener('drop',e=>{
  const dz = document.getElementById('dropZone');
  if(!dz) return;
  e.preventDefault();
  dz.style.borderColor='var(--border)'; dz.style.background='#f9fafb';
  const arq = document.getElementById('f_arq');
  const f = e.dataTransfer?.files?.[0];
  if(f && f.type==='application/pdf' && arq){
    const dt = new DataTransfer(); dt.items.add(f); arq.files = dt.files;
    atualizarDropLabel(arq);
  } else if(f && /(pdf|image)/.test(f.type)){ const dt = new DataTransfer(); dt.items.add(f); arq.files = dt.files; atualizarDropLabel(arq);} else if(f) toast('Apenas PDF ou imagem aceito','err');
});
function esc(s){ return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
let modalSaveFn=null, modalExtras=[];
function showModal(title,body,saveFn,extras=[],readOnly=false,size=''){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalEl').className='modal '+(size||'');
  modalSaveFn=saveFn; modalExtras=extras;
  let html=extras.map((b,i)=>`<button class="btn ${b.cls||'btn-secondary'}" onclick="modalExtra(${i})">${b.label}</button>`).join('');
  html+=`<button class="btn btn-secondary" onclick="closeModal()">${readOnly?'Fechar':'Cancelar'}</button>`;
  if(!readOnly && saveFn) html+=`<button class="btn btn-primary" onclick="modalSave()">Salvar</button>`;
  document.getElementById('modalFooter').innerHTML=html;
  document.getElementById('modal').classList.add('show');
}
function modalExtra(i){ modalExtras[i]?.fn(); }
async function modalSave(){
  if(!modalSaveFn) return;
  const btns = document.querySelectorAll('#modalFooter .btn');
  btns.forEach(b=>b.disabled=true);
  try{
    const result = await Promise.resolve(modalSaveFn());
    if(result!==false) closeModal();
  } finally {
    btns.forEach(b=>b.disabled=false);
  }
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); modalSaveFn=null; }
function toast(msg,type){const t=document.createElement('div');t.className='toast '+(type||'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2800);}
